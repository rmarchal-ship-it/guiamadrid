name: Update Cartelera

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Madrid

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl-cffi yt-dlp

      - name: Test SensaCine connectivity
        run: |
          python3 << 'PYEOF'
          from curl_cffi import requests
          import json, os
          s = requests.Session(impersonate="chrome")
          url = "https://www.sensacine.com/_/showtimes/theater-E0621/d-$(date +%Y-%m-%d)/p-1"
          result = {}
          try:
              r = s.get(url, timeout=15)
              result["status"] = r.status_code
              result["content_type"] = r.headers.get("content-type", "N/A")
              result["body_preview"] = r.text[:500]
              if r.status_code == 200 and "json" in r.headers.get("content-type", ""):
                  data = r.json()
                  result["num_results"] = len(data.get("results", []))
                  result["ok"] = True
              else:
                  result["ok"] = False
          except Exception as e:
              result["error"] = str(e)
              result["ok"] = False
          # Write to file for debugging
          with open("sensacine_test.json", "w") as f:
              json.dump(result, f, indent=2, ensure_ascii=False)
          # Print summary
          print(json.dumps(result, indent=2, ensure_ascii=False))
          if not result.get("ok"):
              exit(1)
          PYEOF

      - name: Commit test result on failure
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f sensacine_test.json
          git commit -m "debug: SensaCine connectivity test result"
          git push

      - name: Run build pipeline
        run: python build_site.py

      - name: Commit and push if changed
        run: |
          git diff --quiet cartelera_standalone.html && echo "No changes." && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          git add cartelera_standalone.html
          git commit -m "Update cartelera for ${DATE}"
          git push
