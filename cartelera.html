<style>
  :root {

    --card: #1a1a2e;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --border: #2a2a3e;
    --gold: #f5c518;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 1.5rem 2rem;
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .date-label { color: var(--muted); font-size: 0.95rem; }
  .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .controls select {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 0.9rem;
  }
  .tabs { display: flex; gap: 0; margin: 1.5rem 2rem 0; }
  .tab {
    padding: 0.6rem 1.4rem; background: var(--card); border: 1px solid var(--border);
    border-bottom: none; cursor: pointer; font-size: 0.9rem; color: var(--muted);
    border-radius: 8px 8px 0 0; transition: all 0.2s;
  }
  .tab.active { background: var(--bg); color: var(--text); border-color: var(--accent); border-bottom-color: var(--bg); }
  .content { padding: 1.5rem 2rem; }
  .stats { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.8rem 1.2rem; min-width: 120px;
  }
  .stat-box .num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .stat-box .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.2rem; }
  .movie-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; transition: transform 0.2s, border-color 0.2s;
  }
  .movie-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .movie-card .top { padding: 1.2rem; }
  .movie-card .title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem; line-height: 1.3; }
  .movie-card .meta { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
  .movie-card .synopsis { font-size: 0.8rem; color: #aaa; margin-top: 0.5rem; line-height: 1.4; }
  .movie-card .rating {
    display: inline-flex; align-items: center; gap: 0.25rem; color: var(--gold);
    font-weight: 600; font-size: 0.95rem; margin-top: 0.4rem;
  }
  .movie-card .showtimes-section { border-top: 1px solid var(--border); padding: 0.8rem 1.2rem; }
  .movie-card .cinema-group { margin-bottom: 0.6rem; }
  .movie-card .cinema-group:last-child { margin-bottom: 0; }
  .movie-card .cinema-name {
    font-size: 0.75rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.3px; margin-bottom: 0.3rem;
  }
  .time-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .chip {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 0.2rem 0.5rem; font-size: 0.78rem; white-space: nowrap;
  }
  .chip.vose { border-color: #4caf50; color: #81c784; }
  .chip.imax { border-color: #2196f3; color: #64b5f6; }
  .chip.atmos { border-color: #9c27b0; color: #ce93d8; }
  .chip.isense { border-color: #00bcd4; color: #4dd0e1; }
  .cinemas-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .cinema-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 1rem 1.2rem;
  }
  .cinema-card h3 { font-size: 1rem; margin-bottom: 0.3rem; }
  .cinema-card .ext-id { font-size: 0.75rem; color: var(--accent); margin-top: 0.2rem; }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 0.35rem 0.9rem; color: var(--muted); cursor: pointer; font-size: 0.8rem;
    transition: all 0.2s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  @media (max-width: 600px) {
    header { padding: 1rem; }
    .content { padding: 1rem; }
    .movies-grid { grid-template-columns: 1fr; }
    .tabs { margin: 1rem 1rem 0; }
  }
</style>

const allShowtimes = DATA.showtimes;
const allMovies = DATA.movies;
const allCinemas = DATA.cinemas;
let activeLanguageFilter = '';

// Cinema filter
const cinemaFilter = document.getElementById('cinemaFilter');
const cinemaNames = [...new Set(allShowtimes.map(s => s.cinema))].sort();
cinemaNames.forEach(name => {
  const opt = document.createElement('option');
  opt.value = name; opt.textContent = name;
  cinemaFilter.appendChild(opt);
});
cinemaFilter.addEventListener('change', () => renderMovies());

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const name = tab.dataset.tab;
    document.getElementById('peliculas-tab').style.display = name === 'peliculas' ? '' : 'none';
    document.getElementById('cines-tab').style.display = name === 'cines' ? '' : 'none';
    if (name === 'cines') renderCinemas();
  });
});

function renderStats(filtered) {
  const cinemaCount = new Set(filtered.map(s => s.cinema)).size;
  const movieCount = new Set(filtered.map(s => s.movie)).size;
  const voseCount = filtered.filter(s => s.language === 'VOSE').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-box"><div class="num">${movieCount}</div><div class="label">Peliculas</div></div>
    <div class="stat-box"><div class="num">${filtered.length}</div><div class="label">Sesiones</div></div>
    <div class="stat-box"><div class="num">${cinemaCount}</div><div class="label">Cines</div></div>
    <div class="stat-box"><div class="num">${voseCount}</div><div class="label">VOSE</div></div>
  `;
}

function renderLanguageFilters() {
  const langs = [...new Set(allShowtimes.map(s => s.language))].sort();
  const bar = document.getElementById('lang-filters');
  bar.innerHTML = `<div class="filter-btn ${activeLanguageFilter === '' ? 'active' : ''}" data-lang="">Todos</div>`;
  langs.forEach(lang => {
    bar.innerHTML += `<div class="filter-btn ${activeLanguageFilter === lang ? 'active' : ''}" data-lang="${lang}">${lang}</div>`;
  });
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeLanguageFilter = btn.dataset.lang;
      renderLanguageFilters();
      renderMovies();
    });
  });
}

function renderMovies() {
  const container = document.getElementById('movies-container');
  const selectedCinema = cinemaFilter.value;

  let filtered = allShowtimes;
  if (selectedCinema) filtered = filtered.filter(s => s.cinema === selectedCinema);
  if (activeLanguageFilter) filtered = filtered.filter(s => s.language === activeLanguageFilter);

  renderStats(filtered);

  const movieMap = new Map();
  filtered.forEach(s => {
    if (!movieMap.has(s.movie)) {
      const mv = allMovies.find(m => m.title === s.movie) || {};
      movieMap.set(s.movie, { ...mv, title: s.movie, showtimes: [] });
    }
    movieMap.get(s.movie).showtimes.push(s);
  });

  if (movieMap.size === 0) {
    container.className = 'empty';
    container.textContent = 'No hay sesiones para este filtro.';
    return;
  }

  const movies = [...movieMap.values()].sort((a, b) => (b.rating || 0) - (a.rating || 0));

  container.className = 'movies-grid';
  container.innerHTML = movies.map(mv => {
    const byCinema = {};
    mv.showtimes.forEach(s => {
      if (!byCinema[s.cinema]) byCinema[s.cinema] = [];
      byCinema[s.cinema].push(s);
    });

    const ratingHtml = mv.rating ? `<div class="rating">&#9733; ${mv.rating.toFixed(1)}</div>` : '';
    const metaParts = [mv.director, mv.genre, mv.duration_min ? `${mv.duration_min} min` : null].filter(Boolean);
    const synopsisHtml = mv.synopsis ? `<div class="synopsis">${esc(mv.synopsis)}</div>` : '';

    const cinemaGroups = Object.entries(byCinema).map(([cinema, sts]) => {
      const chips = sts.sort((a, b) => a.time.localeCompare(b.time)).map(s => {
        let cls = 'chip';
        if (s.language === 'VOSE') cls += ' vose';
        if (s.format === 'IMAX') cls += ' imax';
        else if (s.format === 'Atmos') cls += ' atmos';
        else if (s.format === 'iSense') cls += ' isense';
        const label = s.time + (s.language === 'VOSE' ? ' VOSE' : '') + (s.format !== '2D' ? ' ' + s.format : '');
        return `<span class="${cls}">${label}</span>`;
      }).join('');
      return `<div class="cinema-group"><div class="cinema-name">${esc(cinema)}</div><div class="time-chips">${chips}</div></div>`;
    }).join('');

    return `
      <div class="movie-card">
        <div class="top">
          <div class="title">${esc(mv.title)}</div>
          <div class="meta">${esc(metaParts.join(' \u00B7 '))}</div>
          ${ratingHtml}
          ${synopsisHtml}
        </div>
        <div class="showtimes-section">${cinemaGroups}</div>
      </div>`;
  }).join('');
}

function renderCinemas() {
  const container = document.getElementById('cinemas-container');
  container.className = 'cinemas-list';
  container.innerHTML = allCinemas.map(c => {
    const sessionCount = allShowtimes.filter(s => s.cinema === c.name).length;
    return `
      <div class="cinema-card">
        <h3>${esc(c.name)}</h3>
        <div class="ext-id">${esc(c.external_id)} &mdash; ${sessionCount} sesiones hoy</div>
      </div>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

renderLanguageFilters();
renderMovies();
</script>
