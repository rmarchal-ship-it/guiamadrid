<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuiaMadrid — Cartelera 20 marzo 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0c0c;--surface:#151515;--card:#181818;--text:#f0f0f0;--muted:#777;--dim:#999;--border:rgba(255,255,255,.07);--yellow:#f5c518;--yellow-dim:rgba(245,197,24,.15)}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--yellow);color:#000}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* NOISE */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.018;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* HEADER */
.header{padding:1rem 2.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);gap:1rem;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:1.2rem;flex:1;min-width:0}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:-.02em;white-space:nowrap}
.logo span{color:var(--yellow)}

/* SEARCH BAR */
.search-wrap{position:relative;flex:1;max-width:400px;min-width:180px}
.search-input{width:100%;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:500;padding:.55rem 1rem .55rem 2.4rem;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;transition:all .25s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--yellow);background:rgba(255,255,255,.09)}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);width:16px;height:16px;pointer-events:none;opacity:.4}
.search-clear{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;line-height:1;padding:2px;display:none}
.search-clear.visible{display:block}
.search-clear:hover{color:var(--text)}

.header-date{font-size:.78rem;color:var(--muted);font-weight:500;white-space:nowrap}

/* TOOLBAR */
.toolbar{padding:.8rem 2.5rem;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(12,12,12,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.pill{font-size:.78rem;font-weight:600;padding:.4rem 1rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;color:var(--muted);transition:all .25s}
.pill:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.pill.active{color:#000;background:var(--yellow);border-color:var(--yellow)}
.divider{width:1px;height:20px;background:var(--border);margin:0 .3rem}
.toolbar-right{margin-left:auto;display:flex;gap:.6rem;align-items:center}
.cinema-select{font-size:.78rem;font-weight:500;background:var(--surface);color:var(--dim);border:1px solid var(--border);border-radius:4px;padding:.4rem .7rem;cursor:pointer;appearance:none;max-width:240px}
.cinema-select option{background:var(--surface);color:var(--text)}
.cinema-select:focus{outline:none;border-color:var(--yellow);color:var(--text)}

/* STATS */
.stats-bar{padding:.6rem 2.5rem;display:flex;gap:2rem;border-bottom:1px solid var(--border);background:var(--surface)}
.stat{font-size:.78rem;color:var(--muted);font-weight:500}
.stat strong{color:var(--yellow);font-size:1.05rem;font-weight:700;margin-right:.2rem}

/* CONTENT */
.content{padding:1.5rem 2.5rem 4rem}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1.2rem}

/* MOVIE CARD */
.movie-card{background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border);transition:border-color .3s,transform .3s}
.movie-card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px)}

/* POSTER AREA */
.poster-area{position:relative;aspect-ratio:16/9;overflow:hidden}
.poster-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform 8s cubic-bezier(.25,.1,.25,1),opacity .4s;opacity:0}
.poster-img.loaded{opacity:1}
.movie-card:hover .poster-img{transform:scale(1.05)}
.poster-bg{position:absolute;inset:-15%;width:130%;height:130%;opacity:.75;transition:opacity .6s}
.movie-card:hover .poster-bg{opacity:.9}
.poster-shape{position:absolute;border-radius:50%;mix-blend-mode:screen;filter:blur(45px);opacity:.45;animation:float 14s ease-in-out infinite}
.poster-shape2{position:absolute;mix-blend-mode:screen;filter:blur(65px);opacity:.3;animation:drift 18s ease-in-out infinite reverse}
.poster-area::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(24,24,24,1) 0%,rgba(24,24,24,.65) 30%,rgba(0,0,0,.05) 60%,rgba(0,0,0,.3) 100%);pointer-events:none}
.poster-title{position:absolute;bottom:.8rem;left:1.2rem;right:1.2rem;z-index:2;font-family:'Space Grotesk',sans-serif;font-size:1.45rem;font-weight:700;line-height:1.1;letter-spacing:-.02em;text-shadow:0 2px 12px rgba(0,0,0,.7)}
.poster-director{position:absolute;top:.9rem;left:1.2rem;z-index:2;font-size:.7rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.poster-rating{position:absolute;top:.8rem;right:1.2rem;z-index:2;display:flex;align-items:center;gap:.3rem;background:rgba(0,0,0,.6);border-radius:4px;padding:.2rem .5rem}
.poster-rating .star{color:var(--yellow);font-size:.85rem}
.poster-rating .val{font-size:.85rem;font-weight:700;color:var(--text)}

/* CARD INFO */
.card-info{padding:1rem 1.2rem .5rem}
.card-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.5rem}
.tag{font-size:.68rem;font-weight:600;padding:.15rem .5rem;background:rgba(255,255,255,.06);border-radius:3px;color:var(--dim)}
.card-synopsis{font-size:.82rem;line-height:1.55;color:var(--muted);margin-bottom:.6rem;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* SESSIONS */
.sessions-wrap{padding:.4rem 1.2rem 1.2rem}
.cinema-group{margin-bottom:.8rem}
.cinema-group:last-child{margin-bottom:0}
.cinema-label{font-size:.72rem;font-weight:600;color:var(--dim);margin-bottom:.35rem}
.time-chips{display:flex;flex-wrap:wrap;gap:5px}
.time-chip{font-size:.78rem;font-weight:600;padding:.35rem .7rem;border:1px solid rgba(255,255,255,.12);border-radius:5px;color:var(--text);background:rgba(255,255,255,.04);transition:all .2s;cursor:pointer}
.time-chip:hover{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-dim)}
.time-chip.vose{border-color:rgba(245,197,24,.35);color:var(--yellow);background:var(--yellow-dim)}
.time-chip.imax{border-color:rgba(100,181,246,.4);color:#64b5f6;background:rgba(100,181,246,.08);font-weight:700}
.time-chip.atmos{border-color:rgba(206,147,216,.4);color:#ce93d8;background:rgba(206,147,216,.08);font-weight:700}

/* CINEMA VIEW */
.cinema-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:1rem;overflow:hidden}
.cinema-card:hover{border-color:rgba(255,255,255,.12)}
.cinema-header{padding:1.2rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--surface)}
.cinema-title{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700}
.cinema-count{font-size:.75rem;font-weight:500;color:var(--muted)}
.cinema-body{padding:.5rem 0}
.movie-row{display:flex;gap:1rem;align-items:center;padding:.6rem 1.5rem;transition:background .2s}
.movie-row:hover{background:rgba(255,255,255,.03)}
.movie-row-title{flex:0 0 260px;font-size:.88rem;font-weight:600}
.movie-row-rating{flex:0 0 55px;display:flex;align-items:center;gap:.2rem}
.movie-row-rating .star{color:var(--yellow);font-size:.75rem}
.movie-row-rating .val{font-size:.78rem;font-weight:600;color:var(--dim)}
.movie-row-times{flex:1;display:flex;flex-wrap:wrap;gap:4px}

/* EMPTY */
.empty{text-align:center;padding:5rem 2rem;font-size:.9rem;color:var(--muted)}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:1.5rem 2.5rem;display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted)}

/* ANIMATIONS */
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-18px) scale(1.08)}66%{transform:translate(-18px,12px) scale(.94)}}
@keyframes drift{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-35px,20px) rotate(12deg)}}
@keyframes slowZoom{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.06) translate(-1%,-.5%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.grid>*,.cinema-card{animation:fadeUp .45s ease both}
.grid>*:nth-child(1),.cinema-card:nth-child(1){animation-delay:0s}
.grid>*:nth-child(2),.cinema-card:nth-child(2){animation-delay:.05s}
.grid>*:nth-child(3),.cinema-card:nth-child(3){animation-delay:.08s}
.grid>*:nth-child(4),.cinema-card:nth-child(4){animation-delay:.11s}
.grid>*:nth-child(5),.cinema-card:nth-child(5){animation-delay:.14s}
.grid>*:nth-child(6),.cinema-card:nth-child(6){animation-delay:.17s}
.grid>*:nth-child(7),.cinema-card:nth-child(7){animation-delay:.2s}
.grid>*:nth-child(8),.cinema-card:nth-child(8){animation-delay:.23s}

/* RESPONSIVE */
@media(max-width:768px){
.header,.toolbar,.stats-bar,.content,footer{padding-left:1.2rem;padding-right:1.2rem}
.grid{grid-template-columns:1fr}
.movie-row{flex-direction:column;gap:.3rem;align-items:flex-start}
.movie-row-title{flex:none}
.toolbar{gap:.4rem}
.toolbar-right{margin-left:0;width:100%}
.cinema-select{width:100%;max-width:none}
.poster-title{font-size:1.2rem}
.cinema-header,.cinema-body .movie-row{padding-left:1rem;padding-right:1rem}
.search-wrap{max-width:none}
}
</style>
</head>

// === SEARCH ===
const searchInput=document.getElementById('searchInput');
const searchClear=document.getElementById('searchClear');
searchInput.addEventListener('input',function(){
  searchQuery=this.value.trim().toLowerCase();
  searchClear.classList.toggle('visible',searchQuery.length>0);
  render();
});
searchClear.addEventListener('click',function(){
  searchInput.value='';searchQuery='';this.classList.remove('visible');render();searchInput.focus();
});
// Ctrl+K / Cmd+K to focus search
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();searchInput.focus();searchInput.select()}
  if(e.key==='Escape'&&document.activeElement===searchInput){searchInput.blur()}
});

// === CINEMA FILTER ===
const cinemaFilter=document.getElementById('cinemaFilter');
C.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;cinemaFilter.appendChild(o)});
cinemaFilter.addEventListener('change',render);

// === VIEW TOGGLE ===
document.querySelectorAll('.pill[data-view]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pill[data-view]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    view=btn.dataset.view;render();
  });
});

// === VOSE TOGGLE ===
document.getElementById('voseToggle').addEventListener('click',function(){
  vose=!vose;this.classList.toggle('active',vose);render();
});

function normalize(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()}

function getFiltered(){
  let f=S;
  if(cinemaFilter.value)f=f.filter(s=>s.c===cinemaFilter.value);
  if(vose)f=f.filter(s=>s.l==='VOSE');
  if(searchQuery){
    const q=normalize(searchQuery);
    f=f.filter(s=>normalize(s.m).includes(q)||normalize(s.c).includes(q));
  }
  return f;
}

function renderStats(f){
  const mc=new Set(f.map(s=>s.m)).size,cc=new Set(f.map(s=>s.c)).size,vc=f.filter(s=>s.l==='VOSE').length;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><strong>${mc}</strong> peliculas</div>`+
    `<div class="stat"><strong>${f.length}</strong> sesiones</div>`+
    `<div class="stat"><strong>${cc}</strong> cines</div>`+
    `<div class="stat"><strong>${vc}</strong> VOSE</div>`;
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function posterHTML(title){
  const imgUrl=POSTERS[title];
  const v=VIS[title]||{bg:'radial-gradient(ellipse at 50% 50%,#1a1a1a,#000)',s1:'#555',s2:'#333'};
  const d1=(Math.random()*6).toFixed(1),d2=(Math.random()*10).toFixed(1);
  // Always render CSS fallback; if image URL exists, add img on top
  let h=`<div class="poster-area">`;
  h+=`<div class="poster-bg" style="background:${v.bg};animation:slowZoom 22s ease-in-out infinite alternate;animation-delay:${d1}s"></div>`;
  h+=`<div class="poster-shape" style="background:${v.s1};left:30%;top:30%;width:180px;height:180px;animation-delay:-${d1}s"></div>`;
  h+=`<div class="poster-shape2" style="background:${v.s2};left:60%;top:55%;width:140px;height:140px;animation-delay:-${d2}s"></div>`;
  if(imgUrl){
    h+=`<img class="poster-img" src="${imgUrl}" alt="" loading="lazy" onload="this.classList.add('loaded')" onerror="this.style.display='none'">`;
  }
  return h;
}

function render(){
  const f=getFiltered();
  renderStats(f);
  if(view==='movies')renderMovies(f);
  else renderCinemas(f);
}

function renderMovies(f){
  const container=document.getElementById('container');
  const map=new Map();
  f.forEach(s=>{
    if(!map.has(s.m)){const mv=M.find(x=>x.title===s.m)||{};map.set(s.m,{...mv,title:s.m,sts:[]})}
    map.get(s.m).sts.push(s);
  });
  if(!map.size){container.className='empty';container.innerHTML='No hay sesiones con estos filtros.';return}
  const movies=[...map.values()].sort((a,b)=>(b.rating||0)-(a.rating||0));
  container.className='grid';
  container.innerHTML=movies.map(mv=>{
    const byCinema={};
    mv.sts.forEach(s=>{(byCinema[s.c]=byCinema[s.c]||[]).push(s)});
    const ratingHTML=mv.rating?`<div class="poster-rating"><span class="star">\u2605</span><span class="val">${mv.rating.toFixed(1)}</span></div>`:'';
    const tags=[mv.genre,mv.dur?mv.dur+' min':''].filter(Boolean);
    const tagsHTML=tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    const groups=Object.entries(byCinema).sort((a,b)=>a[0].localeCompare(b[0])).map(([cinema,sts])=>{
      const chips=sts.sort((a,b)=>a.t.localeCompare(b.t)).map(s=>{
        let cls='time-chip';
        if(s.l==='VOSE')cls+=' vose';
        if(s.f==='IMAX')cls+=' imax';
        else if(s.f==='Atmos')cls+=' atmos';
        return`<span class="${cls}">${s.t}${s.l==='VOSE'?' VOSE':''}${s.f!=='2D'?' '+s.f:''}</span>`;
      }).join('');
      return`<div class="cinema-group"><div class="cinema-label">${esc(cinema)}</div><div class="time-chips">${chips}</div></div>`;
    }).join('');
    return`<div class="movie-card">
      ${posterHTML(mv.title)}
        <div class="poster-director">${esc(mv.director)}</div>
        ${ratingHTML}
        <div class="poster-title">${esc(mv.title)}</div>
      </div>
      <div class="card-info">
        <div class="card-tags">${tagsHTML}</div>
        <div class="card-synopsis">${esc(mv.synopsis)}</div>
      </div>
      <div class="sessions-wrap">${groups}</div>
    </div>`;
  }).join('');
}

function renderCinemas(f){
  const container=document.getElementById('container');
  const map=new Map();
  f.forEach(s=>{(map.has(s.c)?map.get(s.c):map.set(s.c,[]).get(s.c)).push(s)});
  if(!map.size){container.className='empty';container.innerHTML='No hay sesiones con estos filtros.';return}
  container.className='';
  container.innerHTML=[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([cinema,sts])=>{
    const byMovie={};
    sts.forEach(s=>{(byMovie[s.m]=byMovie[s.m]||[]).push(s)});
    const rows=Object.entries(byMovie).sort((a,b)=>a[0].localeCompare(b[0])).map(([movie,sessions])=>{
      const mv=M.find(x=>x.title===movie)||{};
      const chips=sessions.sort((a,b)=>a.t.localeCompare(b.t)).map(s=>{
        let cls='time-chip';
        if(s.l==='VOSE')cls+=' vose';
        if(s.f==='IMAX')cls+=' imax';
        else if(s.f==='Atmos')cls+=' atmos';
        return`<span class="${cls}">${s.t}${s.l==='VOSE'?' VOSE':''}${s.f!=='2D'?' '+s.f:''}</span>`;
      }).join('');
      return`<div class="movie-row">
        <div class="movie-row-title">${esc(movie)}</div>
        <div class="movie-row-rating">${mv.rating?`<span class="star">\u2605</span><span class="val">${mv.rating.toFixed(1)}</span>`:''}</div>
        <div class="movie-row-times">${chips}</div>
      </div>`;
    }).join('');
    return`<div class="cinema-card">
      <div class="cinema-header">
        <div class="cinema-title">${esc(cinema)}</div>
        <div class="cinema-count">${sts.length} sesiones \u00b7 ${Object.keys(byMovie).length} peliculas</div>
      </div>
      <div class="cinema-body">${rows}</div>
    </div>`;
  }).join('');
}

render();
</script>
