// === Tab switching ===
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  document.getElementById('peliculas-tab').style.display = name === 'peliculas' ? '' : 'none';
  document.getElementById('conciertos-tab').style.display = name === 'conciertos' ? '' : 'none';
  document.getElementById('cines-tab').style.display = name === 'cines' ? '' : 'none';
  if (name === 'cines') loadCinemas();
  if (name === 'peliculas') renderMovies();
  if (name === 'conciertos') { renderConcertStats(); renderConcertDateFilters(); renderConcerts(); }
}
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

function renderStats() {
  const cinemaCount = new Set(allShowtimes.map(s => s.cinema)).size;
  const voseCount = allShowtimes.filter(s => s.language === 'VOSE').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-box"><div class="num">${allMovies.length}</div><div class="label">Películas</div></div>
    <div class="stat-box"><div class="num">${allShowtimes.length}</div><div class="label">Sesiones</div></div>
    <div class="stat-box"><div class="num">${cinemaCount}</div><div class="label">Cines</div></div>
    <div class="stat-box"><div class="num">${voseCount}</div><div class="label">VOSE</div></div>
  `;
}

function renderLanguageFilters() {
  const langs = [...new Set(allShowtimes.map(s => s.language))].sort();
  const bar = document.getElementById('lang-filters');
  bar.innerHTML = `<div class="filter-btn ${activeLanguageFilter === '' ? 'active' : ''}" data-lang="">Todos</div>`;
  langs.forEach(lang => {
    bar.innerHTML += `<div class="filter-btn ${activeLanguageFilter === lang ? 'active' : ''}" data-lang="${lang}">${lang}</div>`;
  });
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeLanguageFilter = btn.dataset.lang;
      renderLanguageFilters();
      renderMovies();
    });
  });
}

function getSearchTerm() {
  const el = document.getElementById('searchInput');
  return el ? el.value.trim().toLowerCase() : '';
}

function renderMovies() {
  const container = document.getElementById('movies-container');
  const selectedCinema = cinemaFilter.value;
  const search = getSearchTerm();
  let filtered = allShowtimes;
  if (selectedCinema) filtered = filtered.filter(s => s.cinema === selectedCinema);
  if (activeLanguageFilter) filtered = filtered.filter(s => s.language === activeLanguageFilter);
  if (search) {
    filtered = filtered.filter(s => {
      const mv = allMovies.find(m => m.title === s.movie) || {};
      return s.movie.toLowerCase().includes(search)
        || s.cinema.toLowerCase().includes(search)
        || (mv.director || '').toLowerCase().includes(search)
        || (mv.genre || '').toLowerCase().includes(search);
    });
  }
  const movieMap = new Map();
  filtered.forEach(s => {
    if (!movieMap.has(s.movie)) {
      const mv = allMovies.find(m => m.title === s.movie) || {};
      movieMap.set(s.movie, { ...mv, title: s.movie, showtimes: [] });
    }
    movieMap.get(s.movie).showtimes.push(s);
  });
  if (movieMap.size === 0) {
    container.className = 'empty';
    container.textContent = 'No hay sesiones para esta fecha / filtro.';
    return;
  }
  const movies = [...movieMap.values()].sort((a, b) => (b.rating || 0) - (a.rating || 0));
  const cinemaNames = [...new Set(allShowtimes.map(s => s.cinema))].sort();
  if (cinemaFilter.options.length <= 1) {
    cinemaNames.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      cinemaFilter.appendChild(opt);
    });
  }
  container.className = 'movies-grid';
  container.innerHTML = movies.map(mv => {
    const byCinema = {};
    mv.showtimes.forEach(s => {
      if (!byCinema[s.cinema]) byCinema[s.cinema] = [];
      byCinema[s.cinema].push(s);
    });
    const ytId = YOUTUBE_TRAILERS[mv.title];
    const hasPoster = posterCache[mv.title] || mv.poster_url;
    let posterHtml;
    if (ytId) {
      posterHtml = `<div class="yt-poster" onclick="event.stopPropagation();openTrailer('${ytId}')" title="Ver tráiler">
        <img src="https://img.youtube.com/vi/${ytId}/hqdefault.jpg" alt="${esc(mv.title)}" loading="lazy"
          onerror="this.parentElement.outerHTML='<div class=\\'poster-placeholder\\'>${esc(mv.title).replace(/'/g,"\\'")}</div>'">
        <div class="play-btn"></div>
      </div>`;
    } else if (hasPoster) {
      posterHtml = `<img class="poster" src="${hasPoster}" alt="${esc(mv.title)}" loading="lazy"
        onerror="this.outerHTML='<div class=\\'poster-placeholder\\'>${esc(mv.title).replace(/'/g,"\\'")}</div>'">`;
    } else {
      posterHtml = generatePosterHtml(mv.title, mv.genre);
    }
    const ratingHtml = mv.rating
      ? `<div class="rating">\u2605 ${mv.rating.toFixed(1)}<span style="color:var(--muted);font-weight:400;font-size:0.75rem;margin-left:0.15rem">/5</span></div>` : '';
    const metaParts = [mv.director, mv.genre, mv.duration_min ? `${mv.duration_min} min` : null].filter(Boolean);
    const synopsisHtml = mv.synopsis
      ? `<div class="synopsis" onclick="event.stopPropagation();this.classList.toggle('expanded')">${esc(mv.synopsis)}</div>` : '';
    const cinemaGroups = Object.entries(byCinema).map(([cinema, sts]) => {
      const chips = sts
        .sort((a, b) => a.time.localeCompare(b.time))
        .map(s => {
          let cls = 'chip';
          if (s.language === 'VOSE') cls += ' vose';
          if (s.format === 'IMAX') cls += ' imax';
          else if (s.format === 'Atmos') cls += ' atmos';
          else if (s.format === '3D') cls += ' three-d';
          const label = s.time + (s.language === 'VOSE' ? ' VOSE' : '') + (s.format !== '2D' ? ' ' + s.format : '');
          return `<span class="${cls}">${label}</span>`;
        }).join('');
      return `<div class="cinema-group"><div class="cinema-name">${esc(cinema)}</div><div class="time-chips">${chips}</div></div>`;
    }).join('');
    const sessionCount = mv.showtimes.length;
    const cinemaCount = Object.keys(byCinema).length;
    return `
      <div class="movie-card" onclick="this.classList.toggle('expanded')">
        <div class="top">
          ${posterHtml}
          <div class="info">
            <div class="title">${esc(mv.title)}</div>
            <div class="meta">${esc(metaParts.join(' \u00b7 '))}</div>
            ${ratingHtml}
            ${synopsisHtml}
          </div>
        </div>
        <div class="showtimes-toggle">
          <span>${sessionCount} sesiones en ${cinemaCount} cine${cinemaCount > 1 ? 's' : ''}</span>
          <span class="arrow">\u25BC</span>
        </div>
        <div class="showtimes-section">${cinemaGroups}</div>
      </div>`;
  }).join('');
}

function loadCinemas() {
  const container = document.getElementById('cinemas-container');
  if (allCinemas.length === 0) {
    container.className = 'empty';
    container.textContent = 'No hay cines en la base de datos.';
    return;
  }
  const moviesByCinema = {};
  allShowtimes.forEach(s => {
    if (!moviesByCinema[s.cinema]) moviesByCinema[s.cinema] = new Set();
    moviesByCinema[s.cinema].add(s.movie);
  });
  const search = getSearchTerm();
  let cinemalist = allCinemas;
  if (search) {
    cinemalist = cinemalist.filter(c =>
      c.name.toLowerCase().includes(search)
      || (c.address || '').toLowerCase().includes(search)
    );
  }
  const sorted = [...cinemalist].sort((a, b) => {
    const aCount = moviesByCinema[a.name] ? moviesByCinema[a.name].size : 0;
    const bCount = moviesByCinema[b.name] ? moviesByCinema[b.name].size : 0;
    if (aCount && !bCount) return -1;
    if (!aCount && bCount) return 1;
    return a.name.localeCompare(b.name);
  });
  container.className = 'cinemas-list';
  container.innerHTML = sorted.map(c => {
    const movieCount = moviesByCinema[c.name] ? moviesByCinema[c.name].size : 0;
    const showtimeCount = allShowtimes.filter(s => s.cinema === c.name).length;
    const noSessions = movieCount === 0;
    const cls = noSessions ? 'cinema-card no-sessions' : 'cinema-card';
    const label = noSessions ? 'Sin sesiones disponibles' : `${movieCount} películas \u00b7 ${showtimeCount} sesiones`;
    const onclick = noSessions ? '' : `onclick="selectCinema('${esc(c.name).replace(/'/g, "\\'")}')"`;
    return `
      <div class="${cls}" ${onclick}>
        <h3>${esc(c.name)}</h3>
        <div class="addr">${esc(c.address || '')}</div>
        <div class="movie-count">${label}</div>
      </div>`;
  }).join('');
}

}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function updateSearchHint() {
  const search = getSearchTerm();
  const hint = document.getElementById('searchHint');
  if (!search) { hint.innerHTML = ''; return; }
  const movieMatches = new Set();
  allShowtimes.forEach(s => {
    const mv = allMovies.find(m => m.title === s.movie) || {};
    if (s.movie.toLowerCase().includes(search)
      || s.cinema.toLowerCase().includes(search)
      || (mv.director || '').toLowerCase().includes(search)
      || (mv.genre || '').toLowerCase().includes(search)) {
      movieMatches.add(s.movie);
    }
  });
  const concertMatches = futureConcerts.filter(c =>
    c.event_name.toLowerCase().includes(search)
    || c.artist.toLowerCase().includes(search)
    || c.venue.toLowerCase().includes(search)
    || (c.genre || '').toLowerCase().includes(search)
  );
  const parts = [];
  if (movieMatches.size > 0) parts.push(`<span class="hint-movies" onclick="switchTab('peliculas')">${movieMatches.size} película${movieMatches.size > 1 ? 's' : ''}</span>`);
  if (concertMatches.length > 0) parts.push(`<span class="hint-concerts" onclick="switchTab('conciertos')">${concertMatches.length} concierto${concertMatches.length > 1 ? 's' : ''}</span>`);
  hint.innerHTML = parts.length ? parts.join(' \u00b7 ') : '<span>Sin resultados</span>';
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
}

function renderConcertStats() {
  const venueCount = new Set(futureConcerts.map(c => c.venue)).size;
  const withTickets = futureConcerts.filter(c => c.ticket_url).length;
  document.getElementById('concert-stats').innerHTML = `
    <div class="stat-box"><div class="num" style="color:var(--accent)">${futureConcerts.length}</div><div class="label">Conciertos</div></div>
    <div class="stat-box"><div class="num" style="color:var(--accent)">${venueCount}</div><div class="label">Salas</div></div>

}

function renderConcertDateFilters() {
  const dates = [...new Set(futureConcerts.map(c => c.date))].sort();
  const bar = document.getElementById('concert-date-filters');
  let html = `<div class="date-pill ${activeConcertDate === '7d' ? 'active' : ''}" data-date="7d">7 días</div>`;
  html += `<div class="date-pill ${activeConcertDate === '' ? 'active' : ''}" data-date="">Todos</div>`;
  dates.slice(0, 14).forEach(d => {
    html += `<div class="date-pill ${activeConcertDate === d ? 'active' : ''}" data-date="${d}">${fmtDate(d)}</div>`;
  });
  bar.innerHTML = html;
  bar.querySelectorAll('.date-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeConcertDate = btn.dataset.date;
      renderConcertDateFilters();
      renderConcerts();
    });
  });
}

function renderConcerts() {
  const container = document.getElementById('concerts-container');
  const search = getSearchTerm();
  let filtered = futureConcerts;
  if (activeConcertDate === '7d') filtered = filtered.filter(c => c.date <= weekFromNow);
  else if (activeConcertDate) filtered = filtered.filter(c => c.date === activeConcertDate);
  if (activeVenueFilter) filtered = filtered.filter(c => c.venue === activeVenueFilter);
  if (search) {
    filtered = filtered.filter(c =>
      c.event_name.toLowerCase().includes(search)
      || c.artist.toLowerCase().includes(search)
      || c.venue.toLowerCase().includes(search)
      || (c.genre || '').toLowerCase().includes(search)
    );
  }
  if (filtered.length === 0) {
    container.className = 'empty';
    container.textContent = 'No hay conciertos disponibles.';
    return;
  }
  filtered.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time) || a.event_name.localeCompare(b.event_name));
  container.className = 'concerts-grid';
  container.innerHTML = filtered.map(c => {
    const initial = (c.event_name || '?')[0].toUpperCase();
    const hue = (c.event_name || '').split('').reduce((a,ch) => a + ch.charCodeAt(0), 0) % 360;
    const bgStyle = `background:linear-gradient(135deg,hsl(${hue},60%,15%),hsl(${(hue+60)%360},50%,8%))`;
    const placeholderHtml = `<div class="img-placeholder" style="${bgStyle}"><span style="font-size:4rem;font-weight:900;opacity:0.2">${initial}</span></div>`;
    const imgHtml = c.image_url
      ? `${placeholderHtml}<img src="${c.image_url}" alt="" loading="lazy" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
      : placeholderHtml;

    const dateBadge = c.date ? `<div class="date-badge">${fmtDate(c.date)}${c.time ? ' · ' + c.time : ''}</div>` : '';

    const venueHtml = c.venue ? `<div class="venue-name">${esc(c.venue)}</div>` : '';

    const details = [];
    if (c.price_range) details.push(`<span class="price-tag">${esc(c.price_range)}</span>`);
    if (c.genre) details.push(`<span class="time-tag">${esc(c.genre)}</span>`);
    const detailsHtml = details.length ? `<div class="event-details">${details.join('')}</div>` : '';

    const footerHtml = c.ticket_url
      ? `<a class="ticket-btn" href="${c.ticket_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">TICKETS</a>`
      : `<div class="no-ticket-btn">SIN VENTA ONLINE</div>`;

    return `
      <div class="concert-card">
        <div class="card-image">
          ${imgHtml}
          ${dateBadge}
          <div class="card-overlay">
            <div class="event-name">${esc(c.event_name)}</div>
            ${venueHtml}
          </div>
        </div>
        <div class="card-body">
          ${detailsHtml}
        </div>
        <div class="card-footer">${footerHtml}</div>
      </div>`;
  }).join('');
}

allMovies.forEach(m => { if (m.poster_url) posterCache[m.title] = m.poster_url; });

function openTrailer(ytId) {
  const modal = document.getElementById('trailerModal');
  const frame = document.getElementById('trailerFrame');
  frame.src = `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1`;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeTrailer(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('close-btn')) return;
  const modal = document.getElementById('trailerModal');
  const frame = document.getElementById('trailerFrame');
  frame.src = '';
  modal.classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrailer(); });
</script>
