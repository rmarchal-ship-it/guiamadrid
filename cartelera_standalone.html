<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuíaMadrid — Cartelera y Conciertos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --bg-surface: #0a0a0a;
    --card: #111;
    --card-hover: #1a1a1a;
    --accent: #ff4d00;
    --text: #fff;
    --muted: #777;
    --border: #1a1a1a;
    --gold: #f5c518;
    --concert-accent: #ff4d00;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-pill: 999px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  /* === HEADER === */
  header {
    background: var(--bg);
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.85);
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    text-transform: uppercase;
  }
  header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .controls input[type="date"],
  .controls select {
    background: var(--card); color: var(--text);
    border: 1px solid #333; border-radius: var(--radius-sm);
    padding: 0.45rem 0.7rem; font-size: 0.85rem;
    font-family: inherit;
  }
  /* === SEARCH === */
  .search-bar {
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 2rem 0;
  }
  .search-bar input {
    width: 100%; max-width: 640px; padding: 1rem 1.2rem 1rem 3.2rem;
    border: 1px solid #333; border-radius: var(--radius-pill);
    background: #111; color: var(--text); font-size: 1rem;
    font-family: inherit;
    outline: none; transition: border-color 0.3s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: #555; }
  .search-wrapper { position: relative; width: 100%; max-width: 640px; }
  .search-wrapper::before {
    content: '\1F50D'; position: absolute; left: 1.1rem; top: 50%;
    transform: translateY(-50%); font-size: 1.1rem; pointer-events: none;
  }
  .search-hint {
    text-align: center; padding: 0.6rem 0 0; font-size: 0.8rem; color: var(--muted);
    min-height: 1.5rem;
  }
  .search-hint span { cursor: pointer; transition: color 0.2s; }
  .search-hint span:hover { color: var(--text); }
  .search-hint .hint-movies { color: var(--accent); }
  .search-hint .hint-concerts { color: var(--accent); }
  /* === TABS === */
  .tabs {
    display: flex; gap: 0; margin: 1.5rem 2rem 0;
    border-bottom: 1px solid #1a1a1a;
  }
  .tab {
    padding: 0.8rem 1.6rem; background: transparent;
    border: none; border-bottom: 3px solid transparent;
    cursor: pointer; font-size: 0.85rem; color: var(--muted);
    font-family: inherit; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .tab .tab-count {
    font-size: 0.65rem; background: #222; color: var(--muted);
    border-radius: var(--radius-pill); padding: 0.15rem 0.5rem;
    margin-left: 0.5rem; font-weight: 700;
  }
  .tab.active .tab-count { background: var(--accent); color: #fff; }
  /* === CONTENT === */
  .content { padding: 1.5rem 2rem 3rem; }
  .section-title {
    font-size: 1.1rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 1.2rem; color: var(--text);
  }
  /* === STATS === */
  .stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-box {
    background: #111; border: 1px solid #1a1a1a;
    border-radius: var(--radius-md); padding: 1rem 1.4rem;
    flex: 1; min-width: 110px; transition: border-color 0.2s;
  }
  .stat-box:hover { border-color: var(--accent); }
  .stat-box .num { font-size: 2rem; font-weight: 900; color: var(--accent); line-height: 1; }
  .stat-box .label {
    font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.5px; margin-top: 0.3rem; font-weight: 700;
  }
  /* === MOVIE GRID === */
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.5rem;
  }
  .movie-card {
    background: #111; border-radius: var(--radius-md); overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    border: none;
  }
  .movie-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(255,77,0,0.15);
  }
  .movie-card .top { display: flex; gap: 1rem; padding: 1rem; cursor: pointer; }
  .movie-card .poster {
    width: 130px; height: 195px; border-radius: var(--radius-sm);
    object-fit: cover; background: #222; flex-shrink: 0;
  }
  .movie-card .poster-placeholder {
    width: 130px; height: 195px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative; overflow: hidden;
    background: #222; color: var(--muted);
    font-size: 0.7rem; text-align: center; padding: 0.5rem;
    font-weight: 700; line-height: 1.3;
  }
  .yt-poster {
    width: 130px; height: 195px; border-radius: var(--radius-sm);
    position: relative; overflow: hidden; flex-shrink: 0;
    cursor: pointer; background: #222;
  }
  .yt-poster img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s, filter 0.3s;
  }
  .yt-poster:hover img { transform: scale(1.08); filter: brightness(0.6); }
  .yt-poster .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 40px; height: 40px; background: var(--accent);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s;
    box-shadow: 0 4px 16px rgba(255,77,0,0.4);
  }
  .yt-poster:hover .play-btn { opacity: 1; }
  .yt-poster .play-btn::after {
    content: ''; width: 0; height: 0;
    border-style: solid; border-width: 8px 0 8px 14px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
  }
  /* Trailer modal */
  .trailer-modal {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.95); display: none;
    align-items: center; justify-content: center;
    padding: 1rem;
  }
  .trailer-modal.active { display: flex; }
  .trailer-modal .modal-content {
    position: relative; width: 100%; max-width: 900px;
    aspect-ratio: 16/9; border-radius: var(--radius-md); overflow: hidden;
    box-shadow: 0 4px 60px rgba(0,0,0,0.8);
  }
  .trailer-modal iframe { width: 100%; height: 100%; border: none; }
  .trailer-modal .close-btn {
    position: absolute; top: -40px; right: 0;
    background: none; border: none; color: #fff;
    font-size: 2rem; cursor: pointer; padding: 0.2rem 0.5rem;
    opacity: 0.6; transition: opacity 0.2s;
  }
  .trailer-modal .close-btn:hover { opacity: 1; }
  /* Genre posters */
  .gen-poster {
    width: 130px; height: 195px; border-radius: var(--radius-sm);
    position: relative; overflow: hidden; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding: 0.4rem; text-align: center;
  }
  .gen-poster .gp-title {
    font-size: 0.55rem; font-weight: 800; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8); z-index: 2;
    line-height: 1.2; max-height: 3rem; overflow: hidden;
    letter-spacing: 0.3px; text-transform: uppercase;
  }
  .gen-poster .gp-genre {
    font-size: 0.45rem; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 1px; z-index: 2;
    margin-bottom: 0.2rem;
  }
  .gen-poster .gp-icon {
    font-size: 1.8rem; z-index: 2; margin-bottom: 0.3rem;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .gen-poster::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: inherit; opacity: 0.15;
  }
  .gen-poster::after {
    content: ''; position: absolute; inset: -50%; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    animation: grain 4s steps(8) infinite;
    pointer-events: none;
  }
  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-5%, -5%); }
    30% { transform: translate(3%, -8%); }
    50% { transform: translate(-3%, 5%); }
    70% { transform: translate(7%, 2%); }
    90% { transform: translate(-2%, 4%); }
  }
  .gen-poster .gp-particles {
    position: absolute; inset: 0; z-index: 1; overflow: hidden;
  }
  .gen-poster .gp-particles span {
    position: absolute; border-radius: 50%; opacity: 0.4;
    animation: float-up 4s ease-in infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(100%) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    100% { transform: translateY(-100%) scale(1); opacity: 0; }
  }
  .gp-scanline {
    position: absolute; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,0.15); z-index: 2;
    animation: scan 3s linear infinite;
  }
  @keyframes scan { 0% { top: -2px; } 100% { top: 100%; } }
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; } 96% { opacity: 0.4; }
    97% { opacity: 0.9; } 98% { opacity: 0.3; }
  }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: inset 0 0 15px rgba(0,200,255,0.2); }
    50% { box-shadow: inset 0 0 25px rgba(0,200,255,0.5); }
  }
  @keyframes bounce-icon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  .movie-card .info { flex: 1; min-width: 0; }
  .movie-card .title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.3rem; line-height: 1.3; }
  .movie-card .meta { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
  .movie-card .synopsis {
    font-size: 0.78rem; color: #555; margin-top: 0.4rem; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    cursor: pointer;
  }
  .movie-card .synopsis.expanded { -webkit-line-clamp: unset; display: block; }
  .movie-card .rating {
    display: inline-flex; align-items: center; gap: 0.25rem;
    color: var(--gold); font-weight: 700; font-size: 0.9rem; margin-top: 0.3rem;
    background: rgba(245, 197, 24, 0.08); padding: 0.15rem 0.5rem;
    border-radius: var(--radius-sm);
  }
  .movie-card .showtimes-toggle {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid #1a1a1a; padding: 0.6rem 1rem;
    cursor: pointer; color: var(--muted); font-size: 0.78rem;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  .movie-card .showtimes-toggle:hover { color: var(--text); }
  .movie-card .showtimes-toggle .arrow {
    transition: transform 0.3s; font-size: 0.7rem;
  }
  .movie-card.expanded .showtimes-toggle .arrow { transform: rotate(180deg); }
  .movie-card .showtimes-section {
    border-top: 1px solid #1a1a1a; padding: 0 1rem;
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .movie-card.expanded .showtimes-section { max-height: 2000px; padding: 0.8rem 1rem; }
  .movie-card .cinema-group { margin-bottom: 0.6rem; }
  .movie-card .cinema-group:last-child { margin-bottom: 0; }
  .movie-card .cinema-name {
    font-size: 0.72rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem;
    font-weight: 700;
  }
  .time-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .chip {
    background: #1a1a1a; border: 1px solid #333;
    border-radius: 4px; padding: 0.2rem 0.5rem;
    font-size: 0.78rem; white-space: nowrap;
  }
  .chip.vose { border-color: #4caf50; color: #81c784; }
  .chip.imax { border-color: #2196f3; color: #64b5f6; }
  .chip.atmos { border-color: #9c27b0; color: #ce93d8; }
  .chip.three-d { border-color: #ff9800; color: #ffb74d; }
  /* === CINEMAS === */
  .cinemas-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .cinema-card {
    background: #111; border-radius: var(--radius-md); padding: 1.2rem;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  }
  .cinema-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(255,77,0,0.1); }
  .cinema-card.no-sessions { opacity: 0.4; cursor: default; }
  .cinema-card.no-sessions:hover { transform: none; box-shadow: none; }
  .cinema-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
  .cinema-card .addr { font-size: 0.8rem; color: var(--muted); }
  .cinema-card .movie-count { font-size: 0.75rem; color: var(--accent); margin-top: 0.4rem; font-weight: 600; }
  .cinema-card.no-sessions .movie-count { color: var(--muted); }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 1rem; }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  /* === FILTERS === */
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .filter-bar select {
    background: #111; color: var(--text);
    border: 1px solid #333; border-radius: var(--radius-sm);
    padding: 0.45rem 0.7rem; font-size: 0.85rem; font-family: inherit;
  }
  .filter-btn {
    background: #111; border: 1px solid #333;
    border-radius: var(--radius-pill); padding: 0.4rem 1rem;
    color: var(--muted); cursor: pointer; font-size: 0.78rem;
    font-family: inherit; font-weight: 600; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* === CONCERT CARDS — Ministry of Sound style === */
  .concert-filters {
    display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
  }
  .concert-filters select {
    background: #111; color: var(--text);
    border: 1px solid #333; border-radius: var(--radius-sm);
    padding: 0.45rem 0.7rem; font-size: 0.85rem; font-family: inherit;
    max-width: 250px; flex-shrink: 0;
  }
  .date-filters { display: flex; gap: 0.4rem; flex-wrap: nowrap; flex: 1; overflow-x: auto; padding-bottom: 0.3rem; -webkit-overflow-scrolling: touch; }
  .date-filters::-webkit-scrollbar { height: 0; }
  .date-pill {
    background: #111; border: 1px solid #333;
    border-radius: var(--radius-pill); padding: 0.4rem 1rem;
    color: var(--muted); cursor: pointer; font-size: 0.78rem;
    font-family: inherit; font-weight: 600;
    transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
    white-space: nowrap; flex-shrink: 0;
  }
  .date-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .date-pill:hover { border-color: var(--accent); color: var(--accent); }
  .concerts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
  }
  .concert-card {
    background: #111; border-radius: var(--radius-md); overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    display: flex; flex-direction: column;
  }
  .concert-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 48px rgba(255,77,0,0.12);
  }
  .concert-card .card-image {
    width: 100%; aspect-ratio: 1/1; position: relative; overflow: hidden;
    background: #1a1a1a;
  }
  .concert-card .card-image img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s;
  }
  .concert-card:hover .card-image img { transform: scale(1.08); }
  .concert-card .card-image .img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem; opacity: 0.15;
    background: linear-gradient(135deg, #1a0a0a 0%, #2a1a0a 50%, #0a0a1a 100%);
  }
  .concert-card .card-image::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 70%; background: linear-gradient(transparent, rgba(0,0,0,0.9));
    pointer-events: none;
  }
  .concert-card .date-badge {
    position: absolute; top: 0.8rem; left: 0.8rem; z-index: 2;
    background: var(--accent); color: #fff;
    padding: 0.3rem 0.7rem; border-radius: var(--radius-sm);
    font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .concert-card .card-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
    padding: 1rem 1rem 0.8rem;
  }
  .concert-card .card-overlay .event-name {
    font-size: 1.1rem; font-weight: 800; line-height: 1.2;
    text-transform: uppercase; letter-spacing: 0.3px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .concert-card .card-overlay .venue-name {
    font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 0.2rem;
    font-weight: 500;
  }
  .concert-card .card-body {
    padding: 0.8rem 1rem; display: flex; flex-direction: column; gap: 0.2rem; flex: 1;
  }
  .concert-card .event-details {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    font-size: 0.75rem;
  }
  .concert-card .price-tag { color: #81c784; font-weight: 600; }
  .concert-card .time-tag { color: var(--muted); }
  .concert-card .card-footer {
    padding: 0 1rem 1rem; margin-top: auto;
  }
  .concert-card .ticket-btn {
    display: block; width: 100%; text-align: center;
    background: var(--accent); color: #fff;
    text-decoration: none; font-size: 0.8rem; font-weight: 800;
    font-family: inherit; text-transform: uppercase; letter-spacing: 1px;
    padding: 0.7rem; border-radius: var(--radius-sm);
    transition: background 0.2s, transform 0.15s;
    border: none; cursor: pointer;
  }
  .concert-card .ticket-btn:hover { background: #e64400; transform: translateY(-1px); }
  .concert-card .no-ticket-btn {
    display: block; width: 100%; text-align: center;
    background: transparent; color: #444;
    text-decoration: none; font-size: 0.8rem; font-weight: 700;
    font-family: inherit; text-transform: uppercase; letter-spacing: 1px;
    padding: 0.7rem; border-radius: var(--radius-sm);
    border: 1px solid #333;
  }
  /* === RESPONSIVE === */
  @media (min-width: 1400px) {
    .concerts-grid { grid-template-columns: repeat(5, 1fr); }
  }
  @media (min-width: 1200px) and (max-width: 1399px) {
    .concerts-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 900px) {
    .concerts-grid { grid-template-columns: repeat(2, 1fr); }
    .movies-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .movies-grid { grid-template-columns: 1fr; }
    .concerts-grid { grid-template-columns: 1fr; }
    header { padding: 1rem; }
    .content { padding: 1rem; }
    .search-bar { padding: 1rem 1rem 0; }
    .tabs { margin: 1rem 1rem 0; }
    .concert-filters { flex-direction: column; gap: 0.5rem; }
    .stats { gap: 0.5rem; }
    .stat-box { padding: 0.7rem 1rem; }
    .stat-box .num { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1><span>GUÍA</span>MADRID</h1>
  <div class="controls">
    <label>Fecha:</label>
    <input type="date" id="datePicker" value="2026-04-12">
  </div>

<script>
const EMBEDDED_MOVIES = [{"id": 1, "title": "5 centímetros por segundo", "director": "Makoto Shinkai", "genre": "Animación, Romántico", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/20/03/25/13/22/4824056.jpg", "rating": null, "synopsis": "Takaki Tono y Akari Shinohara eran grandes amigos en la escuela primaria, pero tras graduarse tomaron caminos separados a pesar de lo que sentían el uno por el otro. No llegó a pasar nada entre los dos, solo el tiempo. Un día, en medio de una intensa nevada, Takaki vuelve a ver a Akari. La película cuenta tres historias que narran varias etapas en la vida de los protagonistas, cada una de ellas desde un punto de vista distinto.", "sensacine_id": "180315", "tmdb_id": null}, {"id": 2, "title": "A una isla de ti", "director": "Alexis Morante", "genre": "Romántico", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/44/89/448950d20585017e8fe377448875eccd.jpg", "rating": null, "synopsis": "Un chef con el corazón roto decide pasar unas vacaciones en Gran Canaria junto a su mejor amigo. Allí se enamora de la isla, su gente, sus playas y su gastronomía, descubriendo la magia y el encanto de cada rincón.Sin embargo, sucede lo que nadie podía imaginar cuando su corazón se ve atraído por alguien sorprendente: el padre de su mejor amigo. Entre emociones, descubrimientos y conflictos personales, vive un verano que transformará su vida para siempre y sus sentimientos de maneras que jamás imaginó.", "sensacine_id": "1000031688", "tmdb_id": null}, {"id": 3, "title": "Altas capacidades", "director": "Víctor García León", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/44/0d/440d7b47444af051761a619970d13a3b.jpg", "rating": null, "synopsis": "Alicia y Gonzalo, un matrimonio clase media, ven abrirse ante ellos una ocasión inesperada: conseguir plaza para su hijo Fer en un exclusivo centro educativo privado y no religioso. La posibilidad de acceder a ese entorno selecto les deslumbra, porque no solo promete una mejor formación para el niño, sino también la entrada a un círculo privilegiado de contactos, oportunidades profesionales y una posición social más ventajosa. Aunque aseguran que todo lo hacen pensando en el bienestar de su hijo, el movimiento también despierta ambiciones personales largamente contenidas. A medida que se adentran en ese nuevo mundo de apariencias y estatus, comienzan a tensionarse sus valores, sus inseguridades y sus convicciones éticas. Entre el deseo de ascenso social y la fidelidad a sus propios principios, la pareja se enfrenta a decisiones que pondrán a prueba su coherencia. En ese choque entre aspiración y conciencia, terminarán cuestionando verdades que siempre habían dado por indiscutibles.", "sensacine_id": "1000027233", "tmdb_id": null}, {"id": 4, "title": "Amarga Navidad", "director": "Pedro Almodóvar", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/60/ff/60ff5df4d1e858aa504693e07468e58d.jpg", "rating": null, "synopsis": "Elsa es una directora de publicidad, cuya madre fallece durante un puente en el mes de diciembre. Para sobrellevar el duelo, Elsa se centra plenamente en el trabajo, sin dejar tiempo para superarlo, intentando huir hacia delante. Sin embargo, una crisis de pánico la obliga a parar y tener que descansar.Bonifacio, su pareja, había sido su salvación y la había ayudado a sobrellevar el fallecimiento. Pero para pasar página, Elsa decide irse a Lanzarote con su amiga Patricia, que también necesita un descanso de Madrid, mientras que Bonifacio se queda en la capital.", "sensacine_id": "1000025821", "tmdb_id": null}, {"id": 5, "title": "Apocalypse Now", "director": "Francis Ford Coppola", "genre": "Guerra, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/medias/nmedia/18/70/36/43/20181659.jpg", "rating": null, "synopsis": "\"Yo quería una misión... y por mis pecados me dieron una\". Eso fue lo primero que pensó el indomable Capitán Willard cuando despertó de su hotel en Saigón. Tras varios días poniéndose hasta arriba de alcohol y heroína decidió ponerse manos a la obra. Una vez llegado al cuartel militar que sus compañeros han instalado en la costa vietnamita, contacta con el Coronel Kilgore para que le ayude a encontrar al Coronel Kurtz, quien había huido del sistema y se había refugiado en un templo situado en mitad del Viet Cong.¿Que debía hacer Willard? Quitarle la vida al coronel, quien perdió la cabeza al ver tantos Charlies en Vietnam. Kurtz tenía pensado demostrarle al mundo que la locura viene inerte al ser humano. Por ello, Willard pondrá rumbo al fin del mundo para acabar con él. En esa barca se encontrará con un equipo de soldados inexpertos cuyas máximas aspiraciones serán las cherlis y un poco de hierba para fumar pero que, sin duda, serán claves para que Willard llegue a encontrar al temible Coronel. Dirigida por Francis Ford Coppola, Apocalypse Now es uno de los dramas más representativos de los años ochenta. La cinta está protagonizada por Martin Sheen como el Capitán Willard; Marlon Brando en el papel del Coronel Kurtz; Robert Duvall interpretando al Coronel Bill Kilgore; Frederic Forrest poniéndose en la piel de Jay 'Chef' Hicks; Harrison Ford como el Coronel Lucas; Laurence Fishburne en el papel de Tyrone \"Clean\" Miller; y Dennis Hopper encarnando al foto periodista que está interesado en la historia de Kurtz.", "sensacine_id": "27061", "tmdb_id": null}, {"id": 6, "title": "Atrapando a un monstruo", "director": "Bryan Fuller", "genre": "Terror, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/3d/9a/3d9a2ecd31695344b9071eb4daa6abb9.jpg", "rating": null, "synopsis": "Una niña de ocho años, convencida de que un monstruo debajo de su cama se ha comido a su familia, pide ayuda a su enigmático vecino en busca de ayuda. Juntos crean un plan para enfrentarse al monstruo, mientras la niña pasa por el miedo, la imaginación y la necesidad de valentía.Su relación con el vecino se convierte en un vínculo de confianza y misterio, donde la línea entre realidad y fantasía va desapareciendo, llevándolos a descubrir secretos oscuros y enfrentarse a los terrores más profundos que acechan en la oscuridad de su habitación.", "sensacine_id": "309977", "tmdb_id": null}, {"id": 7, "title": "Auri", "director": "Violeta Salama", "genre": "Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/8e/1b/8e1b4fe32f0fde45b042e6adb88bef4c.jpg", "rating": null, "synopsis": "Auri es una mujer de 65 años que ha pasado gran parte de su vida limitada por la rutina y la dependencia, sin atreverse a tomar decisiones por sí misma. Sin embargo, un día experimenta un despertar inesperado: descubre que aún desea vivir, aprender y hacer cosas nuevas.Este cambio la impulsa a volver a contectar con su independencia, sus sueños y su capacidad de elegir. A través de pequeños actos de valentía y autodescubrimiento, Auri comienza una etapa de libertad y transformación personal que desafía su pasado y su edad.", "sensacine_id": "1000032182", "tmdb_id": null}, {"id": 8, "title": "Avatar: Fuego y ceniza", "director": "James Cameron", "genre": "Ciencia ficción, Aventura, Acción, Fantasía", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/1e/0a/1e0aff63b4c1fa267e451bf3174a4d5a.jpg", "rating": null, "synopsis": "En la tercera entrega de la saga Avatar, se introduce al Pueblo de las Cenizas, un nuevo clan Na'vi con una visión más agresiva que el resto de pueblos del mundo. A diferencia de los clanes vistos anteriormente, estos Na'vi no dudan en recurrir a la violencia para conseguir sus fines, incluso si eso significa enfrentarse a otros clanes. Con esta nueva amenaza, Pandora se convierte en un territorio aún más inestable, donde los conflictos internos ponen en peligro el equilibrio del planeta y obligan a replantear la lucha por su supervivencia.", "sensacine_id": "187247", "tmdb_id": null}, {"id": 9, "title": "Boulevard", "director": "Sonia Méndez", "genre": "Romántico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/bb/42/bb423563f24f582ebedcb72adca73ba0.png", "rating": null, "synopsis": "La película adapta la exitosa novela escrita en Wattpad \"Boulevard\", escrita por Flor M. Salvador. La historia sigue a un hombre que, tras involucrarse con un joven estafador, se ve obligado a enfrentar su verdadera identidad sexual, largamente oculta durante su matrimonio de conveniencia.A través de esta relación intensa y transformadora, descubre deseos y emociones reprimidas, cuestionando su vida, sus decisiones y el amor que realmente busca, en un viaje de autodescubrimiento y libertad emocional.", "sensacine_id": "1000030817", "tmdb_id": null}, {"id": 10, "title": "Buena suerte, pásalo bien, no mueras", "director": "Gore Verbinski", "genre": "Aventura, Ciencia ficción, Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/b8/03/b80395e44d34ff587dbd85014354755f.jpg", "rating": null, "synopsis": "Un hombre del futuro llega a una cafetería con una misión urgente: reclutar a la combinación exacta de clientes para embarcarse en una aventura nocturna que podría salvar al mundo. La amenaza es una inteligencia artificial maligna que pone en riesgo la existencia humana, y cada persona elegida tiene un papel crucial en la misión.Entre conversaciones inesperadas, habilidades ocultas y situaciones absurdas, se desarrolla una historia de acción, humor y suspenso, donde la supervivencia depende de la colaboración de un grupo de desconocidos.", "sensacine_id": "326953", "tmdb_id": null}, {"id": 11, "title": "Calle Málaga", "director": "Maryam Touzani", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/1d/be/1dbe80c648dd154fcaa6704381f5b02a.jpg", "rating": null, "synopsis": "María Ángeles, una mujer de 79 años, vive sola en Tánger disfrutando de su rutina y la ciudad que la vio crecer. Cuando su hija llega desde Madrid para vender el apartamento familiar, ella se resiste a perder su hogar y lucha por recuperar sus pertenencias y recuerdos.En medio de esta resistencia, redescubre inesperadamente el amor y el deseo, demostrando que la vida puede sorprender incluso en la vejez y que la pasión y la libertad no tienen edad, y que siempre es posible encontrar nuevas alegrías y conexiones que le dan sentido a cada día.", "sensacine_id": "1000020088", "tmdb_id": null}, {"id": 12, "title": "Como cabras", "director": "Tyree Dillihay", "genre": "Animación, Comedia, Acción", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/2e/6e/2e6e9d8e986ce5dc29e735c7c0a3fac2.jpg", "rating": null, "synopsis": "Una pequeña cabra con un gran corazón sueña con convertirse en una estrella del roarball, un deporte extremo y vertiginoso que se juega en canchas impredecibles y cambiantes. Cuando se une a un equipo profesional, se enfrenta no solo a rivales imponentes, sino también a la desconfianza de sus compañeros, mucho más grandes y experimentados. Con determinación, ingenio y coraje, la cabra lucha por ganarse su lugar en el equipo, superar los desafíos del juego y demostrar que, a pesar de su tamaño, tiene lo necesario para brillar en la arena.", "sensacine_id": "326824", "tmdb_id": null}, {"id": 13, "title": "Cumbres Borrascosas", "director": "Emerald Fennell", "genre": "Drama, Romántico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/40/29/40297cb013081b30dffa9858f56e1e40.jpg", "rating": null, "synopsis": "Cumbres Borrascosas, dirigida por Emerald Fennell y protagonizada por Margot Robbie y Jacob Elordi, es una nueva adaptación del clásico de Emily Brontë. La historia sigue a Heathcliff, un hombre consumido por el rencor tras ser rechazado por su amor de juventud, quien eligió casarse con un hombre rico. Su deseo de venganza lo llevará a desatar una tormenta de odio y sufrimiento sobre la familia de la mujer que lo traicionó, en un relato de pasión, obsesión y destrucción.", "sensacine_id": "1000007235", "tmdb_id": null}, {"id": 14, "title": "Dos fiscales", "director": "Sergei Loznitsa", "genre": "Drama, Histórico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/d2/af/d2af5d0735e14c173704a59916c65279.jpg", "rating": null, "synopsis": "Unión Soviética, 1937. En plena era de las grandes purgas, una carta consigue escapar a la quema masiva de misivas de prisioneros acusados falsamente. Llega al escritorio de Alexander Kornev, joven fiscal local e idealista bolchevique, quien intuye una injusticia oculta.Decidido a descubrir la verdad, inicia una peligrosa investigación que lo enfrenta a la corrupción de la NKVD y lo conduce hasta la Fiscalía General de Moscú. Su lucha por la justicia lo sumerge en los engranajes opacos de un régimen totalitario, donde buscar la verdad puede costar la vida.", "sensacine_id": "312913", "tmdb_id": null}, {"id": 15, "title": "EPiC: Elvis Presley in Concert", "director": "Baz Luhrmann", "genre": "Documental, Música", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/10/d8/10d898f6be22dbd1a573aeaed8ddfbfd.jpg", "rating": null, "synopsis": "Película-concierto que ofrece una experiencia única al mezclar imágenes inéditas y restauradas de Elvis Presley, con actuaciones en vivo, mostrando al cantante no solo cantando, sino contando su propia historia de manera íntima y personal. A través de este material, seleccionado y remasterizado, se descubren facetas desconocidas de su vida, de su trayectoria musical y de su conexión con el público, acercando al cantante a los espectadores, haciendo que Elvis cobre vida con emocionalidad, nostalgia y la energía que lo convirtió en un icono mundial.", "sensacine_id": "1000018720", "tmdb_id": null}, {"id": 16, "title": "El agente secreto", "director": "Kleber Mendonça Filho", "genre": "Crimen, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/77/cc/77cc0442de426a9afa5373651bdc66f7.jpg", "rating": null, "synopsis": "En un Brasil marcado por la represión de la dictadura militar, Marcelo, un hombre de cuarenta años con un pasado lleno de sombras, llega a Recife con la esperanza de empezar de nuevo y reencontrarse con su hijo. Pero su intento de redención se ve amenazado cuando descubre que es vigilado por las fuerzas del régimen. Perseguido y con su vida en peligro, Marcelo deberá enfrentarse a viejas culpas y tomar decisiones imposibles mientras las amenazas se ciernen cada vez más cerca. En una ciudad llena de tensión y miedo, el pasado no ha terminado con él.", "sensacine_id": "1000009761", "tmdb_id": null}, {"id": 17, "title": "El mago de Oz", "director": "Victor Fleming | King Vidor | George Cukor", "genre": "Aventura, Fantasía", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/14/04/02/11/44/157777.jpg", "rating": null, "synopsis": "Dorothy (Judy Garland) es una joven que vive en la casa de sus tíos en Kansas. Cuando un tornado atraviesa la región, la casa de la joven es absorbida con ella dentro. Cuando el huracán termina, Dorothy descubre que ha aterrizado en un mundo extraño y maravilloso, Oz, donde existe la magia. Deseosa de volver a casa, Dorothy comienza a recorrer el camino de baldosas amarillas, una senda que la lleva hasta Ciudad Esmeralda, hogar del mayor mago que habita en Oz. Tan solo él podrá devolverla a Kansas.Durante el camino Dorothy conocerá a distintos compañeros de viaje: un león cobarde (Bert Lahr), un espantapájaros sin cerebro (Ray Bolger) y un hombre de hojalata sin corazón (Jack Haley). Juntos seguirán el camino para pedirle una cosa cada uno al mago de Oz (Frank Morgan). El león le pedirá coraje, el espantapájaros un cerebro, y el hombre de hojalata un corazón. Sin embargo, por el camino deberán enfrentarse a distintos peligros, como a las malvadas brujas que no desean que alcancen su meta.", "sensacine_id": "29738", "tmdb_id": null}, {"id": 18, "title": "El mago del Kremlin", "director": "Olivier Assayas", "genre": "Suspense", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/79/16/791661a754fe3013e3f853b9a6ea6ec2.jpg", "rating": null, "synopsis": "En el turbulento contexto postsoviético de los años 90, un joven artista y productor de televisión comienza a ascender gracias a su talento y habilidad para conectar con las élites. Su ingenio le abre las puertas al círculo más cercano de un agente del KGB con gran ambición política, lo que le convierte en testigo privilegiado del nacimiento de una nueva Rusia.Desde dentro del poder, ambos moldean el futuro del país, en un juego donde los límites entre la verdad y la mentira se desdibujan peligrosamente.", "sensacine_id": "1000005026", "tmdb_id": null}, {"id": 19, "title": "El testamento de Ann Lee", "director": "Mona Fastvold", "genre": "Drama, Histórico, Biopic, Música", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/75/ac/75acd2dd2f513294d8a63e842357a02f.jpg", "rating": null, "synopsis": "La historia se centra en Ann Lee, líder religiosa y fundadora del Movimiento Shaker a finales de la década de 1770, que levantó una de las comunidades utópicas más influyentes en la historia de Estados Unidos. Venerada por sus seguidores como una figura divina, considerada incluso el Jesucristo femenino, Ann inspiró una forma de devoción única basada en la música, la danza y la vida comunitaria.El relato explora su visión espiritual, el fervor de sus fieles y cómo sus ideales marcaron un movimiento que buscaba pureza, igualdad y trascendencia en plena era colonial.", "sensacine_id": "1000016982", "tmdb_id": null}, {"id": 20, "title": "El último vikingo", "director": "Anders Thomas Jensen", "genre": "Comedia, Drama, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/81/fd/81fdad0b769d9fb4d3ab258d85892a4d.jpg", "rating": null, "synopsis": "Tras cumplir quince años en prisión por un robo, Anker recupera la libertad con un objetivo claro: recuperar el dinero del atraco, escondido por su hermano Manfred. Sin embargo, Manfred ha perdido la memoria por un trastorno mental y ya no recuerda dónde lo enterró. Obligados a reencontrarse como hermanos, comienzan un viaje impredecible en busca del tesoro perdido, que los llevará a enfrentarse a su pasado, sus heridas y su verdadera identidad. Los hermanos tendrán que sobreponerse a las dificultades y volver a encontrar el vínculo que los unía.", "sensacine_id": "316460", "tmdb_id": null}, {"id": 21, "title": "Elegir mi vida", "director": "Amélie Bonnin", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/58/b3/58b36f0671c23cfcc3dd11c532f19b80.jpg", "rating": null, "synopsis": "Cécile está a punto de cumplir su gran sueño: abrir su propio restaurante. Sin embargo, una inesperada llamada la obliga a dejar todos sus sueños atrás y volver a su pueblo natal para cuidar a su padre enfermo. Allí, lejos del ritmo frenético de la ciudad, se reencuentra con su primer amor, lo que despierta en ella recuerdos dormidos y emociones que creía superadas. Mientras lucha entre sus deseos personales y las obligaciones familiares, Cécile debe replantearse lo que realmente quiere en la vida.", "sensacine_id": "1000001896", "tmdb_id": null}, {"id": 22, "title": "En busca del Mesías", "director": "Andrés Garrigó", "genre": "Documental", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/4f/ff/4fffad9e3946f430144c22c5d15bbc8b.jpg", "rating": null, "synopsis": "Este documental reúne por primera vez a judíos de distintos países -intelectuales, artistas, profesionales y líderes de opinión- que comparten un elemento inesperado en común: un encuentro personal con Jesús que transformó profundamente sus vidas. A través de testimonios íntimos y a menudo sorprendentes, estos hombres y mujeres relatan el camino espiritual que los llevó a replantearse su identidad, su fe y su relación con la tradición de Israel. Lejos de los estereotipos o de los discursos teóricos, la película se centra en historias humanas: búsquedas interiores, preguntas sobre el sentido de la vida, momentos de crisis y experiencias espirituales que cada protagonista describe con gran sinceridad. Sus relatos muestran cómo, desde contextos culturales y religiosos muy diferentes, descubrieron en la figura de Jesús una presencia que cambió su manera de comprender tanto el judaísmo como el cristianismo.", "sensacine_id": "1000042065", "tmdb_id": null}, {"id": 23, "title": "Espejos n.º 3", "director": "Christian Petzold", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/2d/d2/2dd20311fbaca7e6142488e621d22388.jpg", "rating": null, "synopsis": "Una joven estudiante de música sobrevive milagrosamente a un accidente de coche en el que pierde a su novio y queda destrozada a nivel emocional. Una familia misteriosa la acoge, y le brinda consuelo y apoyo, ayudándola a recomponer su vida, pero pronto se da cuenta que algo no encaja.A medida que descubre pequeñas cosas, comienza a cuestionar la verdadera identidad de sus anfitriones y los secretos oscuros que ocultan. Entre tensión y misterio, la historia explora la vulnerabilidad, la desconfianza y la lucha por descubrir la verdad detrás de una fachada aparentemente perfecta.", "sensacine_id": "315945", "tmdb_id": null}, {"id": 24, "title": "Hamnet", "director": "Chloé Zhao", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/07/8a/078a4f7d4dce42afa5d24bb304747b3a.jpg", "rating": null, "synopsis": "La vida de Agnes, la esposa de William Shakespeare, se ve marcada por el dolor tras la muerte de su hijo Hamnet. En un retrato íntimo y profundamente humano, se muestra su lucha por sobrellevar la pérdida mientras protege a su familia y busca sentido en medio del duelo.La historia revela cómo este acontecimiento trágico se convierte en telón de fondo para la creación de Hamlet, una de las obras más emblemáticas de Shakespeare. Con sensibilidad y fuerza emocional, la narración mezcla amor, maternidad y arte, iluminando la figura de Agnes como pilar invisible en la vida del dramaturgo.", "sensacine_id": "315003", "tmdb_id": null}, {"id": 25, "title": "Hoppers", "director": "Daniel Chong", "genre": "Animación, Aventura, Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/0f/d8/0fd8f3c56fa2f4bbd9cdf169fa88f569.jpg", "rating": null, "synopsis": "Mabel, una joven con una habilidad extraordinaria, puede transferir su mente a un castor robot para infiltrarse en el reino animal. Su misión: descubrir los planes de un ambicioso promotor inmobiliario que amenaza con destruir el hábitat natural. En su aventura, Mabel entabla una inesperada amistad con el carismático y sabio Rey Jorge, un castor que lidera a los suyos con nobleza. Juntos, unirán a los animales en una lucha por defender su hogar. Esta historia está llena de humor, ingenio y corazón para la amistad.", "sensacine_id": "1000009065", "tmdb_id": null}, {"id": 26, "title": "Incontrolable (I Swear)", "director": "Kirk Jones (II)", "genre": "Drama, Biopic", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/53/01/5301f68eb3a49c8c255e81a2f83f3002.jpg", "rating": null, "synopsis": "La historia real de John Davidson muestra una vida marcada por la lucha y la superación. Diagnosticado con síndrome de Tourette a los 15 años, sufrió el estigma y el rechazo de sus compañeros, que lo tachaban de loco por un trastorno poco conocido en aquel tiempo.Ya de adulto, transformó ese dolor en motor de cambio y dedicó sus esfuerzos a visibilizar la condición, convertirse en referente y dar voz a quienes padecen el mismo síndrome. Su camino es un testimonio de valentía y compromiso con la dignidad humana.", "sensacine_id": "1000009982", "tmdb_id": null}, {"id": 27, "title": "Kill Bill Volumen 2", "director": "Quentin Tarantino", "genre": "Acción, Suspense, Artes Marciales", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/medias/nmedia/18/70/98/10/20028700.jpg", "rating": null, "synopsis": "En esta secuela de 'Kill Bill Volumen I', la Novia continúa su venganza. Después de cinco años en coma, la “Mamba Negra” descubre con sorpresa que han querido asesinarla y que le han arrebatado al hijo que estaba esperando. Inicia entonces un plan para acabar con sus compañeros del Escuadrón de Serpientes Asesinas, que fueron quienes la traicionaron. Después de acabar con O-Ren Ishii y Vernita Green, la Novia no da su venganza por terminada y en esta historia se centra en ajustar cuentas con los miembros que le quedan: Budd (Michael Madsen), Elle Driver (Daryl Hannah) y el máximo jefe, Bill (David Carradine).", "sensacine_id": "53879", "tmdb_id": null}, {"id": 28, "title": "Kill Bill: The Whole Bloody Affair", "director": "Quentin Tarantino", "genre": "Acción, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/3b/be/3bbe708c1e4db0f5fd23dc50ea41223f.jpg", "rating": null, "synopsis": "Una mujer es atacada el día de su boda y la dan por muerta tras una gran matanza que acaba con todos los invitados. Cuatro años después, despierta de un largo coma y descubre que le han arrebatado su pasado y su identidad. Llena de venganza, comienza un viaje sangriento para ajustar cuentas con las personas que destruyeron su vida, siguiendo una lista que la lleva hasta Bill, la persona que lideró la traición. Esta versión íntegra de más de cuatro horas muestra la historia tal y como fue concebida originalmente, e incluye una secuencia animada inédita que profundiza en el origen de uno de los personajes clave.", "sensacine_id": "1000028176", "tmdb_id": null}, {"id": 29, "title": "La Fiera", "director": "Salvador Calvo", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/d6/c5/d6c53c32281f0b7facfc1d6619d1b87c.jpg", "rating": null, "synopsis": "Un grupo de tres amigos, Carlos, Darío y Armando, apasionados por los deportes de riesgo, descubren la sensación más cercana a desafiar a la gravedad: el salto BASE con traje de alas. Los tres lo prueban y se enamoran de la sensación que les produce.Se cuenta su aventura real desde dentro, mostrando el vértigo que produce, los miedos que surgen con el riesgo y la euforia de los que se enfrentan al vacío. El grupo de amigos muestra una historia sobre peligros y compañerismo, que acaba en un viaje brutal y lleno de emociones donde el mayor desafío no está en el aire sino en uno mismo.", "sensacine_id": "1000036246", "tmdb_id": null}, {"id": 30, "title": "La Grazia", "director": "Paolo Sorrentino", "genre": "Drama, Romántico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/14/4c/144ca162a96e9c61febf52f14b5e4c99.jpg", "rating": null, "synopsis": "Una película verdaderamente especial que explora con melancolía y aguda ironía la naturaleza del poder, la influencia y el peso de la historia. Sorrentino, con su estilo elegante y mordaz, retrata personajes atrapados entre la grandeza y la decadencia, reflexionando sobre la fama, la memoria y las cicatrices del pasado.Cada escena combina belleza visual y profundidad emocional, ofreciendo una mirada introspectiva y crítica sobre cómo la historia y la ambición moldean vidas, dejando al espectador tanto con asombro como con un sutil desasosiego.", "sensacine_id": "1000016512", "tmdb_id": null}, {"id": 31, "title": "La Loba", "director": "William Wyler", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/medias/nmedia/18/76/91/03/19330023.jpg", "rating": null, "synopsis": "Una calculadora y despiadada mujer sureaña entabla una lucha sin cuartel con sus hermanos para enriquecerse. En sus planes no entran los sentimientos, ni siquiera hacia su marido, un hombre honesto que sufre una grave enfermedad. Éste regresa a casa de un largo período de recuperación. En medio del terrible clima de ambición desmedida, sólo encontrará calor humano en el amor de su hija.", "sensacine_id": "24302", "tmdb_id": null}, {"id": 32, "title": "La asistenta", "director": "Paul Feig", "genre": "Suspense", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/71/83/7183a7a55e47f98332d9ef93b5518384.jpg", "rating": null, "synopsis": "Basada en la novela de Freida McFadden y adaptada por Rebecca Sonnenshine, la película sigue a Millie (Sydney Sweeney), una joven con problemas que encuentra alivio al empezar de cero como empleada doméstica para Nina (Amanda Seyfried) y Andrew (Luke Sklenar), una pareja adinerada de alta sociedad. Sin embargo, pronto descubre que los oscuros secretos que esconden sus jefes son mucho más peligrosos que los suyos propios. A medida que su vida se entrelaza con la de la familia, Millie se enfrenta a verdades inquietantes que pondrán su seguridad y cordura al límite.", "sensacine_id": "317403", "tmdb_id": null}, {"id": 33, "title": "La buena hija", "director": "Júlia De Paz Solvas", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f0/e9/f0e91d7f63745573f053ec749f64dd6e.jpg", "rating": null, "synopsis": "Tras la ruptura de sus padres, Carmela deja atrás su vida anterior y se traslada junto a su madre al hogar de su abuela, una casa marcada por rutinas, silencios y recuerdos. En ese nuevo entorno, la niña intenta recomponer su mundo: un colegio distinto, una convivencia desconocida y una ausencia que pesa más que cualquier objeto. Mientras aprende a moverse entre dos mujeres de generaciones opuestas, Carmela mantiene la mirada puesta en otro lugar: la casa de su padre, un artista plástico al que admira profundamente y al que ha convertido en refugio, mito y promesa de libertad.La figura de ese padre carismático y distante planea sobre la vida cotidiana de las tres, influyendo en sus deseos, frustraciones y decisiones. A medida que afloran viejas heridas y se revelan verdades incómodas, abuela, madre e hija se verán obligadas a enfrentarse a lo que realmente las ata a él y, sobre todo, a lo que se deben entre ellas. Un viaje íntimo sobre la herencia emocional, la idealización y la necesidad de romper con ciertas sombras para poder elegir, por fin, el futuro que cada una merece.", "sensacine_id": "1000033365", "tmdb_id": null}, {"id": 34, "title": "La chica zurda", "director": "Shih-Ching Tsou", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/5b/d4/5bd4170672abf66bff4814c6b28863f4.jpg", "rating": null, "synopsis": "Una madre soltera y sus dos hijas vuelven a Taipei tras años en el campo para abrir un puesto en un animado mercado nocturno. Mientras intentan adaptarse al ritmo de la ciudad y llegar a fin de mes, deben enfrentarse a tensiones familiares y a un pasado que resurge. La hija pequeña, zurda, recibe una advertencia inquietante de su abuelo: nunca usar su “mano del diablo”. A partir de ese momento, antiguos secretos de tres generaciones comienzan a salir a la luz, obligando a cada una a confrontar sus propias heridas y a redefinir los lazos que las unen.", "sensacine_id": "314618", "tmdb_id": null}, {"id": 35, "title": "La hija pequeña", "director": "Hafsia Herzi", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/76/66/76661f155b1fa03fd3ebcdbf9e4158bd.jpg", "rating": null, "synopsis": "Fátima, de 17 años, es la pequeña de tres hermanas y crece en una familia franco-argelina unida y amorosa en los suburbios. Buena estudiante, consigue entrar en la Universidad de París, donde comienza una nueva etapa marcada por la libertad y el descubrimiento personal. Al alejarse de su entorno familiar, explora nuevas amistades, relaciones y formas de vivir, mientras navega entre dos mundos culturales que a menudo chocan. Fátima debe enfrentarse a tensiones internas y externas al intentar construir una identidad propia sin renunciar a sus raíces.", "sensacine_id": "303094", "tmdb_id": null}, {"id": 36, "title": "La última cena", "director": "Mauro Borrelli", "genre": "Drama, Histórico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/11/ba/11bac1dde2b54c9b5eeefa7bf096a44d.jpg", "rating": null, "synopsis": "En una Jerusalén asfixiada por el polvo y la opresión, Jesús de Nazaret se reúne con sus doce apóstoles para celebrar lo que parece ser una cena de despedida. El ambiente exterior es eléctrico; la ciudad es un polvorín a punto de estallar debido a la brutal vigilancia de las legiones romanas y el descontento de un pueblo que clama por un líder político y militar. Sin embargo, el verdadero drama se desarrolla tras las puertas cerradas del cenáculo. A medida que el vino circula, la hermandad de los discípulos comienza a agrietarse. Lo que antes eran susurros y dudas teológicas se convierten en enfrentamientos abiertos:", "sensacine_id": "1000014776", "tmdb_id": null}, {"id": 37, "title": "Lapönia", "director": "David Serrano", "genre": "Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/66/4d/664d000f47244d5b05aa53e3ee9322d0.jpg", "rating": null, "synopsis": "Tras años sin reunirse en Navidad, Nuria invita a su hermana Mónica y su familia a pasar unas fiestas idílicas en Laponia, junto a su marido Olavi y su hija. Todo parece perfecto hasta que la niña revela a su primo que Papá Noel no existe, desatando el caos familiar. Lo que debía ser una celebración entrañable se convierte en una noche de tensiones, reproches y verdades incómodas, donde afloran secretos guardados y se abre un inesperado debate sobre si es mejor preservar la ilusión infantil o decir la verdad aunque duela.", "sensacine_id": "1000024385", "tmdb_id": null}, {"id": 38, "title": "Los Domingos", "director": "Alauda Ruiz de Azúa", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/9e/4a/9e4a3af5d3e43447c08db19eaf6fe4e3.jpg", "rating": null, "synopsis": "Ainara es una joven de 17 años brillante y uy idealista que, en lugar de elegir una carrera universitaria como espera su familia, decide entregarse a la vida religiosa, convirtiéndose en monja de clausura. Su inesperada decisión hace que los cimientos familiares se sacudan, generando sorpresa, conflictos y un profundo cuestionamiento sobre la fe, la libertad y el destino. A medida que cada miembro afronta la noticia, la familia se enfrenta a una prueba de fuego que cambiará sus vidas para siempre.", "sensacine_id": "1000020167", "tmdb_id": null}, {"id": 39, "title": "Marty Supreme", "director": "Josh Safdie", "genre": "Drama, Biopic", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/a8/e5/a8e58393b089b9ae573a06bf3e3068c9.jpg", "rating": null, "synopsis": "Marty Reisman, un carismático buscavidas de Nueva York, descubrió su don para el ping pong en los clubes clandestinos de Manhattan, donde jugaba por dinero. Su estilo llamativo y su audaz juego ofensivo lo llevaron a lo más alto del tenis de mesa, ganando 22 títulos importantes, incluidos dos campeonatos nacionales. Icono del espectáculo y la destreza, se convirtió, a los 67 años, en el campeón más veterano en un torneo nacional de deportes de raqueta. Su vida, entre apuestas, desafíos y gloria, es el retrato de un genio rebelde del deporte.", "sensacine_id": "1000007317", "tmdb_id": null}, {"id": 40, "title": "Mi robot favorito", "director": "Kid Koala", "genre": "Animación", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/ac/6e/ac6e84dcce03b2dc18b4b97d0569b752.jpg", "rating": null, "synopsis": "Cuando la astronauta Celeste emprende su primera misión en solitario, deja atrás a su inseparable compañero: un robot guardián que la ha acompañado durante toda su infancia. Solo y confundido, el robot se enfrenta a la pregunta: ¿y ahora qué?Entre la nostalgia por la separación y la curiosidad por lo desconocido, la historia se convierte en una tierna y poética reflexión sobre crecimiento, independencia y pertenencia. Una nana del mañana que explora cómo hallar tu lugar en el vasto universo, mezclando emoción, aventura y un toque de ciencia ficción íntima.", "sensacine_id": "1000017785", "tmdb_id": null}, {"id": 41, "title": "No te olvidaré", "director": "Vanessa Caswill", "genre": "Romántico, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/99/a8/99a8161e4c1b03da7f5c62f30bf217a2.jpg", "rating": null, "synopsis": "Al salir de la cárcel, Kenna busca reconectar con su hija, pero se encuentra con la resistencia de todos a su alrededor, excepto del dueño de un bar que sigue mantiendo vínculos con ella. Mientras intenta reconstruir su relación, Kenna debe enfrentarse a los errores de su pasado y a las consecuencias de sus decisiones, aprendiendo a lidiar con la desconfianza, la culpa y los desafíos de volver a empezar.En su camino, descubrirá que el perdón y la reconciliación necesitan valentía, honestidad y un esfuerzo constante por recuperar lo perdido.", "sensacine_id": "315376", "tmdb_id": null}, {"id": 42, "title": "Noche de bodas 2", "director": "Matt Bettinelli-Olpin | Tyler Gillett", "genre": "Terror, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/52/d8/52d837b536ce21d6ba5b514375b1e77e.jpg", "rating": null, "synopsis": "En la secuela del aclamado thriller de horror y comedia negra Ready or Not, Grace (Samara Weaving) vuelve con sed de justicia tras sobrevivir al loco juego de la familia Le Domas. Pero esta vez, el juego es aún más peligroso, y las reglas han cambiado.Mientras aparecen nuevas y oscuras fuerzas, entre ellas misteriosos personajes interpretados por Sarah Michelle Gellar y Elijah Wood, Grace deberá enfrentarse a un nuevo desafío letal donde lo sobrenatural y lo humano se entrelazan. La cacería comienza de nuevo y esta vez, nadie está a salvo.", "sensacine_id": "1000001305", "tmdb_id": null}, {"id": 43, "title": "Pillion", "director": "Harry Lighton", "genre": "Drama, Erótico, Comedia, Romántico", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/a2/05/a205ecea7ee491167d8a2eea56708319.jpg", "rating": null, "synopsis": "Colin, un hombre solitario, ve su vida transformada al conocer a Ray, un carismático líder de moteros. Lo que comienza como una amistad inesperada evoluciona hacia una relación marcada por una dinámica de sumisión que desafía las estructuras rígidas de Colin. A través de esta experiencia intensa y fuera de lo común, Colin confronta sus miedos, se libera de patrones autoimpuestos y experimenta un profundo proceso de autodescubrimiento. La presencia de Ray sacude su rutina y despierta en él una nueva forma de entender el deseo, el poder y la libertad personal.", "sensacine_id": "1000004467", "tmdb_id": null}, {"id": 44, "title": "Proyecto Salvación", "director": "Phil Lord | Christopher Miller", "genre": "Ciencia ficción, Acción, Aventura", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/46/3a/463a0d3860e79b345ecb71c56ae28bfa.jpg", "rating": null, "synopsis": "Un astronauta solitario (Ryan Gosling) despierta de un coma y se da cuenta de que está a millones de kilómetros de su hogar. En el diminuto vehículo en el que vuelve en sí, también hay dos miembros de la tripulación muertos. El astronauta no recuerda ni su misión ni su nombre. Sin embargo, pronto descubre que es la única esperanza para la supervivencia de la humanidad.", "sensacine_id": "282076", "tmdb_id": null}, {"id": 45, "title": "Ramón y Cajal: Dibujos en la retina", "director": "Luis Gómez Juanes", "genre": "Documental", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/13/93/139384b7d18f07abf4ccdf490fec23f1.jpg", "rating": null, "synopsis": "Película documental dedicada a Santiago Ramón y Cajal que revisita su figura desde una perspectiva contemporánea, poniendo el foco en su interés por la imagen como puente entre el mundo tangible y la construcción mental. La obra propone una lectura renovada que une sus dimensiones científica y creativa, a través de testimonios y experiencias de especialistas, creadores, historiadores y personas cercanas que lo consideran un adelantado a su tiempo. En paralelo, dentro de un laboratorio actual, una tecnología intenta dar respuesta a la gran incógnita que dejó abierta: cómo el cerebro genera las imágenes.", "sensacine_id": "1000043526", "tmdb_id": null}, {"id": 46, "title": "Scream 7", "director": "Kevin Williamson", "genre": "Terror, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f9/57/f957e82b8374af3029d4e7acc0b62229.png", "rating": null, "synopsis": "Cuando un nuevo asesino Ghostface aparece en el tranquilo y relajaddo pueblo donde Sidney Prescott ha intentado reconstruir su vida, sus peores pesadillas vuelven. Todo se vuelve aún más aterrador cuando su hija se convierte en el nuevo objetivo del enmascarado.Obligada a enfrentarse a los traumas que creía enterrados, Sidney deberá enfrentarse a su oscuro pasado y a un enemigo implacable. En una carrera contra el tiempo, madre e hija lucharán por sobrevivir y acabar con la masacre de una vez por todas.", "sensacine_id": "318865", "tmdb_id": null}, {"id": 47, "title": "Shelter: El protector", "director": "Ric Roman Waugh", "genre": "Suspense, Acción", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/5f/7e/5f7eef89c25400a9789a612a9343c970.jpg", "rating": null, "synopsis": "En una isla alejada, un hombre en el exilio salva a una niña de una peligrosa tormenta, generando una peligrosa cadena de acontecimientos que los pone a los dos en peligro. Mientras sus caminos van uniéndose, tiene que protegerla a toda costa, haciendo frente a los enemigos que le persiguen por su pasado. Con persecuciones, enfrentamientos y desafíos complicados, la historia es una lucha por la supervivencia donde la valentía y el sacrificio marcarán la diferencia entre la vida y la muerte para ambos.", "sensacine_id": "1000005744", "tmdb_id": null}, {"id": 48, "title": "Solos", "director": "Guillermo Ríos (II)", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/11/72/1172b4e64619564af0b4c78be47ac7f3.jpg", "rating": null, "synopsis": "Cuatro amigos se reúnen para disfrutar de una cena relajada, buscando desconectar de sus problemas y compartir una velada tranquila. Sin embargo, a medida que la noche avanza y el vino fluye, surgen tensiones y conversaciones incómodas que tocan temas profundos como el miedo, las relaciones, la amistad, el sexo, el trabajo, la complicidad y la muerte. Lo que comenzó como una velada sin preocupaciones se convierte en un espacio de confrontación emocional, revelando insatisfacciones ocultas y poniendo a prueba la fortaleza de su amistad.", "sensacine_id": "1000016064", "tmdb_id": null}, {"id": 49, "title": "Super Mario Galaxy: La película", "director": "Aaron Horvath | Michael Jelenic", "genre": "Animación, Aventura, Familia, Acción, Fantasía", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/66/a2/66a2e1cd3bdf8978aefac262f3d5a0cb.png", "rating": null, "synopsis": "Tras asentarse en el Reino Champiñón y empezar por fin a encontrar su lugar, Mario y Luigi disfrutan de una aparente calma que pronto se ve interrumpida. Una enigmática llamada de auxilio irrumpe desde los rincones más olvidados del reino, señalando directamente a un pasado que la Princesa Peach ha mantenido en secreto durante años. Lo que comienza como una misión de rescate pronto se transforma en algo mucho más grande y peligroso de lo que cualquiera de ellos podría haber imaginado. Obligados a abandonar la seguridad de su hogar, Mario, Luigi y sus inseparables aliados se embarcan en una aventura que los llevará más allá de los límites conocidos, atravesando mundos desconocidos, galaxias lejanas y escenarios tan fascinantes como impredecibles. En su camino, se cruzarán con nuevos personajes —algunos dispuestos a ayudar, otros con intenciones más oscuras— que pondrán a prueba su valentía, su lealtad y su capacidad para trabajar en equipo. Mientras los misterios del pasado de Peach comienzan a desvelarse, el grupo descubrirá que la amenaza a la que se enfrentan no solo pone en riesgo el Reino Champiñón, sino el equilibrio de múltiples mundos. Entre desafíos épicos, decisiones difíciles y momentos de humor y camaradería, Mario y Luigi deberán demostrar una vez más que incluso los héroes más improbables pueden marcar la diferencia cuando todo está en juego.", "sensacine_id": "327878", "tmdb_id": null}, {"id": 50, "title": "Te van a matar", "director": "Kirill Sokolov", "genre": "Acción, Comedia, Terror", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/86/d8/86d88028ffaf06446239539602901819.jpg", "rating": null, "synopsis": "Una mujer acepta un empleo como ama de llaves en un gran rascacielos de Nueva York, sin poder imaginar que bajo su elegante apariencia se ocultan grandes secretos. Pronto descubre que el edificio esconde un historia de desapariciones y sucesos inexplicables que envuelven a sus residentes en un misterio que va en aumento. Mientras investiga lo que está pasando, se enfrenta a amenazas y enigmas que la obligan a poner a prueba su ingenio y coraje para sobrevivir y descubrir los secretos que se esconden en el edifico.", "sensacine_id": "1000004914", "tmdb_id": null}, {"id": 51, "title": "The Designer is Dead", "director": "Gonzalo Hergueta", "genre": "Documental", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/70/34/7034c1120ff129ad4aaf67269bb88b77.jpg", "rating": null, "synopsis": "Este documental explora la vida y carrera del diseñador Miguel Adrover, pionero del multiculturalismo y la sostenibilidad en la moda internacional. Desde su fulgurante ascenso en Nueva York hasta su retiro en Mallorca, el film traza un retrato íntimo y revelador del creador mallorquín. A través de imágenes inéditas y valiosos testimonios de colaboradores como Jennifer Hoffman y la crítica Robin Givhan, se desvela la influencia de Adrover en una industria en transformación y su firme compromiso con una moda consciente y diversa.", "sensacine_id": "1000025846", "tmdb_id": null}, {"id": 52, "title": "Torrente presidente", "director": "Santiago Segura", "genre": "Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/ce/63/ce63bc4bd27995d49be93a2891504e53.png", "rating": null, "synopsis": "Una tarde a la hora de la comida en un bar. Allí, dos importantes afiliados al parido de extrema derecha NOX, se fijan en la actitud y el magnetismo que desprende Jose Luis Torrente con los parroquianos del lugar, y deciden invitarle para hablar en un par de mítines. Lo que estos dos jóvenes desconocen es que abren la caja de los truenos y Torrente poco a poco comienza a ganar poder dentro del partido y su discurso fascista empieza a calar entre los votantes. A partir de ahí comienzan una serie de acontecimientos a cada cual más surrealista, en la sexta sátira de la sociedad española -a manos del director y actor Santiago Segura- vista desde la óptica del policía más marrano e irreverente del cine español.", "sensacine_id": "324865", "tmdb_id": null}, {"id": 53, "title": "Tres adioses", "director": "Isabel Coixet", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f4/0e/f40e5bf6fa7c09e667c1f159c50c88c2.jpg", "rating": null, "synopsis": "Tras una discusión que no parece gran cosa, Marta y Antonio deciden separarse. Él, un chef en ascenso, se vuelca en la cocina para superar la ruptura, mientras ella se sumerge en un silencio que pronto revela algo más que tristeza: ha perdido el apetito. Cuando descubre que su malestar esconde un problema de salud, su vida cambia por completo.De pronto, los sentidos se intensifican: la comida recupera su sabor, la música la conmueve y el deseo renace, impulsándola a vivir plenamente y sin miedo.", "sensacine_id": "1000019852", "tmdb_id": null}, {"id": 54, "title": "Una hija en Tokio", "director": "Guillaume Senez", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/7d/3d/7d3d7bfde0c5ca13e16ff92ffbf6495b.jpg", "rating": null, "synopsis": "Jay es un taxista que ha pasado 13 años en Japón y recorre las calles de Tokio cada noche mientras carga con la ausencia de su hija, Lily, a quien no ha visto en casi una década. Después de una dolorosa separación, Jay perdió el derecho a la custodia compartida y, tras años de búsqueda sin éxito, se ha vuelto a Francia. Sin embargo, justo cuando está a punto de abandonar el país y su esperanza, un encuentro inesperado sucede: una noche, Lily sube a su taxi, dándole a Jay una oportunidad inesperada de reencontrarse con su hija.", "sensacine_id": "313955", "tmdb_id": null}, {"id": 55, "title": "Uyariy (Escuchar)", "director": "Javier Corcuera", "genre": "Documental", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/d8/9e/d89e769e0bc3f913232b4b81ad2d0d82.jpg", "rating": null, "synopsis": "Tras el estallido social que sacudió Perú y la matanza ocurrida el 9 de enero de 2023 en la ciudad de Juliaca, en la región de Puno, un grupo de artistas del mundo andino emprende un recorrido musical por los paisajes, los pueblos y la memoria colectiva del altiplano. Sus canciones y actuaciones se convierten en una forma de acompañar el duelo de las comunidades y de mantener viva la memoria de quienes perdieron la vida en uno de los episodios más dolorosos de la reciente historia del país. En este territorio marcado por siglos de resistencia indígena, levantamientos populares y episodios de represión, la música se transforma en un lenguaje de memoria, identidad y dignidad. A lo largo del viaje, el documental recoge también las voces de los familiares de las víctimas, quienes relatan su dolor, sus recuerdos y su búsqueda de justicia.", "sensacine_id": "1000038054", "tmdb_id": null}, {"id": 56, "title": "Valor sentimental", "director": "Joachim Trier", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/35/66/35661f40931132d1af3e82b56fed553f.jpg", "rating": null, "synopsis": "Nora y su hermana Agnes intentan superar la reciente pérdida de su madre cuando su padre, Gustav, regresa de forma inesperada a sus vidas. Con la intención de volver a conectar, Gustav les presenta un guion que ha escrito, ofreciéndole a Nora el papel principal. Pero Nora, que aún está dolida y desconfía, lo rechaza de forma tajante. Mientras las tensiones familiares van creciendo, las tres personas enfrentan viejas heridas, silencios incómodos y la difícil tarea de reconstruir los lazos rotos por el tiempo y el dolor.", "sensacine_id": "298726", "tmdb_id": null}, {"id": 57, "title": "Whistle: El silbido del mal", "director": "Corin Hardy", "genre": "Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/6b/a0/6ba0fbaa8f5734ee8d0b85195b9b6b3b.jpg", "rating": null, "synopsis": "Un grupo de estudiantes inadaptados encuentra accidentalmente un antiguo silbato azteca maldito. Al soplarlo, liberan un terrorífico sonido que invoca sus futuras muertes, convirtiéndose en presas de un destino mortal.A medida que las víctimas se multiplican, los amigos luchan contra el miedo y la desesperación para descubrir el origen del artefacto y detener la cadena de sucesos macabros que han desatado, enfrentándose a fuerzas sobrenaturales que desafían toda lógica y ponen a prueba su valor y su amistad.", "sensacine_id": "321708", "tmdb_id": null}, {"id": 58, "title": "Your Name", "director": "Makoto Shinkai", "genre": "Animación, Fantasía", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/17/02/08/13/45/536055.jpg", "rating": null, "synopsis": "La joven Mitsuha vive en un pequeño pueblecito entre las montañas. Sin muchas sorpresas ni demasiadas emociones, la adolescente tiene un par de amigos, además de a su hermana pequeña, su abuela y su padre, con el que tiene una relación algo distante. La única expectación un poco emocionante es el cometa Tiamat, que está pasando cerca de la Tierra y por unos días será visible a simple vista. Pero un día despierta y descubre con asombro que no reconoce su cuerpo, y piensa que se trata de un extraño sueño. Pero no es así: se encuentra dentro del cuerpo de un chico, concretamente de Taki, un joven estudiante de bachillerato de la gran ciudad de Tokio. A Taki le sucederá lo mismo, y es Mitsuha la que se intercambia con él. Metidos dentro de un cuerpo que les resulta tan extraño, poco a poco, los dos jóvenes empiezan a comunicarse y, torpemente, van superando los retos que se presentan en ambas vidas. De esta forma, el vínculo que tienen se convierte en algo más. Lo que no saben es que algo inesperado está a punto de ser revelado. Filme de animación dirigido por el nipón Makoto Shinkai, responsable de filmes como El jardín de las palabras (2013), Viaje a Agartha (2011) o 5 centímetros por segundo (2007).", "sensacine_id": "249877", "tmdb_id": null}];

  'Drama':      { grad: 'linear-gradient(160deg, #1a1a2e 0%, #2a1a3e 50%, #3a2a5e 100%)', icon: '\u{1F3AD}', fx: 'shimmer' },

  'Acci\u00f3n': { grad: 'linear-gradient(160deg, #1a0a00 0%, #3e1a00 50%, #6e3a00 100%)', icon: '\u{1F4A5}', fx: 'pulse' },
  'Ciencia ficci\u00f3n': { grad: 'linear-gradient(160deg, #001a2e 0%, #002a4e 50%, #004a6e 100%)', icon: '\u{1F680}', fx: 'pulse' },

  'M\u00fasica': { grad: 'linear-gradient(160deg, #0a1a2e 0%, #1a2e4e 50%, #3a4e6e 100%)', icon: '\u{1F3B5}', fx: 'bounce' },
  'Aventura':   { grad: 'linear-gradient(160deg, #0a2e1a 0%, #1a4e2a 50%, #2a6e3a 100%)', icon: '\u{1F5FA}', fx: 'shimmer' },
  'Ciclo':      { grad: 'linear-gradient(160deg, #1a1a1a 0%, #2a2a2a 50%, #3a3a3a 100%)', icon: '\u{1F3AC}', fx: 'grain-heavy' },
};

function getGenreTheme(genreStr) {
  if (!genreStr) return { grad: 'linear-gradient(160deg, #1a1a2e, #2a2a4e)', icon: '\u{1F3AC}', fx: '' };
  const genres = genreStr.split(',').map(g => g.trim());
  for (const g of genres) { if (GENRE_THEMES[g]) return GENRE_THEMES[g]; }
  return { grad: 'linear-gradient(160deg, #1a1a2e, #2a2a4e)', icon: '\u{1F3AC}', fx: '' };
}

function generatePosterHtml(title, genre) {
  const theme = getGenreTheme(genre);
  const genres = (genre || '').split(',').map(g => g.trim());
  let particles = '';
  const colors = {
    'Terror': ['#ff0000','#8b0000','#ff4444'],
    'Animaci\u00f3n': ['#e94560','#f5c518','#64b5f6','#81c784','#ce93d8'],
    'Acci\u00f3n': ['#ff6600','#ff9900','#ffcc00'],
    'Ciencia ficci\u00f3n': ['#00ccff','#0088ff','#00ffcc'],
    'Romance': ['#ff69b4','#ff1493','#ff6eb4'],
    'Comedia': ['#f5c518','#ffcc00','#ff9900'],
    'M\u00fasica': ['#64b5f6','#42a5f5','#90caf9'],
  };
  const pColors = colors[genres[0]] || ['#ffffff','#aaaaaa','#888888'];
  for (let i = 0; i < 6; i++) {
    const c = pColors[i % pColors.length];
    const left = 10 + Math.floor((i * 37 + 13) % 80);
    const size = 3 + (i % 4);
    const delay = (i * 0.7).toFixed(1);
    particles += `<span style="left:${left}%;width:${size}px;height:${size}px;background:${c};animation-delay:${delay}s"></span>`;
  }
  let fxHtml = '';
  if (theme.fx === 'scan') fxHtml = '<div class="gp-scanline"></div>';
  let fxStyle = '';
  if (theme.fx === 'flicker') fxStyle = 'animation: flicker 3s infinite;';
  if (theme.fx === 'shimmer') fxStyle = 'background-size: 200% 100%; animation: shimmer 4s ease infinite;';
  if (theme.fx === 'pulse') fxStyle = 'animation: pulse-glow 2.5s ease-in-out infinite;';
  let iconStyle = '';
  if (theme.fx === 'bounce') iconStyle = 'animation: bounce-icon 2s ease-in-out infinite;';
  return `<div class="gen-poster" style="background:${theme.grad};${fxStyle}">
    <div class="gp-particles">${particles}</div>
    ${fxHtml}
    <div class="gp-icon" style="${iconStyle}">${theme.icon}</div>
    <div class="gp-genre">${genres[0] || ''}</div>
    <div class="gp-title">${title.replace(/ *\(.*\)$/, '')}</div>
  </div>`;
}
