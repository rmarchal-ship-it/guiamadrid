<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuíaMadrid — Cartelera y Conciertos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --bg-surface: #0a0a0a;
    --card: #111;
    --card-hover: #1a1a1a;
    --accent: #ff4d00;
    --text: #fff;
    --muted: #777;
    --border: #1a1a1a;
    --gold: #f5c518;
    --concert-accent: #ff4d00;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-pill: 999px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  /* === HEADER === */
  header {
    background: var(--bg);
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.85);
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    text-transform: uppercase;
  }
  header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .controls input[type="date"],
  .controls select {
    background: var(--card); color: var(--text);
    border: 1px solid #333; border-radius: var(--radius-sm);
    padding: 0.45rem 0.7rem; font-size: 0.85rem;
    font-family: inherit;
  }
  /* === SEARCH === */
  .search-bar {
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 2rem 0;
  }
  .search-bar input {
    width: 100%; max-width: 640px; padding: 1rem 1.2rem 1rem 3.2rem;
    border: 1px solid #333; border-radius: var(--radius-pill);
    background: #111; color: var(--text); font-size: 1rem;
    font-family: inherit;
    outline: none; transition: border-color 0.3s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: #555; }
  .search-wrapper { position: relative; width: 100%; max-width: 640px; }
  .search-wrapper::before {
    content: '\1F50D'; position: absolute; left: 1.1rem; top: 50%;
    transform: translateY(-50%); font-size: 1.1rem; pointer-events: none;
  }
  .search-hint {
    text-align: center; padding: 0.6rem 0 0; font-size: 0.8rem; color: var(--muted);
    min-height: 1.5rem;
  }
  .search-hint span { cursor: pointer; transition: color 0.2s; }
  .search-hint span:hover { color: var(--text); }
  .search-hint .hint-movies { color: var(--accent); }
  .search-hint .hint-concerts { color: var(--accent); }
  /* === TABS === */
  .tabs {
    display: flex; gap: 0; margin: 1.5rem 2rem 0;
    border-bottom: 1px solid #1a1a1a;
  }
  .tab {
    padding: 0.8rem 1.6rem; background: transparent;
    border: none; border-bottom: 3px solid transparent;
    cursor: pointer; font-size: 0.85rem; color: var(--muted);
    font-family: inherit; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .tab .tab-count {
    font-size: 0.65rem; background: #222; color: var(--muted);
    border-radius: var(--radius-pill); padding: 0.15rem 0.5rem;
    margin-left: 0.5rem; font-weight: 700;
  }
  .tab.active .tab-count { background: var(--accent); color: #fff; }
  /* === CONTENT === */
  .content { padding: 1.5rem 2rem 3rem; }
  .section-title {
    font-size: 1.1rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 1.2rem; color: var(--text);
  }
  /* === STATS === */
  .stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-box {
    background: #111; border: 1px solid #1a1a1a;
    border-radius: var(--radius-md); padding: 1rem 1.4rem;
    flex: 1; min-width: 110px; transition: border-color 0.2s;
  }
  .stat-box:hover { border-color: var(--accent); }
  .stat-box .num { font-size: 2rem; font-weight: 900; color: var(--accent); line-height: 1; }
  .stat-box .label {
    font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.5px; margin-top: 0.3rem; font-weight: 700;
  }
  /* === MOVIE GRID === */
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.5rem;
  }
  .movie-card {
    background: #111; border-radius: var(--radius-md); overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    border: none;
  }
  .movie-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(255,77,0,0.15);
  }
  .movie-card .top { display: flex; gap: 1rem; padding: 1rem; cursor: pointer; }
  .movie-card .poster {
    width: 130px; height: 195px; border-radius: var(--radius-sm);
    object-fit: cover; background: #222; flex-shrink: 0;
  }
  .movie-card .poster-placeholder {
    width: 130px; height: 195px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative; overflow: hidden;
    background: #222; color: var(--muted);
    font-size: 0.7rem; text-align: center; padding: 0.5rem;
    font-weight: 700; line-height: 1.3;
  }
  .yt-poster {
    width: 130px; height: 195px; border-radius: var(--radius-sm);
    position: relative; overflow: hidden; flex-shrink: 0;
    cursor: pointer; background: #222;
  }
  .yt-poster img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s, filter 0.3s;
  }
  .yt-poster:hover img { transform: scale(1.08); filter: brightness(0.6); }
  .yt-poster .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 40px; height: 40px; background: var(--accent);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s;
    box-shadow: 0 4px 16px rgba(255,77,0,0.4);
  }
  .yt-poster:hover .play-btn { opacity: 1; }
  .yt-poster .play-btn::after {
    content: ''; width: 0; height: 0;
    border-style: solid; border-width: 8px 0 8px 14px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
  }
  /* Trailer modal */
  .trailer-modal {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.95); display: none;
    align-items: center; justify-content: center;
    padding: 1rem;
  }
  .trailer-modal.active { display: flex; }
  .trailer-modal .modal-content {
    position: relative; width: 100%; max-width: 900px;
    aspect-ratio: 16/9; border-radius: var(--radius-md); overflow: hidden;
    box-shadow: 0 4px 60px rgba(0,0,0,0.8);
  }
  .trailer-modal iframe { width: 100%; height: 100%; border: none; }
  .trailer-modal .close-btn {
    position: absolute; top: -40px; right: 0;
    background: none; border: none; color: #fff;
    font-size: 2rem; cursor: pointer; padding: 0.2rem 0.5rem;
    opacity: 0.6; transition: opacity 0.2s;
  }
  .trailer-modal .close-btn:hover { opacity: 1; }
  /* Genre posters */
  .gen-poster {
    width: 130px; height: 195px; border-radius: var(--radius-sm);
    position: relative; overflow: hidden; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding: 0.4rem; text-align: center;
  }
  .gen-poster .gp-title {
    font-size: 0.55rem; font-weight: 800; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8); z-index: 2;
    line-height: 1.2; max-height: 3rem; overflow: hidden;
    letter-spacing: 0.3px; text-transform: uppercase;
  }
  .gen-poster .gp-genre {
    font-size: 0.45rem; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 1px; z-index: 2;
    margin-bottom: 0.2rem;
  }
  .gen-poster .gp-icon {
    font-size: 1.8rem; z-index: 2; margin-bottom: 0.3rem;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .gen-poster::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: inherit; opacity: 0.15;
  }
  .gen-poster::after {
    content: ''; position: absolute; inset: -50%; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    animation: grain 4s steps(8) infinite;
    pointer-events: none;
  }
  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-5%, -5%); }
    30% { transform: translate(3%, -8%); }
    50% { transform: translate(-3%, 5%); }
    70% { transform: translate(7%, 2%); }
    90% { transform: translate(-2%, 4%); }
  }
  .gen-poster .gp-particles {
    position: absolute; inset: 0; z-index: 1; overflow: hidden;
  }
  .gen-poster .gp-particles span {
    position: absolute; border-radius: 50%; opacity: 0.4;
    animation: float-up 4s ease-in infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(100%) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    100% { transform: translateY(-100%) scale(1); opacity: 0; }
  }
  .gp-scanline {
    position: absolute; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,0.15); z-index: 2;
    animation: scan 3s linear infinite;
  }
  @keyframes scan { 0% { top: -2px; } 100% { top: 100%; } }
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; } 96% { opacity: 0.4; }
    97% { opacity: 0.9; } 98% { opacity: 0.3; }
  }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: inset 0 0 15px rgba(0,200,255,0.2); }
    50% { box-shadow: inset 0 0 25px rgba(0,200,255,0.5); }
  }
  @keyframes bounce-icon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  .movie-card .info { flex: 1; min-width: 0; }
  .movie-card .title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.3rem; line-height: 1.3; }
  .movie-card .meta { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
  .movie-card .synopsis {
    font-size: 0.78rem; color: #555; margin-top: 0.4rem; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    cursor: pointer;
  }
  .movie-card .synopsis.expanded { -webkit-line-clamp: unset; display: block; }
  .movie-card .rating {
    display: inline-flex; align-items: center; gap: 0.25rem;
    color: var(--gold); font-weight: 700; font-size: 0.9rem; margin-top: 0.3rem;
    background: rgba(245, 197, 24, 0.08); padding: 0.15rem 0.5rem;
    border-radius: var(--radius-sm);
  }
  .movie-card .showtimes-toggle {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid #1a1a1a; padding: 0.6rem 1rem;
    cursor: pointer; color: var(--muted); font-size: 0.78rem;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  .movie-card .showtimes-toggle:hover { color: var(--text); }
  .movie-card .showtimes-toggle .arrow {
    transition: transform 0.3s; font-size: 0.7rem;
  }
  .movie-card.expanded .showtimes-toggle .arrow { transform: rotate(180deg); }
  .movie-card .showtimes-section {
    border-top: 1px solid #1a1a1a; padding: 0 1rem;
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .movie-card.expanded .showtimes-section { max-height: 2000px; padding: 0.8rem 1rem; }
  .movie-card .cinema-group { margin-bottom: 0.6rem; }
  .movie-card .cinema-group:last-child { margin-bottom: 0; }
  .movie-card .cinema-name {
    font-size: 0.72rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem;
    font-weight: 700;
  }
  .time-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .chip {
    background: #1a1a1a; border: 1px solid #333;
    border-radius: 4px; padding: 0.2rem 0.5rem;
    font-size: 0.78rem; white-space: nowrap;
  }
  .chip.vose { border-color: #4caf50; color: #81c784; }
  .chip.imax { border-color: #2196f3; color: #64b5f6; }
  .chip.atmos { border-color: #9c27b0; color: #ce93d8; }
  .chip.three-d { border-color: #ff9800; color: #ffb74d; }
  /* === CINEMAS === */
  .cinemas-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .cinema-card {
    background: #111; border-radius: var(--radius-md); padding: 1.2rem;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  }
  .cinema-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(255,77,0,0.1); }
  .cinema-card.no-sessions { opacity: 0.4; cursor: default; }
  .cinema-card.no-sessions:hover { transform: none; box-shadow: none; }
  .cinema-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
  .cinema-card .addr { font-size: 0.8rem; color: var(--muted); }
  .cinema-card .movie-count { font-size: 0.75rem; color: var(--accent); margin-top: 0.4rem; font-weight: 600; }
  .cinema-card.no-sessions .movie-count { color: var(--muted); }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 1rem; }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  /* === FILTERS === */
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .filter-bar select {
    background: #111; color: var(--text);
    border: 1px solid #333; border-radius: var(--radius-sm);
    padding: 0.45rem 0.7rem; font-size: 0.85rem; font-family: inherit;
  }
  .filter-btn {
    background: #111; border: 1px solid #333;
    border-radius: var(--radius-pill); padding: 0.4rem 1rem;
    color: var(--muted); cursor: pointer; font-size: 0.78rem;
    font-family: inherit; font-weight: 600; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* === CONCERT CARDS — Ministry of Sound style === */
  .concert-filters {
    display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
  }
  .concert-filters select {
    background: #111; color: var(--text);
    border: 1px solid #333; border-radius: var(--radius-sm);
    padding: 0.45rem 0.7rem; font-size: 0.85rem; font-family: inherit;
    max-width: 250px; flex-shrink: 0;
  }
  .date-filters { display: flex; gap: 0.4rem; flex-wrap: nowrap; flex: 1; overflow-x: auto; padding-bottom: 0.3rem; -webkit-overflow-scrolling: touch; }
  .date-filters::-webkit-scrollbar { height: 0; }
  .date-pill {
    background: #111; border: 1px solid #333;
    border-radius: var(--radius-pill); padding: 0.4rem 1rem;
    color: var(--muted); cursor: pointer; font-size: 0.78rem;
    font-family: inherit; font-weight: 600;
    transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
    white-space: nowrap; flex-shrink: 0;
  }
  .date-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .date-pill:hover { border-color: var(--accent); color: var(--accent); }
  .concerts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
  }
  .concert-card {
    background: #111; border-radius: var(--radius-md); overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    display: flex; flex-direction: column;
  }
  .concert-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 48px rgba(255,77,0,0.12);
  }
  .concert-card .card-image {
    width: 100%; aspect-ratio: 1/1; position: relative; overflow: hidden;
    background: #1a1a1a;
  }
  .concert-card .card-image img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s;
  }
  .concert-card:hover .card-image img { transform: scale(1.08); }
  .concert-card .card-image .img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem; opacity: 0.15;
    background: linear-gradient(135deg, #1a0a0a 0%, #2a1a0a 50%, #0a0a1a 100%);
  }
  .concert-card .card-image::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 70%; background: linear-gradient(transparent, rgba(0,0,0,0.9));
    pointer-events: none;
  }
  .concert-card .date-badge {
    position: absolute; top: 0.8rem; left: 0.8rem; z-index: 2;
    background: var(--accent); color: #fff;
    padding: 0.3rem 0.7rem; border-radius: var(--radius-sm);
    font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .concert-card .card-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
    padding: 1rem 1rem 0.8rem;
  }
  .concert-card .card-overlay .event-name {
    font-size: 1.1rem; font-weight: 800; line-height: 1.2;
    text-transform: uppercase; letter-spacing: 0.3px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .concert-card .card-overlay .venue-name {
    font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 0.2rem;
    font-weight: 500;
  }
  .concert-card .card-body {
    padding: 0.8rem 1rem; display: flex; flex-direction: column; gap: 0.2rem; flex: 1;
  }
  .concert-card .event-details {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    font-size: 0.75rem;
  }
  .concert-card .price-tag { color: #81c784; font-weight: 600; }
  .concert-card .time-tag { color: var(--muted); }
  .concert-card .card-footer {
    padding: 0 1rem 1rem; margin-top: auto;
  }
  .concert-card .ticket-btn {
    display: block; width: 100%; text-align: center;
    background: var(--accent); color: #fff;
    text-decoration: none; font-size: 0.8rem; font-weight: 800;
    font-family: inherit; text-transform: uppercase; letter-spacing: 1px;
    padding: 0.7rem; border-radius: var(--radius-sm);
    transition: background 0.2s, transform 0.15s;
    border: none; cursor: pointer;
  }
  .concert-card .ticket-btn:hover { background: #e64400; transform: translateY(-1px); }
  .concert-card .no-ticket-btn {
    display: block; width: 100%; text-align: center;
    background: transparent; color: #444;
    text-decoration: none; font-size: 0.8rem; font-weight: 700;
    font-family: inherit; text-transform: uppercase; letter-spacing: 1px;
    padding: 0.7rem; border-radius: var(--radius-sm);
    border: 1px solid #333;
  }
  /* === RESPONSIVE === */
  @media (min-width: 1400px) {
    .concerts-grid { grid-template-columns: repeat(5, 1fr); }
  }
  @media (min-width: 1200px) and (max-width: 1399px) {
    .concerts-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 900px) {
    .concerts-grid { grid-template-columns: repeat(2, 1fr); }
    .movies-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .movies-grid { grid-template-columns: 1fr; }
    .concerts-grid { grid-template-columns: 1fr; }
    header { padding: 1rem; }
    .content { padding: 1rem; }
    .search-bar { padding: 1rem 1rem 0; }
    .tabs { margin: 1rem 1rem 0; }
    .concert-filters { flex-direction: column; gap: 0.5rem; }
    .stats { gap: 0.5rem; }
    .stat-box { padding: 0.7rem 1rem; }
    .stat-box .num { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1><span>GUÍA</span>MADRID</h1>
  <div class="controls">
    <label>Fecha:</label>
    <input type="date" id="datePicker" value="2026-04-03">
  </div>

<script>
const EMBEDDED_MOVIES = [{"id": 1, "title": "Altas capacidades", "director": "Víctor García León", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/44/0d/440d7b47444af051761a619970d13a3b.jpg", "rating": null, "synopsis": "Alicia y Gonzalo, un matrimonio clase media, ven abrirse ante ellos una ocasión inesperada: conseguir plaza para su hijo Fer en un exclusivo centro educativo privado y no religioso. La posibilidad de acceder a ese entorno selecto les deslumbra, porque no solo promete una mejor formación para el niño, sino también la entrada a un círculo privilegiado de contactos, oportunidades profesionales y una posición social más ventajosa. Aunque aseguran que todo lo hacen pensando en el bienestar de su hijo, el movimiento también despierta ambiciones personales largamente contenidas. A medida que se adentran en ese nuevo mundo de apariencias y estatus, comienzan a tensionarse sus valores, sus inseguridades y sus convicciones éticas. Entre el deseo de ascenso social y la fidelidad a sus propios principios, la pareja se enfrenta a decisiones que pondrán a prueba su coherencia. En ese choque entre aspiración y conciencia, terminarán cuestionando verdades que siempre habían dado por indiscutibles.", "sensacine_id": "1000027233", "tmdb_id": null}, {"id": 2, "title": "Amarga Navidad", "director": "Pedro Almodóvar", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/60/ff/60ff5df4d1e858aa504693e07468e58d.jpg", "rating": null, "synopsis": "Elsa es una directora de publicidad, cuya madre fallece durante un puente en el mes de diciembre. Para sobrellevar el duelo, Elsa se centra plenamente en el trabajo, sin dejar tiempo para superarlo, intentando huir hacia delante. Sin embargo, una crisis de pánico la obliga a parar y tener que descansar.Bonifacio, su pareja, había sido su salvación y la había ayudado a sobrellevar el fallecimiento. Pero para pasar página, Elsa decide irse a Lanzarote con su amiga Patricia, que también necesita un descanso de Madrid, mientras que Bonifacio se queda en la capital.", "sensacine_id": "1000025821", "tmdb_id": null}, {"id": 3, "title": "Avatar: Fuego y ceniza", "director": "James Cameron", "genre": "Ciencia ficción, Aventura, Acción, Fantasía", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/1e/0a/1e0aff63b4c1fa267e451bf3174a4d5a.jpg", "rating": null, "synopsis": "En la tercera entrega de la saga Avatar, se introduce al Pueblo de las Cenizas, un nuevo clan Na'vi con una visión más agresiva que el resto de pueblos del mundo. A diferencia de los clanes vistos anteriormente, estos Na'vi no dudan en recurrir a la violencia para conseguir sus fines, incluso si eso significa enfrentarse a otros clanes. Con esta nueva amenaza, Pandora se convierte en un territorio aún más inestable, donde los conflictos internos ponen en peligro el equilibrio del planeta y obligan a replantear la lucha por su supervivencia.", "sensacine_id": "187247", "tmdb_id": null}, {"id": 4, "title": "Bluey en cines: Colección ¡A jugar con los amigos!", "director": "Joe Brumm", "genre": "Animación", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/ac/10/ac106b79b1da191212b3692cdf8b978d.jpg", "rating": null, "synopsis": "Una experiencia cinematográfica de una hora de duración que incluye ocho episodios de las tres temporadas de la serie Bluey, todos ellos dedicados al juego, la imaginación, la amistad y la familia. La recopilación reúne algunos de los juegos más queridos de Bluey, como Shadowlands y Octopus, al tiempo que destaca momentos especiales de amistad en episodios como Circus y Slide, y ofrece mucha alegría, risas y diversión en la gran pantalla para públicos de todas las edades.", "sensacine_id": "1000033909", "tmdb_id": null}, {"id": 5, "title": "Calle Málaga", "director": "Maryam Touzani", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/1d/be/1dbe80c648dd154fcaa6704381f5b02a.jpg", "rating": null, "synopsis": "María Ángeles, una mujer de 79 años, vive sola en Tánger disfrutando de su rutina y la ciudad que la vio crecer. Cuando su hija llega desde Madrid para vender el apartamento familiar, ella se resiste a perder su hogar y lucha por recuperar sus pertenencias y recuerdos.En medio de esta resistencia, redescubre inesperadamente el amor y el deseo, demostrando que la vida puede sorprender incluso en la vejez y que la pasión y la libertad no tienen edad, y que siempre es posible encontrar nuevas alegrías y conexiones que le dan sentido a cada día.", "sensacine_id": "1000020088", "tmdb_id": null}, {"id": 6, "title": "Como cabras", "director": "Tyree Dillihay", "genre": "Animación, Comedia, Acción", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/2e/6e/2e6e9d8e986ce5dc29e735c7c0a3fac2.jpg", "rating": null, "synopsis": "Una pequeña cabra con un gran corazón sueña con convertirse en una estrella del roarball, un deporte extremo y vertiginoso que se juega en canchas impredecibles y cambiantes. Cuando se une a un equipo profesional, se enfrenta no solo a rivales imponentes, sino también a la desconfianza de sus compañeros, mucho más grandes y experimentados. Con determinación, ingenio y coraje, la cabra lucha por ganarse su lugar en el equipo, superar los desafíos del juego y demostrar que, a pesar de su tamaño, tiene lo necesario para brillar en la arena.", "sensacine_id": "326824", "tmdb_id": null}, {"id": 7, "title": "Cumbres Borrascosas", "director": "Emerald Fennell", "genre": "Drama, Romántico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/40/29/40297cb013081b30dffa9858f56e1e40.jpg", "rating": null, "synopsis": "Cumbres Borrascosas, dirigida por Emerald Fennell y protagonizada por Margot Robbie y Jacob Elordi, es una nueva adaptación del clásico de Emily Brontë. La historia sigue a Heathcliff, un hombre consumido por el rencor tras ser rechazado por su amor de juventud, quien eligió casarse con un hombre rico. Su deseo de venganza lo llevará a desatar una tormenta de odio y sufrimiento sobre la familia de la mujer que lo traicionó, en un relato de pasión, obsesión y destrucción.", "sensacine_id": "1000007235", "tmdb_id": null}, {"id": 8, "title": "Cumbres borrascosas", "director": "William Wyler", "genre": "Drama", "duration_min": null, "poster_url": "", "rating": null, "synopsis": "Adaptación de la novela homónima de Emily Brontë. Se trata de la trágica historia de los amantes Heathcliff y Cathy quienes, pese al profundo cariño que sienten el uno por el otro, se ven forzados por las circunstancias y los prejuicios sociales a vivir separados. Se conocieron cuando eran pequeños y el padre de Cathy llevó a Heathcliff, un huérfano abandonado, a casa de los Earnshaws en Yorkshire, para que viviera en la granja con ellos. Cuando Mr. Earnshaw muere años después, el hermano mayor de Cathy, Hindley, que siempre había tenido celos del niño adoptado favorito de su padre, se convierte en el señor de la casa y obliga a Heathcliff a vivir con los sirvientes y ganarse el pan trabajando en el establo. Tiempo depsués, Heathcliff desaparece de la finca Earnshaw, pero es incapaz de olvidar su amor. Cuando regresa, Cathy se ha casado con un vecino adinerado, Edgar Linton, lo que avivará todavía más el rencor de Heathcliff.", "sensacine_id": "209", "tmdb_id": null}, {"id": 9, "title": "Dhurandhar: The Revenge", "director": "Aditya Dhar", "genre": "Acción, Suspense, Espionaje", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/11/0a/110a8f8884abe800bc847863d56ea47a.jpg", "rating": null, "synopsis": "Bajo la identidad de Hamza Ali Mazari, el agente de inteligencia indio Jaskirat Singh Rangi (interpretado por Ranveer Singh) se adentra aún más en el peligroso submundo criminal de Pakistán, manteniendo su fachada mientras sigue la pista de Majo, una figura envuelta en secretos y traiciones. Cada paso que da lo acerca a una red de conspiraciones más compleja de lo que había anticipado, donde aliados y enemigos se confunden y donde cualquier descuido podría ser fatal. Mientras desentraña pistas, se enfrenta a dilemas morales y a desafíos que pondrán a prueba no solo su astucia como espía, sino también su resistencia física y emocional.", "sensacine_id": "1000037831", "tmdb_id": null}, {"id": 10, "title": "Dos fiscales", "director": "Sergei Loznitsa", "genre": "Drama, Histórico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/d2/af/d2af5d0735e14c173704a59916c65279.jpg", "rating": null, "synopsis": "Unión Soviética, 1937. En plena era de las grandes purgas, una carta consigue escapar a la quema masiva de misivas de prisioneros acusados falsamente. Llega al escritorio de Alexander Kornev, joven fiscal local e idealista bolchevique, quien intuye una injusticia oculta.Decidido a descubrir la verdad, inicia una peligrosa investigación que lo enfrenta a la corrupción de la NKVD y lo conduce hasta la Fiscalía General de Moscú. Su lucha por la justicia lo sumerge en los engranajes opacos de un régimen totalitario, donde buscar la verdad puede costar la vida.", "sensacine_id": "312913", "tmdb_id": null}, {"id": 11, "title": "EPiC: Elvis Presley in Concert", "director": "Baz Luhrmann", "genre": "Documental, Música", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/10/d8/10d898f6be22dbd1a573aeaed8ddfbfd.jpg", "rating": null, "synopsis": "Película-concierto que ofrece una experiencia única al mezclar imágenes inéditas y restauradas de Elvis Presley, con actuaciones en vivo, mostrando al cantante no solo cantando, sino contando su propia historia de manera íntima y personal. A través de este material, seleccionado y remasterizado, se descubren facetas desconocidas de su vida, de su trayectoria musical y de su conexión con el público, acercando al cantante a los espectadores, haciendo que Elvis cobre vida con emocionalidad, nostalgia y la energía que lo convirtió en un icono mundial.", "sensacine_id": "1000018720", "tmdb_id": null}, {"id": 12, "title": "El Doctor Frankenstein", "director": "James Whale", "genre": "Terror, Ciencia ficción", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/210/097/21009732_20130531164512864.jpg", "rating": null, "synopsis": "Henry Von Frankenstein es un doctor que decide llevar a cabo un experimento un tanto tenebroso: pretende crear un nuevo ser humano utilizando fragmentos de cadáveres. Su fiel criado Fritz será su aliado en el proyecto y, con su ayuda, se adentran en los cementerios cercanos para conseguir la materia prima. Lo que el doctor no sabe es que el cerebro que utilizado pertenecía a un criminal, condenando al monstruo al odio.", "sensacine_id": "6038", "tmdb_id": null}, {"id": 13, "title": "El Rey de Reyes", "director": "", "genre": "Animación, Biopic, Histórico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/a5/45/a545e12a050470505251c6286d8e6f72.jpg", "rating": null, "synopsis": "Un padre le cuenta a su hijo la historia de Jesús: la más grandiosa de todas las historias. Lo que empieza como una simple narración antes de dormir se transforma en una experiencia trascendental que llevará al niño a un viaje de transformación espiritual. A través de su imaginación, el niño tiene la oportunidad de caminar al lado de Jesús, presenciando los milagros que realizó, siendo parte de las pruebas que enfrentó y entendiendo el profundo significado de Su sacrificio en la cruz. A lo largo de esta aventura, el niño no solo aprende sobre la vida de Jesús, sino que también experimenta, de forma simbólica, las lecciones de esperanza, amor incondicional y redención que Él representa. El relato se convierte en un llamado a todos, jóvenes y adultos, para redescubrir estos valores fundamentales, pero visto a través de la inocencia y pureza de un niño, quien, con su perspectiva fresca y sin prejuicios, puede ver lo más esencial de la vida de Cristo. El Rey de Reyes, en su infinita sabiduría y misericordia, invita a la humanidad a recordar la trascendencia de esos principios eternos que han perdurado a lo largo de los siglos.", "sensacine_id": "1000000311", "tmdb_id": null}, {"id": 14, "title": "El agente secreto", "director": "Kleber Mendonça Filho", "genre": "Crimen, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/77/cc/77cc0442de426a9afa5373651bdc66f7.jpg", "rating": null, "synopsis": "En un Brasil marcado por la represión de la dictadura militar, Marcelo, un hombre de cuarenta años con un pasado lleno de sombras, llega a Recife con la esperanza de empezar de nuevo y reencontrarse con su hijo. Pero su intento de redención se ve amenazado cuando descubre que es vigilado por las fuerzas del régimen. Perseguido y con su vida en peligro, Marcelo deberá enfrentarse a viejas culpas y tomar decisiones imposibles mientras las amenazas se ciernen cada vez más cerca. En una ciudad llena de tensión y miedo, el pasado no ha terminado con él.", "sensacine_id": "1000009761", "tmdb_id": null}, {"id": 15, "title": "El cielo de los animales", "director": "Santi Amodeo", "genre": "Drama, Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/da/e8/dae86a602696bc3bf96e5ed4cbb0d60c.jpg", "rating": null, "synopsis": "Diego (Raúl Arévalo), un hombre cuya esposa lo ha dejado, conoce a Amanda (Paula Díaz), una joven de 19 años que tiene el brazo amputado, practica salto de trampolín y tiene una personalidad algo soñadora y traviesa. De este encuentro surgirá una relación breve pero mágica: una sirena con una sola mano y un hombre perdido, en plena caída libre. Fran (Jesús Carroza) y Benicio (Manolo Solo) van a recoger las pertenencias del padre fallecido de uno de ellos, con quien no tenía contacto desde hacía muchos años. En el trayecto, descubren que el difunto era conocido en la zona como el Hombre Lagarto. En la mansión aislada en medio de la nada, comprenderán el porqué.Darío (Diego Portalo) y Gracia (África de la Cruz) son una pareja de jóvenes que se conocen desde la infancia. Un día, ella recibe una llamada de Darío en la que le anuncia que se avecina el fin del mundo, por lo que deberán refugiarse en el sótano. Gracia, acostumbrada a las crisis recurrentes de Darío, lo acompaña en su paranoia.", "sensacine_id": "323882", "tmdb_id": null}, {"id": 16, "title": "El mago del Kremlin", "director": "Olivier Assayas", "genre": "Suspense", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/79/16/791661a754fe3013e3f853b9a6ea6ec2.jpg", "rating": null, "synopsis": "En el turbulento contexto postsoviético de los años 90, un joven artista y productor de televisión comienza a ascender gracias a su talento y habilidad para conectar con las élites. Su ingenio le abre las puertas al círculo más cercano de un agente del KGB con gran ambición política, lo que le convierte en testigo privilegiado del nacimiento de una nueva Rusia.Desde dentro del poder, ambos moldean el futuro del país, en un juego donde los límites entre la verdad y la mentira se desdibujan peligrosamente.", "sensacine_id": "1000005026", "tmdb_id": null}, {"id": 17, "title": "El mal", "director": "Juanma Bajo Ulloa", "genre": "Suspense, Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/9b/dd/9bdd9803bdcf891db50f563493c7740b.jpg", "rating": null, "synopsis": "La película es una intrigante exploración del ser humano y su insaciable necesidad de reconocimiento, mientras enfrenta la incapacidad de aceptar su propio lado oscuro. A través de una narrativa de suspense, la película mantiene al espectador en un constante estado de anticipación, sugiriendo que algo inquietante está por suceder, pero dejando en el aire la incógnita de cómo y cuándo se manifestará. La historia no solo busca provocar inquietud, sino que también invita al público a reflexionar sobre sus propias certezas y limitaciones.", "sensacine_id": "1000011447", "tmdb_id": null}, {"id": 18, "title": "El testamento de Ann Lee", "director": "Mona Fastvold", "genre": "Drama, Histórico, Biopic, Música", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/75/ac/75acd2dd2f513294d8a63e842357a02f.jpg", "rating": null, "synopsis": "La historia se centra en Ann Lee, líder religiosa y fundadora del Movimiento Shaker a finales de la década de 1770, que levantó una de las comunidades utópicas más influyentes en la historia de Estados Unidos. Venerada por sus seguidores como una figura divina, considerada incluso el Jesucristo femenino, Ann inspiró una forma de devoción única basada en la música, la danza y la vida comunitaria.El relato explora su visión espiritual, el fervor de sus fieles y cómo sus ideales marcaron un movimiento que buscaba pureza, igualdad y trascendencia en plena era colonial.", "sensacine_id": "1000016982", "tmdb_id": null}, {"id": 19, "title": "El último vikingo", "director": "Anders Thomas Jensen", "genre": "Comedia, Drama, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/81/fd/81fdad0b769d9fb4d3ab258d85892a4d.jpg", "rating": null, "synopsis": "Tras cumplir quince años en prisión por un robo, Anker recupera la libertad con un objetivo claro: recuperar el dinero del atraco, escondido por su hermano Manfred. Sin embargo, Manfred ha perdido la memoria por un trastorno mental y ya no recuerda dónde lo enterró. Obligados a reencontrarse como hermanos, comienzan un viaje impredecible en busca del tesoro perdido, que los llevará a enfrentarse a su pasado, sus heridas y su verdadera identidad. Los hermanos tendrán que sobreponerse a las dificultades y volver a encontrar el vínculo que los unía.", "sensacine_id": "316460", "tmdb_id": null}, {"id": 20, "title": "Elegir mi vida", "director": "Amélie Bonnin", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/58/b3/58b36f0671c23cfcc3dd11c532f19b80.jpg", "rating": null, "synopsis": "Cécile está a punto de cumplir su gran sueño: abrir su propio restaurante. Sin embargo, una inesperada llamada la obliga a dejar todos sus sueños atrás y volver a su pueblo natal para cuidar a su padre enfermo. Allí, lejos del ritmo frenético de la ciudad, se reencuentra con su primer amor, lo que despierta en ella recuerdos dormidos y emociones que creía superadas. Mientras lucha entre sus deseos personales y las obligaciones familiares, Cécile debe replantearse lo que realmente quiere en la vida.", "sensacine_id": "1000001896", "tmdb_id": null}, {"id": 21, "title": "Guardianes de la Noche (Kimetsu no Yaiba): La Fortaleza Infinita - Parte 1", "director": "Haruo Sotozaki", "genre": "Animación", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/af/0b/af0be406b528e2ebc5ee0fa95c5e2c69.jpg", "rating": null, "synopsis": "Primera parte de la adaptación de los los 46 números del manga Demon Slayer dedicados a la Fortaleza Infinita. En esta ocasión, la situación será ligeramente diferente a lo que sucedió en las temporadas tres y cuatro. En esas temporadas, se estrenaron películas en el cine que solo servían como introducción a la nueva historia. Después de esto, solo quedará el Arco de la Cuenta Regresiva al Amanecer, que consta de 21 números en el manga. Tanto Crunchyroll como Sony Pictures Entertainment se encargarán de llevar estas historias tanto al cine como a la plataforma de streaming. Aunque aún no se han anunciado fechas de estreno.", "sensacine_id": "1000006302", "tmdb_id": null}, {"id": 22, "title": "Hamnet", "director": "Chloé Zhao", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/07/8a/078a4f7d4dce42afa5d24bb304747b3a.jpg", "rating": null, "synopsis": "La vida de Agnes, la esposa de William Shakespeare, se ve marcada por el dolor tras la muerte de su hijo Hamnet. En un retrato íntimo y profundamente humano, se muestra su lucha por sobrellevar la pérdida mientras protege a su familia y busca sentido en medio del duelo.La historia revela cómo este acontecimiento trágico se convierte en telón de fondo para la creación de Hamlet, una de las obras más emblemáticas de Shakespeare. Con sensibilidad y fuerza emocional, la narración mezcla amor, maternidad y arte, iluminando la figura de Agnes como pilar invisible en la vida del dramaturgo.", "sensacine_id": "315003", "tmdb_id": null}, {"id": 23, "title": "Hoppers", "director": "Daniel Chong", "genre": "Animación, Aventura, Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/0f/d8/0fd8f3c56fa2f4bbd9cdf169fa88f569.jpg", "rating": null, "synopsis": "Mabel, una joven con una habilidad extraordinaria, puede transferir su mente a un castor robot para infiltrarse en el reino animal. Su misión: descubrir los planes de un ambicioso promotor inmobiliario que amenaza con destruir el hábitat natural. En su aventura, Mabel entabla una inesperada amistad con el carismático y sabio Rey Jorge, un castor que lidera a los suyos con nobleza. Juntos, unirán a los animales en una lucha por defender su hogar. Esta historia está llena de humor, ingenio y corazón para la amistad.", "sensacine_id": "1000009065", "tmdb_id": null}, {"id": 24, "title": "La Fiera", "director": "Salvador Calvo", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/d6/c5/d6c53c32281f0b7facfc1d6619d1b87c.jpg", "rating": null, "synopsis": "Un grupo de tres amigos, Carlos, Darío y Armando, apasionados por los deportes de riesgo, descubren la sensación más cercana a desafiar a la gravedad: el salto BASE con traje de alas. Los tres lo prueban y se enamoran de la sensación que les produce.Se cuenta su aventura real desde dentro, mostrando el vértigo que produce, los miedos que surgen con el riesgo y la euforia de los que se enfrentan al vacío. El grupo de amigos muestra una historia sobre peligros y compañerismo, que acaba en un viaje brutal y lleno de emociones donde el mayor desafío no está en el aire sino en uno mismo.", "sensacine_id": "1000036246", "tmdb_id": null}, {"id": 25, "title": "La Grazia", "director": "Paolo Sorrentino", "genre": "Drama, Romántico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/14/4c/144ca162a96e9c61febf52f14b5e4c99.jpg", "rating": null, "synopsis": "Una película verdaderamente especial que explora con melancolía y aguda ironía la naturaleza del poder, la influencia y el peso de la historia. Sorrentino, con su estilo elegante y mordaz, retrata personajes atrapados entre la grandeza y la decadencia, reflexionando sobre la fama, la memoria y las cicatrices del pasado.Cada escena combina belleza visual y profundidad emocional, ofreciendo una mirada introspectiva y crítica sobre cómo la historia y la ambición moldean vidas, dejando al espectador tanto con asombro como con un sutil desasosiego.", "sensacine_id": "1000016512", "tmdb_id": null}, {"id": 26, "title": "La asistenta", "director": "Paul Feig", "genre": "Suspense", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/71/83/7183a7a55e47f98332d9ef93b5518384.jpg", "rating": null, "synopsis": "Basada en la novela de Freida McFadden y adaptada por Rebecca Sonnenshine, la película sigue a Millie (Sydney Sweeney), una joven con problemas que encuentra alivio al empezar de cero como empleada doméstica para Nina (Amanda Seyfried) y Andrew (Luke Sklenar), una pareja adinerada de alta sociedad. Sin embargo, pronto descubre que los oscuros secretos que esconden sus jefes son mucho más peligrosos que los suyos propios. A medida que su vida se entrelaza con la de la familia, Millie se enfrenta a verdades inquietantes que pondrán su seguridad y cordura al límite.", "sensacine_id": "317403", "tmdb_id": null}, {"id": 27, "title": "La chica zurda", "director": "Shih-Ching Tsou", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/5b/d4/5bd4170672abf66bff4814c6b28863f4.jpg", "rating": null, "synopsis": "Una madre soltera y sus dos hijas vuelven a Taipei tras años en el campo para abrir un puesto en un animado mercado nocturno. Mientras intentan adaptarse al ritmo de la ciudad y llegar a fin de mes, deben enfrentarse a tensiones familiares y a un pasado que resurge. La hija pequeña, zurda, recibe una advertencia inquietante de su abuelo: nunca usar su “mano del diablo”. A partir de ese momento, antiguos secretos de tres generaciones comienzan a salir a la luz, obligando a cada una a confrontar sus propias heridas y a redefinir los lazos que las unen.", "sensacine_id": "314618", "tmdb_id": null}, {"id": 28, "title": "La cronología del agua", "director": "Kristen Stewart", "genre": "Drama, Biopic", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/55/0d/550d43061af487029befcd4e730b6aba.jpg", "rating": null, "synopsis": "Lidia Yuknavitch, una de las escritoras feministas más influyentes del mundo, vivió una juventud marcada por el dolor y la adicción. Mientras descubría su sexualidad y se enfrentaba al estigma de sentirse atraída por hombres y mujeres, cayó en un proceso de autodestrucción que puso su vida en peligro. Sin embargo, encontró en la literatura y la natación una vía de salvación. A través de estas pasiones, Yuknavitch logró reconstruirse y convertirse en una reconocida autora, maestra y madre, símbolo de resistencia y transformación personal.", "sensacine_id": "264813", "tmdb_id": null}, {"id": 29, "title": "La hija pequeña", "director": "Hafsia Herzi", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/76/66/76661f155b1fa03fd3ebcdbf9e4158bd.jpg", "rating": null, "synopsis": "Fátima, de 17 años, es la pequeña de tres hermanas y crece en una familia franco-argelina unida y amorosa en los suburbios. Buena estudiante, consigue entrar en la Universidad de París, donde comienza una nueva etapa marcada por la libertad y el descubrimiento personal. Al alejarse de su entorno familiar, explora nuevas amistades, relaciones y formas de vivir, mientras navega entre dos mundos culturales que a menudo chocan. Fátima debe enfrentarse a tensiones internas y externas al intentar construir una identidad propia sin renunciar a sus raíces.", "sensacine_id": "303094", "tmdb_id": null}, {"id": 30, "title": "La novia de Frankenstein", "director": "James Whale", "genre": "Fantasía, Terror, Ciencia ficción", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/medias/nmedia/18/69/43/89/19064458.jpg", "rating": null, "synopsis": "Al sobrevivir y huir el monstruo del baron Henry Frankenstein (Colin Clavel), el siniestro Dr. Praetorius (Ernest Thesiger, en una aclamada y deliciosa interpretación) le propone al cientifico que le creen una compañera.", "sensacine_id": "3097", "tmdb_id": null}, {"id": 31, "title": "La última cena", "director": "Mauro Borrelli", "genre": "Drama, Histórico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/11/ba/11bac1dde2b54c9b5eeefa7bf096a44d.jpg", "rating": null, "synopsis": "En una Jerusalén asfixiada por el polvo y la opresión, Jesús de Nazaret se reúne con sus doce apóstoles para celebrar lo que parece ser una cena de despedida. El ambiente exterior es eléctrico; la ciudad es un polvorín a punto de estallar debido a la brutal vigilancia de las legiones romanas y el descontento de un pueblo que clama por un líder político y militar. Sin embargo, el verdadero drama se desarrolla tras las puertas cerradas del cenáculo. A medida que el vino circula, la hermandad de los discípulos comienza a agrietarse. Lo que antes eran susurros y dudas teológicas se convierten en enfrentamientos abiertos:", "sensacine_id": "1000014776", "tmdb_id": null}, {"id": 32, "title": "Lapönia", "director": "David Serrano", "genre": "Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/66/4d/664d000f47244d5b05aa53e3ee9322d0.jpg", "rating": null, "synopsis": "Tras años sin reunirse en Navidad, Nuria invita a su hermana Mónica y su familia a pasar unas fiestas idílicas en Laponia, junto a su marido Olavi y su hija. Todo parece perfecto hasta que la niña revela a su primo que Papá Noel no existe, desatando el caos familiar. Lo que debía ser una celebración entrañable se convierte en una noche de tensiones, reproches y verdades incómodas, donde afloran secretos guardados y se abre un inesperado debate sobre si es mejor preservar la ilusión infantil o decir la verdad aunque duela.", "sensacine_id": "1000024385", "tmdb_id": null}, {"id": 33, "title": "Los Domingos", "director": "Alauda Ruiz de Azúa", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/9e/4a/9e4a3af5d3e43447c08db19eaf6fe4e3.jpg", "rating": null, "synopsis": "Ainara es una joven de 17 años brillante y uy idealista que, en lugar de elegir una carrera universitaria como espera su familia, decide entregarse a la vida religiosa, convirtiéndose en monja de clausura. Su inesperada decisión hace que los cimientos familiares se sacudan, generando sorpresa, conflictos y un profundo cuestionamiento sobre la fe, la libertad y el destino. A medida que cada miembro afronta la noticia, la familia se enfrenta a una prueba de fuego que cambiará sus vidas para siempre.", "sensacine_id": "1000020167", "tmdb_id": null}, {"id": 34, "title": "Maigret y la muerte del embajador", "director": "Pascal Bonitzer", "genre": "Crimen", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/50/22/5022e65123f3c2f3c35f8ceac056d366.png", "rating": null, "synopsis": "comisario Maigret es convocado de urgencia al Quai d’Orsay tras el asesinato de Monsieur Berthier-Lagès, un exembajador de prestigio cuya carrera diplomática marcó varias décadas. Desde el primer momento, Maigret se ve ante un caso lleno de secretos y emociones reprimidas: descubre que Berthier-Lagès mantenía desde hacía cincuenta años una correspondencia amorosa con la princesa de Vuynes, cuyo esposo ha fallecido misteriosamente poco antes. Mientras interroga a los miembros de ambas familias, que ocultan celosamente sus resentimientos y rencores, y trata de descifrar el extraño silencio de la fiel y enigmática criada del diplomático, Maigret se enfrenta a una serie de giros inesperados. Cada pista abre nuevas incógnitas: cartas escondidas, alianzas familiares secretas y pasiones ocultas que revelan que nada es lo que parece.", "sensacine_id": "325655", "tmdb_id": null}, {"id": 35, "title": "Marty Supreme", "director": "Josh Safdie", "genre": "Drama, Biopic", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/a8/e5/a8e58393b089b9ae573a06bf3e3068c9.jpg", "rating": null, "synopsis": "Marty Reisman, un carismático buscavidas de Nueva York, descubrió su don para el ping pong en los clubes clandestinos de Manhattan, donde jugaba por dinero. Su estilo llamativo y su audaz juego ofensivo lo llevaron a lo más alto del tenis de mesa, ganando 22 títulos importantes, incluidos dos campeonatos nacionales. Icono del espectáculo y la destreza, se convirtió, a los 67 años, en el campeón más veterano en un torneo nacional de deportes de raqueta. Su vida, entre apuestas, desafíos y gloria, es el retrato de un genio rebelde del deporte.", "sensacine_id": "1000007317", "tmdb_id": null}, {"id": 36, "title": "Noche de bodas 2", "director": "Matt Bettinelli-Olpin | Tyler Gillett", "genre": "Terror, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/52/d8/52d837b536ce21d6ba5b514375b1e77e.jpg", "rating": null, "synopsis": "En la secuela del aclamado thriller de horror y comedia negra Ready or Not, Grace (Samara Weaving) vuelve con sed de justicia tras sobrevivir al loco juego de la familia Le Domas. Pero esta vez, el juego es aún más peligroso, y las reglas han cambiado.Mientras aparecen nuevas y oscuras fuerzas, entre ellas misteriosos personajes interpretados por Sarah Michelle Gellar y Elijah Wood, Grace deberá enfrentarse a un nuevo desafío letal donde lo sobrenatural y lo humano se entrelazan. La cacería comienza de nuevo y esta vez, nadie está a salvo.", "sensacine_id": "1000001305", "tmdb_id": null}, {"id": 37, "title": "Noise (Ruidos)", "director": "Soo-jin Kim", "genre": "Terror, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/64/6e/646e9f16f9d654e20bc26f3fb239f3e3.jpg", "rating": null, "synopsis": "Jina es una mujer que es atormentada constantemente por un inquietante ruido de fondo que parece seguirla a todas partes. Desde la desaparición de su hermana pequeña, Minji, hace diez años, Jina no ha logrado encontrar paz. El sonido, que al principio parece un simple zumbido, comienza a intensificarse y a manifestarse en momentos específicos, lo que lleva a Jina a creer que está relacionado de alguna manera con la misteriosa desaparición de Minji. Así, su día a día se convierte en un infierno mientras intenta averiguar de donde viene ese sonido.", "sensacine_id": "325653", "tmdb_id": null}, {"id": 38, "title": "Núremberg", "director": "James Vanderbilt", "genre": "Histórico, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/72/f8/72f8911ca73177c4c0fa4cdc4b476d9d.jpg", "rating": null, "synopsis": "Tras la Segunda Guerra Mundial, durante los históricos juicios de Nuremberg, el psiquiatra estadounidense Douglas Kelley tiene la tarea de evaluar la salud mental de los prisioneros nazis para determinar si son aptos para ser juzgados por crímenes de guerra. En medio de esta responsabilidad, Kelley se enfrenta a Hermann Göring, mano derecha de Hitler, en una intensa batalla de ingenio y manipulación. Mientras Göring intenta mantener su poder, Kelley debe navegar entre la verdad, la justicia y la psicología de uno de los líderes más peligrosos del Tercer Reich.", "sensacine_id": "324466", "tmdb_id": null}, {"id": 39, "title": "Orwell: 2+2=5", "director": "Raoul Peck", "genre": "Documental", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/b5/b8/b5b83af99150bc5c81c391cbd2ca109c.jpg", "rating": null, "synopsis": "Raoul Peck se sumerge de lleno en los últimos meses de vida de George Orwell y en sus obras más visionarias para analizar el origen de conceptos clave como la vigilancia, la verdad manipulada o el control social. A través de una mirada crítica y contemporánea, el documental conecta el pensamiento del autor con los desafíos del presente, desvelando cómo sus advertencias siguen más vigentes que nunca. Una reflexión profunda sobre el poder, la libertad y la fragilidad de la verdad en el mundo actual.", "sensacine_id": "314229", "tmdb_id": null}, {"id": 40, "title": "Pillion", "director": "Harry Lighton", "genre": "Drama, Erótico, Comedia, Romántico", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/a2/05/a205ecea7ee491167d8a2eea56708319.jpg", "rating": null, "synopsis": "Colin, un hombre solitario, ve su vida transformada al conocer a Ray, un carismático líder de moteros. Lo que comienza como una amistad inesperada evoluciona hacia una relación marcada por una dinámica de sumisión que desafía las estructuras rígidas de Colin. A través de esta experiencia intensa y fuera de lo común, Colin confronta sus miedos, se libera de patrones autoimpuestos y experimenta un profundo proceso de autodescubrimiento. La presencia de Ray sacude su rutina y despierta en él una nueva forma de entender el deseo, el poder y la libertad personal.", "sensacine_id": "1000004467", "tmdb_id": null}, {"id": 41, "title": "Proyecto Salvación", "director": "Phil Lord | Christopher Miller", "genre": "Ciencia ficción, Acción, Aventura", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/46/3a/463a0d3860e79b345ecb71c56ae28bfa.jpg", "rating": null, "synopsis": "Un astronauta solitario (Ryan Gosling) despierta de un coma y se da cuenta de que está a millones de kilómetros de su hogar. En el diminuto vehículo en el que vuelve en sí, también hay dos miembros de la tripulación muertos. El astronauta no recuerda ni su misión ni su nombre. Sin embargo, pronto descubre que es la única esperanza para la supervivencia de la humanidad.", "sensacine_id": "282076", "tmdb_id": null}, {"id": 42, "title": "Ruta de escape", "director": "Bart Layton", "genre": "Crimen, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/b7/67/b767211a1a618183340db6f1b736c908.jpg", "rating": null, "synopsis": "Un escurridizo ladrón planea su mayor atraco, con la esperanza de que sea el último, cuando se ve obligado a colaborar con una ejecutiva de seguros desilusionada y a enfrentarse a un rival con métodos más peligrosos. A medida que se acerca el golpe multimillonario, un teniente implacable estrecha el cerco, aumentando el riesgo y difuminando la línea entre cazador y presa. Cada uno deberá asumir las consecuencias de sus decisiones, conscientes de que no hay vuelta atrás, mientras la tensión y la traición amenazan con destruir sus planes y su libertad.", "sensacine_id": "319570", "tmdb_id": null}, {"id": 43, "title": "Scream 7", "director": "Kevin Williamson", "genre": "Terror, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f9/57/f957e82b8374af3029d4e7acc0b62229.png", "rating": null, "synopsis": "Cuando un nuevo asesino Ghostface aparece en el tranquilo y relajaddo pueblo donde Sidney Prescott ha intentado reconstruir su vida, sus peores pesadillas vuelven. Todo se vuelve aún más aterrador cuando su hija se convierte en el nuevo objetivo del enmascarado.Obligada a enfrentarse a los traumas que creía enterrados, Sidney deberá enfrentarse a su oscuro pasado y a un enemigo implacable. En una carrera contra el tiempo, madre e hija lucharán por sobrevivir y acabar con la masacre de una vez por todas.", "sensacine_id": "318865", "tmdb_id": null}, {"id": 44, "title": "Shelter: El protector", "director": "Ric Roman Waugh", "genre": "Suspense, Acción", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/5f/7e/5f7eef89c25400a9789a612a9343c970.jpg", "rating": null, "synopsis": "En una isla alejada, un hombre en el exilio salva a una niña de una peligrosa tormenta, generando una peligrosa cadena de acontecimientos que los pone a los dos en peligro. Mientras sus caminos van uniéndose, tiene que protegerla a toda costa, haciendo frente a los enemigos que le persiguen por su pasado. Con persecuciones, enfrentamientos y desafíos complicados, la historia es una lucha por la supervivencia donde la valentía y el sacrificio marcarán la diferencia entre la vida y la muerte para ambos.", "sensacine_id": "1000005744", "tmdb_id": null}, {"id": 45, "title": "Super Mario Galaxy: La película", "director": "Aaron Horvath | Michael Jelenic", "genre": "Animación, Aventura, Familia, Acción, Fantasía", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/66/a2/66a2e1cd3bdf8978aefac262f3d5a0cb.png", "rating": null, "synopsis": "Tras asentarse en el Reino Champiñón y empezar por fin a encontrar su lugar, Mario y Luigi disfrutan de una aparente calma que pronto se ve interrumpida. Una enigmática llamada de auxilio irrumpe desde los rincones más olvidados del reino, señalando directamente a un pasado que la Princesa Peach ha mantenido en secreto durante años. Lo que comienza como una misión de rescate pronto se transforma en algo mucho más grande y peligroso de lo que cualquiera de ellos podría haber imaginado. Obligados a abandonar la seguridad de su hogar, Mario, Luigi y sus inseparables aliados se embarcan en una aventura que los llevará más allá de los límites conocidos, atravesando mundos desconocidos, galaxias lejanas y escenarios tan fascinantes como impredecibles. En su camino, se cruzarán con nuevos personajes —algunos dispuestos a ayudar, otros con intenciones más oscuras— que pondrán a prueba su valentía, su lealtad y su capacidad para trabajar en equipo. Mientras los misterios del pasado de Peach comienzan a desvelarse, el grupo descubrirá que la amenaza a la que se enfrentan no solo pone en riesgo el Reino Champiñón, sino el equilibrio de múltiples mundos. Entre desafíos épicos, decisiones difíciles y momentos de humor y camaradería, Mario y Luigi deberán demostrar una vez más que incluso los héroes más improbables pueden marcar la diferencia cuando todo está en juego.", "sensacine_id": "327878", "tmdb_id": null}, {"id": 46, "title": "Tafiti y sus amigos", "director": "Nina Wels", "genre": "Animación, Familia, Aventura", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/90/a5/90a558c0e47ff39af3eb5bb05cf738db.jpg", "rating": null, "synopsis": "En la magnífica sabana africana acechan muchos peligros, especialmente para una suricata como nuestro héroe Tafiti. Su abuelo Opapa le enseña que el mundo está lleno de riesgos y que es mejor que se mantengan entre ellos. Pero Tafiti no puede seguir este consejo y se apresura a rescatar a Pinsel, un cerdo de orejas de pincel. Entonces, una serpiente venenosa se cuela y muerde a Opapa. La única esperanza de salvación es una rara flor azul que florece al otro lado del desierto. Tafiti promete mantenerse alejado de los demás a partir de ahora, pero eso resulta más difícil de lo que pensaba. Pinsel sigue a Tafiti para saldar su deuda. Juntos, siguiendo el consejo de Opapa, se adentran en el infinito desierto, donde luchan por sobrevivir y crecen juntos en su mayor aventura.", "sensacine_id": "327254", "tmdb_id": null}, {"id": 47, "title": "Te querré siempre", "director": "Roberto Rossellini", "genre": "Drama, Romántico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/pictures/210/150/21015039_20130624224534163.jpg", "rating": null, "synopsis": "'Te querré siempre' cuenta la historia de Alex (George Sanders, 'Eva al desnudo') y Katherine Joyce (Ingrid Bergman, 'Casablanca'), un matrimonio inglés que hereda una finca en la ciudad de Napolés (Italia). No están dispuestos a mantenerla, y buscan la posibilidad de deshacerse de ella, vendiéndosela a algún comprador de la zona interesado. Al poco de llegar, la relación de la pareja empieza a desintegrarse. Las mutuas incompresiones del matrimonio y los continuos celos que ambos despiertan en el otro hacen ver que no hay más futuro juntos. Las cosas acaban mal y ambos deciden zanjar el asunto y pedir el divorcio cuando vuelvan a Reino Unido. Aprovechando la estancia en Italia, realizan una excursión a Pompeya, donde quedan sorprendidos por las ruinas de la mítica ciudad a la sombra del Vesubio. A su vuelta a Nápoles, se ven atrapados en mitad de una procesión religiosa, que, al parecer de forma milagrosa, consigue reavivar el amor de la pareja.", "sensacine_id": "3625", "tmdb_id": null}, {"id": 48, "title": "Te van a matar", "director": "Kirill Sokolov", "genre": "Acción, Comedia, Terror", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/86/d8/86d88028ffaf06446239539602901819.jpg", "rating": null, "synopsis": "Una mujer acepta un empleo como ama de llaves en un gran rascacielos de Nueva York, sin poder imaginar que bajo su elegante apariencia se ocultan grandes secretos. Pronto descubre que el edificio esconde un historia de desapariciones y sucesos inexplicables que envuelven a sus residentes en un misterio que va en aumento. Mientras investiga lo que está pasando, se enfrenta a amenazas y enigmas que la obligan a poner a prueba su ingenio y coraje para sobrevivir y descubrir los secretos que se esconden en el edifico.", "sensacine_id": "1000004914", "tmdb_id": null}, {"id": 49, "title": "Torrente presidente", "director": "Santiago Segura", "genre": "Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/ce/63/ce63bc4bd27995d49be93a2891504e53.png", "rating": null, "synopsis": "Una tarde a la hora de la comida en un bar. Allí, dos importantes afiliados al parido de extrema derecha NOX, se fijan en la actitud y el magnetismo que desprende Jose Luis Torrente con los parroquianos del lugar, y deciden invitarle para hablar en un par de mítines. Lo que estos dos jóvenes desconocen es que abren la caja de los truenos y Torrente poco a poco comienza a ganar poder dentro del partido y su discurso fascista empieza a calar entre los votantes. A partir de ahí comienzan una serie de acontecimientos a cada cual más surrealista, en la sexta sátira de la sociedad española -a manos del director y actor Santiago Segura- vista desde la óptica del policía más marrano e irreverente del cine español.", "sensacine_id": "324865", "tmdb_id": null}, {"id": 50, "title": "Tres adioses", "director": "Isabel Coixet", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f4/0e/f40e5bf6fa7c09e667c1f159c50c88c2.jpg", "rating": null, "synopsis": "Tras una discusión que no parece gran cosa, Marta y Antonio deciden separarse. Él, un chef en ascenso, se vuelca en la cocina para superar la ruptura, mientras ella se sumerge en un silencio que pronto revela algo más que tristeza: ha perdido el apetito. Cuando descubre que su malestar esconde un problema de salud, su vida cambia por completo.De pronto, los sentidos se intensifican: la comida recupera su sabor, la música la conmueve y el deseo renace, impulsándola a vivir plenamente y sin miedo.", "sensacine_id": "1000019852", "tmdb_id": null}, {"id": 51, "title": "Un altre home", "director": "David Moragas", "genre": "Comedia, Romántico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/8e/ee/8eee81438bdb5e1553a1cd548bfb1791.jpg", "rating": null, "synopsis": "Marc y Eudald parecen tener una vida estable y ordenada hasta que la llegada de un nuevo vecino en la ventana de enfrente despierta en ellos sentimientos inesperados y tensiones. Marc comienza a cuestionar sus propios deseos e insatisfacciones, mientras Eudald intenta con insistencia mantener y fortalecer su vínculo, poniendo a prueba la solidez de su relación.En este momento decisivo para ambos, se exploran temas de identidad, conexión y pérdida, revelando cómo los cambios externos e internos pueden transformar radicalmente una relación.", "sensacine_id": "1000014436", "tmdb_id": null}, {"id": 52, "title": "Una batalla tras otra", "director": "Paul Thomas Anderson", "genre": "Acción, Drama, Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/a6/af/a6af650c0fe2634ffe65b610e02fe489.jpg", "rating": null, "synopsis": "Bob Ferguson es un ex revolucionario cuya vida da un giro cuando su hija es secuestrada por un enemigo de su pasado. Desesperado por recuperarla, Bob se ve obligado a confrontar viejas heridas y a recurrir a un grupo de antiguos compañeros revolucionarios liderados por el experimentado Sensei Sergio.Juntos planean enfrentarse a fuerzas peligrosas, combinando astucia, estrategia y habilidades adquiridas en su pasado militante. La historia mezcla acción, suspenso y redención mientras Bob lucha por salvar a su hija y reconciliarse con su historia.", "sensacine_id": "311364", "tmdb_id": null}, {"id": 53, "title": "Una hija en Tokio", "director": "Guillaume Senez", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/7d/3d/7d3d7bfde0c5ca13e16ff92ffbf6495b.jpg", "rating": null, "synopsis": "Jay es un taxista que ha pasado 13 años en Japón y recorre las calles de Tokio cada noche mientras carga con la ausencia de su hija, Lily, a quien no ha visto en casi una década. Después de una dolorosa separación, Jay perdió el derecho a la custodia compartida y, tras años de búsqueda sin éxito, se ha vuelto a Francia. Sin embargo, justo cuando está a punto de abandonar el país y su esperanza, un encuentro inesperado sucede: una noche, Lily sube a su taxi, dándole a Jay una oportunidad inesperada de reencontrarse con su hija.", "sensacine_id": "313955", "tmdb_id": null}, {"id": 54, "title": "Valor sentimental", "director": "Joachim Trier", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/35/66/35661f40931132d1af3e82b56fed553f.jpg", "rating": null, "synopsis": "Nora y su hermana Agnes intentan superar la reciente pérdida de su madre cuando su padre, Gustav, regresa de forma inesperada a sus vidas. Con la intención de volver a conectar, Gustav les presenta un guion que ha escrito, ofreciéndole a Nora el papel principal. Pero Nora, que aún está dolida y desconfía, lo rechaza de forma tajante. Mientras las tensiones familiares van creciendo, las tres personas enfrentan viejas heridas, silencios incómodos y la difícil tarea de reconstruir los lazos rotos por el tiempo y el dolor.", "sensacine_id": "298726", "tmdb_id": null}, {"id": 55, "title": "Votemos", "director": "Santiago Requejo", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/1b/75/1b75e41380bab05d784f93d17ac9e5b3.jpg", "rating": null, "synopsis": "En un edificio del centro de Madrid, una comunidad de vecinos se reúne para discutir un tema aparentemente trivial: la votación sobre el cambio del ascensor. Cada propietario expone su punto de vista sobre los gastos, la necesidad de mejora y las molestias que la obra pueda causar. Sin embargo, la calma se esfuma cuando uno de los vecinos anuncia que alquilará su piso a una persona con problemas de salud mental, una noticia que genera incomodidad y temor en la mayoría de los asistentes. Así, se transforma una junta de rutina en un debate sobre prejuicios, miedos y empatía.", "sensacine_id": "1000015044", "tmdb_id": null}, {"id": 56, "title": "Whistle: El silbido del mal", "director": "Corin Hardy", "genre": "Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/6b/a0/6ba0fbaa8f5734ee8d0b85195b9b6b3b.jpg", "rating": null, "synopsis": "Un grupo de estudiantes inadaptados encuentra accidentalmente un antiguo silbato azteca maldito. Al soplarlo, liberan un terrorífico sonido que invoca sus futuras muertes, convirtiéndose en presas de un destino mortal.A medida que las víctimas se multiplican, los amigos luchan contra el miedo y la desesperación para descubrir el origen del artefacto y detener la cadena de sucesos macabros que han desatado, enfrentándose a fuerzas sobrenaturales que desafían toda lógica y ponen a prueba su valor y su amistad.", "sensacine_id": "321708", "tmdb_id": null}, {"id": 57, "title": "Yo te creo", "director": "Charlotte Devillers | Arnaud Dufeys", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/4e/6a/4e6af0b2ab85d2adb3933461a5e83d17.jpg", "rating": null, "synopsis": "Hoy Alice se enfrenta a un momento decisivo ante el juez donde cualquier error puede cambiar el destino de sus hijos. Obligada a hablar en su nombre debe confrontar a su padre en una batalla legal cargada de tensión emocional. Cada palabra, cada gesto cuenta mientras lucha por protegerlos y asegurar su bienestar.La historia sigue su angustia y determinación mostrando el peso de la responsabilidad y la fuerza del vínculo maternal, en un enfrentamiento donde el tiempo y la justicia parecen jugar en su contra, y la esperanza pende de un hilo.", "sensacine_id": "325519", "tmdb_id": null}, {"id": 58, "title": "Your Name", "director": "Makoto Shinkai", "genre": "Animación, Fantasía", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/17/02/08/13/45/536055.jpg", "rating": null, "synopsis": "La joven Mitsuha vive en un pequeño pueblecito entre las montañas. Sin muchas sorpresas ni demasiadas emociones, la adolescente tiene un par de amigos, además de a su hermana pequeña, su abuela y su padre, con el que tiene una relación algo distante. La única expectación un poco emocionante es el cometa Tiamat, que está pasando cerca de la Tierra y por unos días será visible a simple vista. Pero un día despierta y descubre con asombro que no reconoce su cuerpo, y piensa que se trata de un extraño sueño. Pero no es así: se encuentra dentro del cuerpo de un chico, concretamente de Taki, un joven estudiante de bachillerato de la gran ciudad de Tokio. A Taki le sucederá lo mismo, y es Mitsuha la que se intercambia con él. Metidos dentro de un cuerpo que les resulta tan extraño, poco a poco, los dos jóvenes empiezan a comunicarse y, torpemente, van superando los retos que se presentan en ambas vidas. De esta forma, el vínculo que tienen se convierte en algo más. Lo que no saben es que algo inesperado está a punto de ser revelado. Filme de animación dirigido por el nipón Makoto Shinkai, responsable de filmes como El jardín de las palabras (2013), Viaje a Agartha (2011) o 5 centímetros por segundo (2007).", "sensacine_id": "249877", "tmdb_id": null}, {"id": 59, "title": "Zootrópolis 2", "director": "Byron Howard | Jared Bush", "genre": "Animación, Aventura, Familia, Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/95/4c/954c30eb27156ff168370a46ca2a3f5b.jpg", "rating": null, "synopsis": "Judy y Nick se enfrentan a un nuevo y enigmático desafío cuando un misterioso reptil llega a Zootopia y altera por completo la vida en la metrópolis de los mamíferos. Siguiendo su peligrosa pista, ambos se ven obligados a meterse de incógnito en rincones que nunca antes habían explorado de la ciudad, donde descubrirán secretos ocultos y se toparán con inesperados obstáculos.En medio de esta misión, su sociedad (cada vez más sólida pero también más exigida) será puesta a prueba como nunca, revelando la fuerza y los límites de su unión.", "sensacine_id": "277428", "tmdb_id": null}];

  'Misterio':   { grad: 'linear-gradient(160deg, #0a0a1a 0%, #1a1a3e 50%, #2d1b4e 100%)', icon: '\u{1F50D}', fx: 'scan' },
  'Thriller':   { grad: 'linear-gradient(160deg, #0a1a0a 0%, #1a2e1a 50%, #2e3e1e 100%)', icon: '\u{1F5E1}', fx: 'scan' },
  'Drama':      { grad: 'linear-gradient(160deg, #1a1a2e 0%, #2a1a3e 50%, #3a2a5e 100%)', icon: '\u{1F3AD}', fx: 'shimmer' },
  'Comedia':    { grad: 'linear-gradient(160deg, #2e2a00 0%, #4e3a00 50%, #6e5a10 100%)', icon: '\u{1F602}', fx: 'bounce' },
  'Acci\u00f3n': { grad: 'linear-gradient(160deg, #1a0a00 0%, #3e1a00 50%, #6e3a00 100%)', icon: '\u{1F4A5}', fx: 'pulse' },
  'Ciencia ficci\u00f3n': { grad: 'linear-gradient(160deg, #001a2e 0%, #002a4e 50%, #004a6e 100%)', icon: '\u{1F680}', fx: 'pulse' },
  'Animaci\u00f3n': { grad: 'linear-gradient(160deg, #1a0a2e 0%, #2e1a5e 30%, #e94560 70%, #f5c518 100%)', icon: '\u2728', fx: 'bounce' },
  'Romance':    { grad: 'linear-gradient(160deg, #2e0a1a 0%, #4e1a2a 50%, #6e2a4a 100%)', icon: '\u{1F495}', fx: 'shimmer' },
  'Documental': { grad: 'linear-gradient(160deg, #1a1a0a 0%, #2e2a1a 50%, #4e3e2a 100%)', icon: '\u{1F39E}', fx: 'grain-heavy' },
  'M\u00fasica': { grad: 'linear-gradient(160deg, #0a1a2e 0%, #1a2e4e 50%, #3a4e6e 100%)', icon: '\u{1F3B5}', fx: 'bounce' },
  'Aventura':   { grad: 'linear-gradient(160deg, #0a2e1a 0%, #1a4e2a 50%, #2a6e3a 100%)', icon: '\u{1F5FA}', fx: 'shimmer' },
  'Ciclo':      { grad: 'linear-gradient(160deg, #1a1a1a 0%, #2a2a2a 50%, #3a3a3a 100%)', icon: '\u{1F3AC}', fx: 'grain-heavy' },
};

function getGenreTheme(genreStr) {
  if (!genreStr) return { grad: 'linear-gradient(160deg, #1a1a2e, #2a2a4e)', icon: '\u{1F3AC}', fx: '' };
  const genres = genreStr.split(',').map(g => g.trim());
  for (const g of genres) { if (GENRE_THEMES[g]) return GENRE_THEMES[g]; }
  return { grad: 'linear-gradient(160deg, #1a1a2e, #2a2a4e)', icon: '\u{1F3AC}', fx: '' };
}

function generatePosterHtml(title, genre) {
  const theme = getGenreTheme(genre);
  const genres = (genre || '').split(',').map(g => g.trim());
  let particles = '';
  const colors = {
    'Terror': ['#ff0000','#8b0000','#ff4444'],
    'Animaci\u00f3n': ['#e94560','#f5c518','#64b5f6','#81c784','#ce93d8'],
    'Acci\u00f3n': ['#ff6600','#ff9900','#ffcc00'],
    'Ciencia ficci\u00f3n': ['#00ccff','#0088ff','#00ffcc'],
    'Romance': ['#ff69b4','#ff1493','#ff6eb4'],
    'Comedia': ['#f5c518','#ffcc00','#ff9900'],
    'M\u00fasica': ['#64b5f6','#42a5f5','#90caf9'],
  };
  const pColors = colors[genres[0]] || ['#ffffff','#aaaaaa','#888888'];
  for (let i = 0; i < 6; i++) {
    const c = pColors[i % pColors.length];
    const left = 10 + Math.floor((i * 37 + 13) % 80);
    const size = 3 + (i % 4);
    const delay = (i * 0.7).toFixed(1);
    particles += `<span style="left:${left}%;width:${size}px;height:${size}px;background:${c};animation-delay:${delay}s"></span>`;
  }
  let fxHtml = '';
  if (theme.fx === 'scan') fxHtml = '<div class="gp-scanline"></div>';
  let fxStyle = '';
  if (theme.fx === 'flicker') fxStyle = 'animation: flicker 3s infinite;';
  if (theme.fx === 'shimmer') fxStyle = 'background-size: 200% 100%; animation: shimmer 4s ease infinite;';
  if (theme.fx === 'pulse') fxStyle = 'animation: pulse-glow 2.5s ease-in-out infinite;';
  let iconStyle = '';
  if (theme.fx === 'bounce') iconStyle = 'animation: bounce-icon 2s ease-in-out infinite;';
  return `<div class="gen-poster" style="background:${theme.grad};${fxStyle}">
    <div class="gp-particles">${particles}</div>
    ${fxHtml}
    <div class="gp-icon" style="${iconStyle}">${theme.icon}</div>
    <div class="gp-genre">${genres[0] || ''}</div>
    <div class="gp-title">${title.replace(/ *\(.*\)$/, '')}</div>
  </div>`;
}
