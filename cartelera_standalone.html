<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía del Ocio Madrid — Cartelera y Conciertos</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a2e;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --border: #2a2a3e;
    --gold: #f5c518;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 1.5rem 2rem;
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: 0.85rem; color: var(--muted); }
  .controls input[type="date"],
  .controls select {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.4rem 0.6rem; font-size: 0.9rem;
  }
  .search-bar {
    display: flex; justify-content: center; padding: 1rem 2rem 0;
  }
  .search-bar input {
    width: 100%; max-width: 500px; padding: 0.6rem 1rem; padding-left: 2.4rem;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); font-size: 0.95rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }
  .search-wrapper { position: relative; width: 100%; max-width: 500px; }
  .search-wrapper::before {
    content: '\1F50D'; position: absolute; left: 0.7rem; top: 50%;
    transform: translateY(-50%); font-size: 0.9rem; pointer-events: none;
  }
  .tabs { display: flex; gap: 0; margin: 1.5rem 2rem 0; }
  .tab {
    padding: 0.6rem 1.4rem; background: var(--card);
    border: 1px solid var(--border); border-bottom: none;
    cursor: pointer; font-size: 0.9rem; color: var(--muted);
    border-radius: 8px 8px 0 0; transition: all 0.2s;
  }
  .tab.active {
    background: var(--bg); color: var(--text);
    border-color: var(--accent); border-bottom-color: var(--bg);
  }
  .content { padding: 1.5rem 2rem; }
  .stats { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.8rem 1.2rem; min-width: 120px;
  }
  .stat-box .num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .stat-box .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.2rem;
  }
  .movie-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .movie-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .movie-card .top { display: flex; gap: 1rem; padding: 1rem; }
  .movie-card .poster {
    width: 100px; height: 150px; border-radius: 6px;
    object-fit: cover; background: var(--border); flex-shrink: 0;
  }
  .movie-card .poster-placeholder {
    width: 100px; height: 150px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative; overflow: hidden;
    background: var(--border); color: var(--muted);
    font-size: 0.7rem; text-align: center; padding: 0.5rem;
    font-weight: 600; line-height: 1.3;
  }
  /* YouTube thumbnail poster */
  .yt-poster {
    width: 100px; height: 150px; border-radius: 6px;
    position: relative; overflow: hidden; flex-shrink: 0;
    cursor: pointer; background: var(--border);
  }
  .yt-poster img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.3s, filter 0.3s;
  }
  .yt-poster:hover img { transform: scale(1.05); filter: brightness(0.7); }
  .yt-poster .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 32px; height: 32px; background: rgba(229,69,96,0.9);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .yt-poster:hover .play-btn { opacity: 1; }
  .yt-poster .play-btn::after {
    content: ''; width: 0; height: 0;
    border-style: solid; border-width: 6px 0 6px 11px;
    border-color: transparent transparent transparent #fff;
    margin-left: 2px;
  }
  /* Trailer modal */
  .trailer-modal {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.92); display: none;
    align-items: center; justify-content: center;
    padding: 1rem;
  }
  .trailer-modal.active { display: flex; }
  .trailer-modal .modal-content {
    position: relative; width: 100%; max-width: 800px;
    aspect-ratio: 16/9; border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .trailer-modal iframe {
    width: 100%; height: 100%; border: none;
  }
  .trailer-modal .close-btn {
    position: absolute; top: -36px; right: 0;
    background: none; border: none; color: #fff;
    font-size: 1.6rem; cursor: pointer; padding: 0.2rem 0.5rem;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .trailer-modal .close-btn:hover { opacity: 1; }
  /* Genre-based animated poster styles */
  .gen-poster {
    width: 100px; height: 150px; border-radius: 6px;
    position: relative; overflow: hidden; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding: 0.4rem; text-align: center;
  }
  .gen-poster .gp-title {
    font-size: 0.55rem; font-weight: 700; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8); z-index: 2;
    line-height: 1.2; max-height: 3rem; overflow: hidden;
    letter-spacing: 0.3px; text-transform: uppercase;
  }
  .gen-poster .gp-genre {
    font-size: 0.45rem; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 1px; z-index: 2;
    margin-bottom: 0.2rem;
  }
  .gen-poster .gp-icon {
    font-size: 1.8rem; z-index: 2; margin-bottom: 0.3rem;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .gen-poster::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: inherit; opacity: 0.15;
  }
  /* Animated grain overlay */
  .gen-poster::after {
    content: ''; position: absolute; inset: -50%; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    animation: grain 4s steps(8) infinite;
    pointer-events: none;
  }
  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-5%, -5%); }
    30% { transform: translate(3%, -8%); }
    50% { transform: translate(-3%, 5%); }
    70% { transform: translate(7%, 2%); }
    90% { transform: translate(-2%, 4%); }
  }
  /* Floating particles for animated genres */
  .gen-poster .gp-particles {
    position: absolute; inset: 0; z-index: 1; overflow: hidden;
  }
  .gen-poster .gp-particles span {
    position: absolute; border-radius: 50%; opacity: 0.4;
    animation: float-up 4s ease-in infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(100%) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    100% { transform: translateY(-100%) scale(1); opacity: 0; }
  }
  /* Scan line for thriller */
  .gp-scanline {
    position: absolute; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,0.15); z-index: 2;
    animation: scan 3s linear infinite;
  }
  @keyframes scan {
    0% { top: -2px; } 100% { top: 100%; }
  }
  /* Flicker for terror */
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 0.9; }
    98% { opacity: 0.3; }
  }
  /* Shimmer for drama */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  /* Pulse glow for sci-fi */
  @keyframes pulse-glow {
    0%, 100% { box-shadow: inset 0 0 15px rgba(0,200,255,0.2); }
    50% { box-shadow: inset 0 0 25px rgba(0,200,255,0.5); }
  }
  /* Bounce for animation genre */
  @keyframes bounce-icon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .movie-card .info { flex: 1; min-width: 0; }
  .movie-card .title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.3rem; line-height: 1.3; }
  .movie-card .meta { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .movie-card .synopsis {
    font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    cursor: pointer;
  }
  .movie-card .synopsis.expanded { -webkit-line-clamp: unset; display: block; }
  .movie-card .rating {
    display: inline-flex; align-items: center; gap: 0.25rem;
    color: var(--gold); font-weight: 600; font-size: 0.9rem; margin-top: 0.3rem;
  }
  .movie-card .top { cursor: pointer; }
  .movie-card .showtimes-toggle {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--border); padding: 0.5rem 1rem;
    cursor: pointer; color: var(--muted); font-size: 0.78rem;
    transition: color 0.2s;
  }
  .movie-card .showtimes-toggle:hover { color: var(--text); }
  .movie-card .showtimes-toggle .arrow {
    transition: transform 0.3s; font-size: 0.7rem;
  }
  .movie-card.expanded .showtimes-toggle .arrow { transform: rotate(180deg); }
  .movie-card .showtimes-section {
    border-top: 1px solid var(--border); padding: 0 1rem;
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .movie-card.expanded .showtimes-section { max-height: 2000px; padding: 0.8rem 1rem; }
  .movie-card .cinema-group { margin-bottom: 0.6rem; }
  .movie-card .cinema-group:last-child { margin-bottom: 0; }
  .movie-card .cinema-name {
    font-size: 0.75rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.3rem;
  }
  .time-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .chip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.2rem 0.5rem;
    font-size: 0.78rem; white-space: nowrap;
  }
  .chip.vose { border-color: #4caf50; color: #81c784; }
  .chip.imax { border-color: #2196f3; color: #64b5f6; }
  .chip.atmos { border-color: #9c27b0; color: #ce93d8; }
  .chip.three-d { border-color: #ff9800; color: #ffb74d; }
  .cinemas-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .cinema-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem 1.2rem; cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .cinema-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .cinema-card.no-sessions { opacity: 0.5; cursor: default; }
  .cinema-card.no-sessions:hover { border-color: var(--border); transform: none; }
  .cinema-card h3 { font-size: 1rem; margin-bottom: 0.3rem; }
  .cinema-card .addr { font-size: 0.8rem; color: var(--muted); }
  .cinema-card .movie-count { font-size: 0.75rem; color: var(--accent); margin-top: 0.4rem; }
  .cinema-card.no-sessions .movie-count { color: var(--muted); }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 1.1rem; }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.35rem 0.9rem;
    color: var(--muted); cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* Concert venue groups */
  .venue-group {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem;
  }
  .venue-header {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.2rem; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .venue-header:hover { background: rgba(156,39,176,0.08); }
  .venue-header .venue-icon {
    width: 48px; height: 48px; border-radius: 8px;
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; flex-shrink: 0;
  }
  .venue-header .venue-info { flex: 1; min-width: 0; }
  .venue-header .venue-title { font-size: 1.1rem; font-weight: 700; color: #ce93d8; }
  .venue-header .venue-address { font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem; }
  .venue-header .venue-count {
    background: var(--accent); color: #fff; border-radius: 12px;
    padding: 0.2rem 0.7rem; font-size: 0.8rem; font-weight: 600; flex-shrink: 0;
  }
  .venue-events { padding: 0; }
  .venue-event {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.8rem 1.2rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .venue-event:last-child { border-bottom: none; }
  .venue-event:hover { background: rgba(156,39,176,0.05); }
  .venue-event .event-img {
    width: 56px; height: 56px; border-radius: 6px;
    object-fit: cover; background: var(--border); flex-shrink: 0;
  }
  .venue-event .event-placeholder {
    width: 56px; height: 56px; border-radius: 6px;
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .venue-event .event-info { flex: 1; min-width: 0; }
  .venue-event .event-title { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
  .venue-event .event-artist { font-size: 0.82rem; color: #ce93d8; }
  .venue-event .event-meta {
    display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.3rem; font-size: 0.75rem;
  }
  .venue-event .event-meta .tag {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.1rem 0.45rem;
  }
  .tag.date-tag { border-color: #9c27b0; color: #ce93d8; }
  .tag.price-tag { border-color: #4caf50; color: #81c784; }
  .tag.genre-tag { border-color: #2196f3; color: #64b5f6; }
  .venue-event .ticket-btn {
    color: #ce93d8; text-decoration: none; font-size: 0.78rem;
    border: 1px solid #9c27b0; border-radius: 6px;
    padding: 0.3rem 0.7rem; flex-shrink: 0; transition: background 0.2s;
  }
  .venue-event .ticket-btn:hover { background: rgba(156,39,176,0.2); }
  /* Date filter pills for concerts */
  .date-filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .date-pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.35rem 0.9rem;
    color: var(--muted); cursor: pointer; font-size: 0.82rem; transition: all 0.2s;
    text-transform: capitalize;
  }
  .date-pill.active { background: #9c27b0; border-color: #9c27b0; color: #fff; }
  .date-pill:hover { border-color: #9c27b0; color: #ce93d8; }
  @media (max-width: 600px) {
    .movies-grid { grid-template-columns: 1fr; }
    header { padding: 1rem; }
    .content { padding: 1rem; }
    .search-bar { padding: 1rem 1rem 0; }
    .tabs { margin: 1rem 1rem 0; }
  }
</style>
</head>
<body>

<header>
  <h1><span>Guía</span>Madrid</h1>
  <div class="controls">
    <label>Fecha:</label>
    <input type="date" id="datePicker" value="2026-03-25">
    <select id="cinemaFilter">
      <option value="">Todos los cines</option>
    </select>
  </div>
</header>

<div class="search-bar">
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Buscar película o cine..." autocomplete="off">
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="peliculas">Películas</div>
  <div class="tab" data-tab="conciertos">Conciertos</div>
  <div class="tab" data-tab="cines">Cines</div>
</div>

<!-- Trailer modal -->
<div class="trailer-modal" id="trailerModal" onclick="closeTrailer(event)">
  <div class="modal-content">
    <button class="close-btn" onclick="closeTrailer()">&times;</button>
    <iframe id="trailerFrame" allowfullscreen allow="autoplay"></iframe>
  </div>
</div>

<div class="content">
  <div id="peliculas-tab">
    <div class="stats" id="stats"></div>
    <div class="filter-bar" id="lang-filters"></div>
    <div id="movies-container" class="loading">Cargando cartelera...</div>
  </div>
  <div id="conciertos-tab" style="display:none">
    <div class="stats" id="concert-stats"></div>
    <div class="date-filters" id="concert-date-filters"></div>
    <div id="concerts-container" class="loading">Cargando conciertos...</div>
  </div>
  <div id="cines-tab" style="display:none">
    <div id="cinemas-container" class="loading">Cargando cines...</div>
  </div>
</div>

<script>

const EMBEDDED_MOVIES = [{"id": 1, "title": "Amarga Navidad", "director": "Pedro Almodóvar", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/60/ff/60ff5df4d1e858aa504693e07468e58d.jpg", "rating": null, "synopsis": "Elsa es una directora de publicidad, cuya madre fallece durante un puente en el mes de diciembre. Para sobrellevar el duelo, Elsa se centra plenamente en el trabajo, sin dejar tiempo para superarlo, intentando huir hacia delante. Sin embargo, una crisis de pánico la obliga a parar y tener que descansar.Bonifacio, su pareja, había sido su salvación y la había ayudado a sobrellevar el fallecimiento. Pero para pasar página, Elsa decide irse a Lanzarote con su amiga Patricia, que también necesita un descanso de Madrid, mientras que Bonifacio se queda en la capital.", "sensacine_id": "1000025821", "tmdb_id": 1088548}, {"id": 2, "title": "Avatar: Fuego y ceniza", "director": "James Cameron", "genre": "Ciencia ficción, Aventura, Acción, Fantasía", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/1e/0a/1e0aff63b4c1fa267e451bf3174a4d5a.jpg", "rating": null, "synopsis": "En la tercera entrega de la saga Avatar, se introduce al Pueblo de las Cenizas, un nuevo clan Na'vi con una visión más agresiva que el resto de pueblos del mundo. A diferencia de los clanes vistos anteriormente, estos Na'vi no dudan en recurrir a la violencia para conseguir sus fines, incluso si eso significa enfrentarse a otros clanes. Con esta nueva amenaza, Pandora se convierte en un territorio aún más inestable, donde los conflictos internos ponen en peligro el equilibrio del planeta y obligan a replantear la lucha por su supervivencia.", "sensacine_id": "187247", "tmdb_id": null}, {"id": 3, "title": "Aves de corral", "director": "Antonio Vicent", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/09/f2/09f29984137fc6fd3f6b557d0238835f.jpg", "rating": null, "synopsis": "P  Nolan", "genre": "Ciencia ficción, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/pictures/14/10/02/11/07/341344.jpg", "rating": null, "synopsis": "Inspirada en la teoría del experto en relatividad Kip Stepehen Thorne sobre la existencia de los agujeros de gusano, y su función como canal para llevar a cabo los viajes en el tiempo. La historia gira en torno a un grupo de intrépidos exploradores que se adentran por uno de esos agujeros y viajan a través del mismo, encontrándose en otra dimensión. Un mundo desconocido se abre ante ellos y deberán luchar por mantenerse unidos si quieren volver de una pieza.La película cuenta con un reparto de lujo con nombres como Matthew McConaughey ('Sahara'), Anne Hathaway ('El caballero oscuro. La leyenda renace'), Jessica Chastain ('La noche más oscura') y Michael Caine ('El caballero oscuro'), todos ellos a las órdenes de Christopher Nolan ('Memento', 'Origen').", "sensacine_id": "114782", "tmdb_id": null}, {"id": 22, "title": "La Fiera", "director": "Salvador Calvo", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/d6/c5/d6c53c32281f0b7facfc1d6619d1b87c.jpg", "rating": null, "synopsis": "Un grupo de tres amigos, Carlos, Darío y Armando, apasionados por los deportes de riesgo, descubren la sensación más cercana a desafiar a la gravedad: el salto BASE con traje de alas. Los tres lo prueban y se enamoran de la sensación que les produce.Se cuenta su aventura real desde dentro, mostrando el vértigo que produce, los miedos que surgen con el riesgo y la euforia de los que se enfrentan al vacío. El grupo de amigos muestra una historia sobre peligros y compañerismo, que acaba en un viaje brutal y lleno de emociones donde el mayor desafío no está en el aire sino en uno mismo.", "sensacine_id": "1000036246", "tmdb_id": null}, {"id": 23, "title": "La Piel del Agua", "director": "Patricia Velasquez", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/c4/6f/c46f5c573294432ed2c1403f34c75d9a.jpg", "rating": null, "synopsis": "Camila, una adolescente de quince años, enfrenta el momento más difícil de su vida: su madre está en coma y se ve obligada a mudarse con su padre, un hombre al que apenas conoce y con quien no quiere vivir. Sola y desorientada, busca consuelo en Diego, su primer amor, un chico enigmático y lleno de contradicciones. Pero lo que parecía un refugio pronto se convierte en un nuevo foco de confusión, donde el amor, la rabia y la incertidumbre se entrelazan. Camila deberá encontrar su propio camino en medio del caos emocional que la envuelve.", "sensacine_id": "1000016885", "tmdb_id": null}, {"id": 24, "title": "La asistenta", "director": "Paul Feig", "genre": "Suspense", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/71/83/7183a7a55e47f98332d9ef93b5518384.jpg", "rating": null, "synopsis": "Basada en la novela de Freida McFadden y adaptada por Rebecca Sonnenshine, la película sigue a Millie (Sydney Sweeney), una joven con problemas que encuentra alivio al empezar de cero como empleada doméstica para Nina (Amanda Seyfried) y Andrew (Luke Sklenar), una pareja adinerada de alta sociedad. Sin embargo, pronto descubre que los oscuros secretos que esconden sus jefes son mucho más peligrosos que los suyos propios. A medida que su vida se entrelaza con la de la familia, Millie se enfrenta a verdades inquietantes que pondrán su seguridad y cordura al límite.", "sensacine_id": "317403", "tmdb_id": null}, {"id": 25, "title": "La chica zurda", "director": "Shih-Ching Tsou", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/5b/d4/5bd4170672abf66bff4814c6b28863f4.jpg", "rating": null, "synopsis": "Una madre soltera y sus dos hijas vuelven a Taipei tras años en el campo para abrir un puesto en un animado mercado nocturno. Mientras intentan adaptarse al ritmo de la ciudad y llegar a fin de mes, deben enfrentarse a tensiones familiares y a un pasado que resurge. La hija pequeña, zurda, recibe una advertencia inquietante de su abuelo: nunca usar su “mano del diablo”. A partir de ese momento, antiguos secretos de tres generaciones comienzan a salir a la luz, obligando a cada una a confrontar sus propias heridas y a redefinir los lazos que las unen.", "sensacine_id": "314618", "tmdb_id": null}, {"id": 26, "title": "La hija pequeña", "director": "Hafsia Herzi", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/76/66/76661f155b1fa03fd3ebcdbf9e4158bd.jpg", "rating": null, "synopsis": "Fátima, de 17 años, es la pequeña de tres hermanas y crece en una familia franco-argelina unida y amorosa en los suburbios. Buena estudiante, consigue entrar en la Universidad de París, donde comienza una nueva etapa marcada por la libertad y el descubrimiento personal. Al alejarse de su entorno familiar, explora nuevas amistades, relaciones y formas de vivir, mientras navega entre dos mundos culturales que a menudo chocan. Fátima debe enfrentarse a tensiones internas y externas al intentar construir una identidad propia sin renunciar a sus raíces.", "sensacine_id": "303094", "tmdb_id": null}, {"id": 27, "title": "La parada de los monstruos", "director": "Tod Browning", "genre": "Drama, Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/pictures/210/072/21007268_20130521141638708.jpg", "rating": null, "synopsis": "Cleopatra es una bella trapecista que centra su interés en el liliputiense Hans, un enano que trabaja en el mismo circo  como uno de los seres deformes que se exhiben como fenómenos. Hans se queda fascinado por la mujer, aunque ella sólo piensa en el dinero que él ha heredado. Es por ello que decide casarse con él y echarle veneno en la comida para así conseguir el la herencia y escapar con su amante Hércules. Sin embargo, el complot se descubre y los amigos de Hans harán todo lo posible porque Cleopatra no consiga su objetivo.", "sensacine_id": "340", "tmdb_id": null}, {"id": 28, "title": "La tarta del Presidente", "director": "Hasan Hadi", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/66/57/66579f98069add631ed33500ac48baec.jpg", "rating": null, "synopsis": "En el Iraq de Sadam Husein, donde la vida cotidiana está marcada por la escasez y el miedo, Lamia, una niña de nueve años, se enfrenta a una tarea imposible: conseguir los ingredientes para una tarta de cumpleaños obligatoria en honor al dictador. Bajo las duras sanciones internacionales y la vigilancia constante del régimen, Lamia recorre una ciudad desolada, usando su ingenio y valentía para cumplir con el mandato. Cada paso la acerca al riesgo de ser castigada con prisión o incluso la muerte.", "sensacine_id": "1000023006", "tmdb_id": null}, {"id": 29, "title": "Las locas del obelisco", "director": "Pablo Moreno", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/80/88/8088aa9778341bf51b01adbbfd41fa83.jpg", "rating": null, "synopsis": "A finales del siglo XIX, en un Madrid en plena transformación social y urbana, la vida de varias mujeres de diferentes clases sociales se entrelaza trágicamente en una ciudad marcada por la desigualdad, la hipocresía y la miseria moral. Teresa y Candela, dos hermanas del ámbito rural, llegan a la capital buscando una vida mejor, pero pronto se enfrentan a la crudeza de una ciudad que devora a las jóvenes sin recursos. En paralelo, María Ana Allsopp, una joven aristócrata mexicana afincada en Madrid, experimenta un profundo despertar de conciencia al confrontar el sufrimiento de las mujeres marginadas. Mientras la violencia, el abuso y la indiferencia amenazan con destruir las vidas de quienes luchan por salir adelante, la esperanza renace en la voluntad de unas pocas personas dispuestas a desafiar las normas establecidas. Inspirada por el sacerdote Francisco de Asís Méndez, María Ana decidirá arriesgar su vida cómoda y su estatus para dar voz y refugio a las que nunca la han tenido.", "sensacine_id": "1000039950", "tmdb_id": null}, {"id": 30, "title": "Los domingos", "director": "Alauda Ruiz de Azúa", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/9e/4a/9e4a3af5d3e43447c08db19eaf6fe4e3.jpg", "rating": null, "synopsis": "Ainara es una joven de 17 años brillante y uy idealista que, en lugar de elegir una carrera universitaria como espera su familia, decide entregarse a la vida religiosa, convirtiéndose en monja de clausura. Su inesperada decisión hace que los cimientos familiares se sacudan, generando sorpresa, conflictos y un profundo cuestionamiento sobre la fe, la libertad y el destino. A medida que cada miembro afronta la noticia, la familia se enfrenta a una prueba de fuego que cambiará sus vidas para siempre.", "sensacine_id": "1000020167", "tmdb_id": null}, {"id": 31, "title": "Los pecadores", "director": "Ryan Coogler", "genre": "Acción, Suspense, Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/4e/56/4e56af2ac8498963ab5f1e2003f26743.jpg", "rating": null, "synopsis": "Ambientada en los años 30, durante época de la Ley Seca, dos hermanos gemelos (interpretados ambos por el actor Michael B. Jordan) vuelven a su ciudad natal varios años después de abandonarla para intentar empezar de cero. Pero se dan cuenta de que un poder maligno mucho más temible espera con ganas su regreso a casa: y es que los vampiros han tomado el control del lugar. Ahora, los dos hermanos tendrán que unir fuerzas para acabar con los vampiros que han invadido su ciudad y volver a recuperar la normalidad.", "sensacine_id": "326355", "tmdb_id": null}, {"id": 32, "title": "Línea de extinción", "director": "George Nolfi", "genre": "Ciencia ficción, Suspense, Acción", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/af/48/af48e9e9a2b3f9ff4c349da817d8c434.jpg", "rating": null, "synopsis": "En un mundo devastado en el que solo los lugares situados a más de 2.500 metros son seguras, un padre arriesga todo para proteger a su hijo de las criaturas que acabaron con el 95% de la humanidad. Obligado a bajar hasta La Línea junto a una científica con la que no se lleva bien y una joven con ganas de aventura, tendrán que enfrentarse a peligros que no imaginan mientras buscan las claves para sobrevivir y salvar a la raza humana de la extinción.La lucha por sobrevivir  se convierte en un enfrentamiento entre miedo, sacrificio y esperanza.", "sensacine_id": "309288", "tmdb_id": null}, {"id": 33, "title": "Marty Supreme", "director": "Josh Safdie", "genre": "Drama, Biopic", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/a8/e5/a8e58393b089b9ae573a06bf3e3068c9.jpg", "rating": null, "synopsis": "Marty Reisman, un carismático buscavidas de Nueva York, descubrió su don para el ping pong en los clubes clandestinos de Manhattan, donde jugaba por dinero. Su estilo llamativo y su audaz juego ofensivo lo llevaron a lo más alto del tenis de mesa, ganando 22 títulos importantes, incluidos dos campeonatos nacionales. Icono del espectáculo y la destreza, se convirtió, a los 67 años, en el campeón más veterano en un torneo nacional de deportes de raqueta. Su vida, entre apuestas, desafíos y gloria, es el retrato de un genio rebelde del deporte.", "sensacine_id": "1000007317", "tmdb_id": null}, {"id": 34, "title": "No hay otra opción", "director": "Park Chan-Wook", "genre": "Comedia, Suspense, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/99/6f/996fc736b397f482daa9eedbf5f41970.jpg", "rating": null, "synopsis": "Man-su, un especialista en la fabricación de papel con 25 años de experiencia, está tan satisfecho con su vida que puede decirse sinceramente a sí mismo: «Lo tengo todo». Mientras pasa felizmente sus días con su esposa Miri, sus dos hijos y sus dos perros, Man-su recibe de repente la noticia de que ha sido despedido de su empresa. Sintiéndose como si le hubieran cortado la cabeza con un hacha, Man-su se compromete a encontrar un nuevo trabajo en los próximos tres meses por el bien de su familia. A pesar de su firme determinación de darle un giro a su vida, Man-su pasa más de un año yendo de una entrevista de trabajo a otra, hasta que finalmente consigue un empleo en una tienda minorista. Se encuentra en peligro de perder la casa que tanto le costó comprar.", "sensacine_id": "1000001960", "tmdb_id": null}, {"id": 35, "title": "No te queda otra", "director": "Jean-Pierre Améris", "genre": "Comedia, Romántico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/7c/43/7c43dfa578f0f29201b785b63e869fca.jpg", "rating": null, "synopsis": "En un tren que atraviesa los paisajes entre Francia y Suiza camino a Ginebra, el azar reúne a dos personas que parecen vivir en mundos opuestos. Por un lado está Victoire, una mujer habladora, espontánea y absolutamente incapaz de ignorar una oportunidad de conversación. Su entusiasmo por la vida -y por la música- es contagioso… aunque a veces resulte abrumador. Frente a ella se encuentra Antoine Toussaint, una leyenda viva de la canción francesa. Durante décadas ha llenado salas de conciertos y encabezado las listas de éxitos, pero ahora viaja solo, cansado y hastiado de la fama. Agotado por la presión, los recuerdos y una carrera que parece haber perdido su sentido, Antoine intenta pasar desapercibido durante el trayecto.Pero, el plan fracasa en cuanto Victoire lo reconoce...", "sensacine_id": "1000005160", "tmdb_id": null}, {"id": 36, "title": "Núremberg", "director": "James Vanderbilt", "genre": "Histórico, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/72/f8/72f8911ca73177c4c0fa4cdc4b476d9d.jpg", "rating": null, "synopsis": "Tras la Segunda Guerra Mundial, durante los históricos juicios de Nuremberg, el psiquiatra estadounidense Douglas Kelley tiene la tarea de evaluar la salud mental de los prisioneros nazis para determinar si son aptos para ser juzgados por crímenes de guerra. En medio de esta responsabilidad, Kelley se enfrenta a Hermann Göring, mano derecha de Hitler, en una intensa batalla de ingenio y manipulación. Mientras Göring intenta mantener su poder, Kelley debe navegar entre la verdad, la justicia y la psicología de uno de los líderes más peligrosos del Tercer Reich.", "sensacine_id": "324466", "tmdb_id": null}, {"id": 37, "title": "Orwell: 2+2=5", "director": "Raoul Peck", "genre": "Documental", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/b5/b8/b5b83af99150bc5c81c391cbd2ca109c.jpg", "rating": null, "synopsis": "Raoul Peck se sumerge de lleno en los últimos meses de vida de George Orwell y en sus obras más visionarias para analizar el origen de conceptos clave como la vigilancia, la verdad manipulada o el control social. A través de una mirada crítica y contemporánea, el documental conecta el pensamiento del autor con los desafíos del presente, desvelando cómo sus advertencias siguen más vigentes que nunca. Una reflexión profunda sobre el poder, la libertad y la fragilidad de la verdad en el mundo actual.", "sensacine_id": "314229", "tmdb_id": null}, {"id": 38, "title": "Pillion", "director": "Harry Lighton", "genre": "Drama, Erótico, Comedia, Romántico", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/a2/05/a205ecea7ee491167d8a2eea56708319.jpg", "rating": null, "synopsis": "Colin, un hombre solitario, ve su vida transformada al conocer a Ray, un carismático líder de moteros. Lo que comienza como una amistad inesperada evoluciona hacia una relación marcada por una dinámica de sumisión que desafía las estructuras rígidas de Colin. A través de esta experiencia intensa y fuera de lo común, Colin confronta sus miedos, se libera de patrones autoimpuestos y experimenta un profundo proceso de autodescubrimiento. La presencia de Ray sacude su rutina y despierta en él una nueva forma de entender el deseo, el poder y la libertad personal.", "sensacine_id": "1000004467", "tmdb_id": null}, {"id": 39, "title": "Rocío Dúrcal", "director": "", "genre": "Documental, Concierto", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/16/03/08/17/48/063893.jpg", "rating": null, "synopsis": "Madrid. Finales de los años 50. Marieta sueña con ser cantante, pero su humilde hogar no le permite conseguir su sueño. Sin embargo, su abuelo don Tomás, primer admirador de la niña y convencido de su talento, le da su apoyo incondicional y no cesa en promocionarla en numerosos concursos radiofónicos, los cuales termina ganando gracias a su especial y dulce voz. Tomás nunca baja los brazos y continúa promocionando a su nieta hasta el día en el que ésta acude al programa de televisión “Primer aplauso”, allí su sueño se hace realidad. Es en ese momento cuando nace Rocío Durcal.La película está escrita y dirigida por Óscar Parra de Carrizosa en colaboración con Gema G. Regal.", "sensacine_id": "235062", "tmdb_id": null}, {"id": 40, "title": "Ruta de escape", "director": "Bart Layton", "genre": "Crimen, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/b7/67/b767211a1a618183340db6f1b736c908.jpg", "rating": null, "synopsis": "Un escurridizo ladrón planea su mayor atraco, con la esperanza de que sea el último, cuando se ve obligado a colaborar con una ejecutiva de seguros desilusionada y a enfrentarse a un rival con métodos más peligrosos. A medida que se acerca el golpe multimillonario, un teniente implacable estrecha el cerco, aumentando el riesgo y difuminando la línea entre cazador y presa. Cada uno deberá asumir las consecuencias de sus decisiones, conscientes de que no hay vuelta atrás, mientras la tensión y la traición amenazan con destruir sus planes y su libertad.", "sensacine_id": "319570", "tmdb_id": null}, {"id": 41, "title": "Scream 7", "director": "Kevin Williamson", "genre": "Terror, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f9/57/f957e82b8374af3029d4e7acc0b62229.png", "rating": null, "synopsis": "Cuando un nuevo asesino Ghostface aparece en el tranquilo y relajaddo pueblo donde Sidney Prescott ha intentado reconstruir su vida, sus peores pesadillas vuelven. Todo se vuelve aún más aterrador cuando su hija se convierte en el nuevo objetivo del enmascarado.Obligada a enfrentarse a los traumas que creía enterrados, Sidney deberá enfrentarse a su oscuro pasado y a un enemigo implacable. En una carrera contra el tiempo, madre e hija lucharán por sobrevivir y acabar con la masacre de una vez por todas.", "sensacine_id": "318865", "tmdb_id": null}, {"id": 42, "title": "Sirat. Trance en el desierto", "director": "Oliver Laxe", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/91/0e/910e1769a90e9d5d92788000a03c3057.jpg", "rating": null, "synopsis": "Un hombre y su hijo llegan a una fiesta al aire libre en medio de las áridas y oscuras montañas del sur de Marruecos. Buscan allí a Marina -su hija y hermana- que desapareció hace meses en una de estos macroeventos. Empujados por el destino, deciden seguir a un grupo de festivaleros en la búsqueda de una último festival que se celebrará en el desierto, con la esperanza de que en ella se encuentre a la joven.", "sensacine_id": "317783", "tmdb_id": null}, {"id": 43, "title": "Sorry, Baby", "director": "Eva Victor", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/7f/9f/7f9f1cde0cf3f9c63d93ecd33c3f7d5f.jpg", "rating": null, "synopsis": "Agnes tiene que enfrentarse y superar las secuelas de un evento traumático mientras intenta encontrar su camino hacia su bienestar. Intentará hacerlo con el apoyo de su mejor amiga, su vecina y un pequeño gatito. Así, intentará volver a conectar con la vida cotidiana. Un sándwich preparado con cariño se convierte en el inesperado consuelo en su proceso de recuperación. Gracias a pequeños gestos de amor y amistad, Agnes intenta superar su dolor, recordando que, aunque las cicatrices se queden, la vida sigue adelante.", "sensacine_id": "1000017457", "tmdb_id": null}, {"id": 44, "title": "Tafiti y sus amigos", "director": "Nina Wels", "genre": "Animación, Familia, Aventura", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/90/a5/90a558c0e47ff39af3eb5bb05cf738db.jpg", "rating": null, "synopsis": "En la magnífica sabana africana acechan muchos peligros, especialmente para una suricata como nuestro héroe Tafiti. Su abuelo Opapa le enseña que el mundo está lleno de riesgos y que es mejor que se mantengan entre ellos. Pero Tafiti no puede seguir este consejo y se apresura a rescatar a Pinsel, un cerdo de orejas de pincel. Entonces, una serpiente venenosa se cuela y muerde a Opapa. La única esperanza de salvación es una rara flor azul que florece al otro lado del desierto. Tafiti promete mantenerse alejado de los demás a partir de ahora, pero eso resulta más difícil de lo que pensaba. Pinsel sigue a Tafiti para saldar su deuda. Juntos, siguiendo el consejo de Opapa, se adentran en el infinito desierto, donde luchan por sobrevivir y crecen juntos en su mayor aventura.", "sensacine_id": "327254", "tmdb_id": 1437198}, {"id": 45, "title": "Torrente presidente", "director": "Santiago Segura", "genre": "Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/ce/63/ce63bc4bd27995d49be93a2891504e53.png", "rating": null, "synopsis": "Una tarde a la hora de la comida en un bar. Allí, dos importantes afiliados al parido de extrema derecha NOX, se fijan en la actitud y el magnetismo que desprende Jose Luis Torrente con los parroquianos del lugar, y deciden invitarle para hablar en un par de mítines. Lo que estos dos jóvenes desconocen es que abren la caja de los truenos y Torrente poco a poco comienza a ganar poder dentro del partido y su discurso fascista empieza a calar entre los votantes. A partir de ahí comienzan una serie de acontecimientos a cada cual más surrealista, en la sexta sátira de la sociedad española -a manos del director y actor Santiago Segura- vista desde la óptica del policía más marrano e irreverente del cine español.", "sensacine_id": "324865", "tmdb_id": null}, {"id": 46, "title": "Tres adioses", "director": "Isabel Coixet", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f4/0e/f40e5bf6fa7c09e667c1f159c50c88c2.jpg", "rating": null, "synopsis": "Tras una discusión que no parece gran cosa, Marta y Antonio deciden separarse. Él, un chef en ascenso, se vuelca en la cocina para superar la ruptura, mientras ella se sumerge en un silencio que pronto revela algo más que tristeza: ha perdido el apetito. Cuando descubre que su malestar esconde un problema de salud, su vida cambia por completo.De pronto, los sentidos se intensifican: la comida recupera su sabor, la música la conmueve y el deseo renace, impulsándola a vivir plenamente y sin miedo.", "sensacine_id": "1000019852", "tmdb_id": null}, {"id": 47, "title": "Una batalla tras otra", "director": "Paul Thomas Anderson", "genre": "Acción, Drama, Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/a6/af/a6af650c0fe2634ffe65b610e02fe489.jpg", "rating": null, "synopsis": "Bob Ferguson es un ex revolucionario cuya vida da un giro cuando su hija es secuestrada por un enemigo de su pasado. Desesperado por recuperarla, Bob se ve obligado a confrontar viejas heridas y a recurrir a un grupo de antiguos compañeros revolucionarios liderados por el experimentado Sensei Sergio.Juntos planean enfrentarse a fuerzas peligrosas, combinando astucia, estrategia y habilidades adquiridas en su pasado militante. La historia mezcla acción, suspenso y redención mientras Bob lucha por salvar a su hija y reconciliarse con su historia.", "sensacine_id": "311364", "tmdb_id": null}, {"id": 48, "title": "Una hija en Tokio", "director": "Guillaume Senez", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/7d/3d/7d3d7bfde0c5ca13e16ff92ffbf6495b.jpg", "rating": null, "synopsis": "Jay es un taxista que ha pasado 13 años en Japón y recorre las calles de Tokio cada noche mientras carga con la ausencia de su hija, Lily, a quien no ha visto en casi una década. Después de una dolorosa separación, Jay perdió el derecho a la custodia compartida y, tras años de búsqueda sin éxito, se ha vuelto a Francia. Sin embargo, justo cuando está a punto de abandonar el país y su esperanza, un encuentro inesperado sucede: una noche, Lily sube a su taxi, dándole a Jay una oportunidad inesperada de reencontrarse con su hija.", "sensacine_id": "313955", "tmdb_id": 1021643}, {"id": 49, "title": "Valor sentimental", "director": "Joachim Trier", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/35/66/35661f40931132d1af3e82b56fed553f.jpg", "rating": null, "synopsis": "Nora y su hermana Agnes intentan superar la reciente pérdida de su madre cuando su padre, Gustav, regresa de forma inesperada a sus vidas. Con la intención de volver a conectar, Gustav les presenta un guion que ha escrito, ofreciéndole a Nora el papel principal. Pero Nora, que aún está dolida y desconfía, lo rechaza de forma tajante. Mientras las tensiones familiares van creciendo, las tres personas enfrentan viejas heridas, silencios incómodos y la difícil tarea de reconstruir los lazos rotos por el tiempo y el dolor.", "sensacine_id": "298726", "tmdb_id": null}, {"id": 50, "title": "Van Gogh. De los campos de trigo bajo cielos nublados", "director": "Giovanni Piscaglia", "genre": "Documental", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/pictures/19/01/23/18/13/5366971.jpg", "rating": null, "synopsis": "Tras el éxito de Loving Vincent, la figura de Vincent Van Gogh regresa a la gran pantalla con Van Gogh. De los campos de trigo bajo cielos nublados. El documental habla sobre la figura del ilustre pintor y abarca varios temas: desde su compromiso personal a hacer obras como muestra de gratitiud ante el mundo que se ha puesto a su disposición, hasta el impacto de sus cuadros, la importancia de su mecenas y como su estilo personal se convirtió en único y provocó que sus pinturas fueran admiradas por millones de personas alrededor del mundo.", "sensacine_id": "265651", "tmdb_id": null}, {"id": 51, "title": "Whistle: El silbido del mal", "director": "Corin Hardy", "genre": "Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/6b/a0/6ba0fbaa8f5734ee8d0b85195b9b6b3b.jpg", "rating": null, "synopsis": "Un grupo de estudiantes inadaptados encuentra accidentalmente un antiguo silbato azteca maldito. Al soplarlo, liberan un terrorífico sonido que invoca sus futuras muertes, convirtiéndose en presas de un destino mortal.A medida que las víctimas se multiplican, los amigos luchan contra el miedo y la desesperación para descubrir el origen del artefacto y detener la cadena de sucesos macabros que han desatado, enfrentándose a fuerzas sobrenaturales que desafían toda lógica y ponen a prueba su valor y su amistad.", "sensacine_id": "321708", "tmdb_id": 1193501}, {"id": 52, "title": "Your Name", "director": "Makoto Shinkai", "genre": "Animación, Fantasía", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/17/02/08/13/45/536055.jpg", "rating": null, "synopsis": "La joven Mitsuha vive en un pequeño pueblecito entre las montañas. Sin muchas sorpresas ni demasiadas emociones, la adolescente tiene un par de amigos, además de a su hermana pequeña, su abuela y su padre, con el que tiene una relación algo distante. La única expectación un poco emocionante es el cometa Tiamat, que está pasando cerca de la Tierra y por unos días será visible a simple vista. Pero un día despierta y descubre con asombro que no reconoce su cuerpo, y piensa que se trata de un extraño sueño. Pero no es así: se encuentra dentro del cuerpo de un chico, concretamente de Taki, un joven estudiante de bachillerato de la gran ciudad de Tokio. A Taki le sucederá lo mismo, y es Mitsuha la que se intercambia con él. Metidos dentro de un cuerpo que les resulta tan extraño, poco a poco, los dos jóvenes empiezan a comunicarse y, torpemente, van superando los retos que se presentan en ambas vidas. De esta forma, el vínculo que tienen se convierte en algo más. Lo que no saben es que algo inesperado está a punto de ser revelado. Filme de animación dirigido por el nipón Makoto Shinkai, responsable de filmes como El jardín de las palabras (2013), Viaje a Agartha (2011) o 5 centímetros por segundo (2007).", "sensacine_id": "249877", "tmdb_id": null}, {"id": 53, "title": "Zootrópolis 2", "director": "Byron Howard | Jared Bush", "genre": "Animación, Aventura, Familia, Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/95/4c/954c30eb27156ff168370a46ca2a3f5b.jpg", "rating": null, "synopsis": "Judy y Nick se enfrentan a un nuevo y enigmático desafío cuando un misterioso reptil llega a Zootopia y altera por completo la vida en la metrópolis de los mamíferos. Siguiendo su peligrosa pista, ambos se ven obligados a meterse de incógnito en rincones que nunca antes habían explorado de la ciudad, donde descubrirán secretos ocultos y se toparán con inesperados obstáculos.En medio de esta misión, su sociedad (cada vez más sólida pero también más exigida) será puesta a prueba como nunca, revelando la fuerza y los límites de su unión.", "sensacine_id": "277428", "tmdb_id": null}, {"id": 54, "title": "¡La novia!", "director": "Maggie Gyllenhaal", "genre": "Drama, Suspense, Romántico, Ciencia ficción, Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/aa/05/aa0515d133a7885cf864d3e9b0fc747e.jpg", "rating": null, "synopsis": "En el Chicago de los años 30, Frankenstein recurre al Dr. Euphronius para crear una compañera, dando vida a una mujer asesinada conocida como la Novia. Esta petición despierta una intensa relación entre ambos, mientras la policía comienza a investigar los extraños sucesos.La presencia de la Novia no solo genera un inesperado romance, sino que también provoca un cambio social que desafía las normas de la época y transforma la percepción de la vida, la muerte y las relaciones humanas en la ciudad.", "sensacine_id": "180943", "tmdb_id": null}, {"id": 55, "title": "¡Átame!", "director": "Pedro Almodóvar", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/pictures/16/02/16/16/50/596825.jpg", "rating": null, "synopsis": "Recién salido de la cárcel, Ricky (Antonio Banderas), un chico huérfano desde los tres años que se pasa la vida entre instituciones sociales y reformatorios, encuentra la chica de sus sueños, Marina (Victoria Abril), una actriz que hace películas pornográficas y de terror y que ha tenido muchos problemas con las drogas. Magnetizado por ella, la secuestra y se dispone a pasar \"tiempo de calidad\" con ella, esperando que se enamore de él. Al principio, Marina rechaza a Ricky pero más tarde se da una gran complicidad entre ellos convirtiéndose finalmente en auténtico amor.", "sensacine_id": "81846", "tmdb_id": null}, {"id": 56, "title": "Águilas de el Cairo", "director": "Tarik Saleh", "genre": "Drama, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/59/3f/593fa084b0908ac3b76af3373681d602.jpg", "rating": null, "synopsis": "George Fahmy, el actor más querido de Egipto, es presionado para protagonizar una película encargada por las altas esferas del poder. Aunque acepta a regañadientes, el papel lo introduce en un círculo privilegiado y peligroso. Fascinado por el poder, George comienza un romance prohibido con la enigmática esposa del general que dirige el proyecto. Como una polilla atraída por la luz, su ambición y deseo lo arrastran a una red de secretos y traiciones que pondrá en riesgo su carrera, su libertad y su vida.", "sensacine_id": "324956", "tmdb_id": null}];

function getGenreTheme(genreStr) {
  if (!genreStr) return { grad: 'linear-gradient(160deg, #1a1a2e, #2a2a4e)', icon: '🎬', fx: '' };
  const genres = genreStr.split(',').map(g => g.trim());
  // Try each genre in order of specificity
  for (const g of genres) {
    if (GENRE_THEMES[g]) return GENRE_THEMES[g];
  }
  return { grad: 'linear-gradient(160deg, #1a1a2e, #2a2a4e)', icon: '🎬', fx: '' };
}

function generatePosterHtml(title, genre) {
  const theme = getGenreTheme(genre);
  const genres = (genre || '').split(',').map(g => g.trim());

  // Create animated particles (colors based on genre)
  let particles = '';
  const colors = {
    'Terror': ['#ff0000','#8b0000','#ff4444'],
    'Animación': ['#e94560','#f5c518','#64b5f6','#81c784','#ce93d8'],
    'Acción': ['#ff6600','#ff9900','#ffcc00'],
    'Ciencia ficción': ['#00ccff','#0088ff','#00ffcc'],
    'Romance': ['#ff69b4','#ff1493','#ff6eb4'],
    'Comedia': ['#f5c518','#ffcc00','#ff9900'],
    'Música': ['#64b5f6','#42a5f5','#90caf9'],
  };
  const pColors = colors[genres[0]] || ['#ffffff','#aaaaaa','#888888'];
  for (let i = 0; i < 6; i++) {
    const c = pColors[i % pColors.length];
    const left = 10 + Math.floor((i * 37 + 13) % 80);
    const size = 3 + (i % 4);
    const delay = (i * 0.7).toFixed(1);
    particles += `<span style="left:${left}%;width:${size}px;height:${size}px;background:${c};animation-delay:${delay}s"></span>`;
  }

  // FX elements
  let fxHtml = '';
  if (theme.fx === 'scan') fxHtml = '<div class="gp-scanline"></div>';

  // Animation style per fx
  let fxStyle = '';
  if (theme.fx === 'flicker') fxStyle = 'animation: flicker 3s infinite;';
  if (theme.fx === 'shimmer') fxStyle = 'background-size: 200% 100%; animation: shimmer 4s ease infinite;';
  if (theme.fx === 'pulse') fxStyle = 'animation: pulse-glow 2.5s ease-in-out infinite;';

  let iconStyle = '';
  if (theme.fx === 'bounce') iconStyle = 'animation: bounce-icon 2s ease-in-out infinite;';

  return `<div class="gen-poster" style="background:${theme.grad};${fxStyle}">
    <div class="gp-particles">${particles}</div>
    ${fxHtml}
    <div class="gp-icon" style="${iconStyle}">${theme.icon}</div>
    <div class="gp-genre">${genres[0] || ''}</div>
    <div class="gp-title">${title.replace(/ *\(.*\)$/, '')}</div>
  </div>`;
}

// Poster cache (populated from baked-in poster_url in EMBEDDED_MOVIES)
const posterCache = {};

let allShowtimes = EMBEDDED_SHOWTIMES;
let allMovies = EMBEDDED_MOVIES;
let allCinemas = EMBEDDED_CINEMAS;
let activeLanguageFilter = '';

const datePicker = document.getElementById('datePicker');
const cinemaFilter = document.getElementById('cinemaFilter');
cinemaFilter.addEventListener('change', () => renderMovies());

// Concert data
const allConcerts = (typeof EMBEDDED_CONCERTS !== 'undefined') ? EMBEDDED_CONCERTS : [];

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const name = tab.dataset.tab;
    document.getElementById('peliculas-tab').style.display = name === 'peliculas' ? '' : 'none';
    document.getElementById('conciertos-tab').style.display = name === 'conciertos' ? '' : 'none';
    document.getElementById('cines-tab').style.display = name === 'cines' ? '' : 'none';
    if (name === 'cines') loadCinemas();
    if (name === 'peliculas') renderMovies();
    if (name === 'conciertos') { renderConcertStats(); renderConcertDateFilters(); renderConcerts(); }
  });
});

function renderStats() {
  const cinemaCount = new Set(allShowtimes.map(s => s.cinema)).size;
  const voseCount = allShowtimes.filter(s => s.language === 'VOSE').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-box"><div class="num">${allMovies.length}</div><div class="label">Películas</div></div>
    <div class="stat-box"><div class="num">${allShowtimes.length}</div><div class="label">Sesiones</div></div>
    <div class="stat-box"><div class="num">${cinemaCount}</div><div class="label">Cines</div></div>
    <div class="stat-box"><div class="num">${voseCount}</div><div class="label">VOSE</div></div>
  `;
}

function renderLanguageFilters() {
  const langs = [...new Set(allShowtimes.map(s => s.language))].sort();
  const bar = document.getElementById('lang-filters');
  bar.innerHTML = `<div class="filter-btn ${activeLanguageFilter === '' ? 'active' : ''}" data-lang="">Todos</div>`;
  langs.forEach(lang => {
    bar.innerHTML += `<div class="filter-btn ${activeLanguageFilter === lang ? 'active' : ''}" data-lang="${lang}">${lang}</div>`;
  });
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeLanguageFilter = btn.dataset.lang;
      renderLanguageFilters();
      renderMovies();
    });
  });
}

function getSearchTerm() {
  const el = document.getElementById('searchInput');
  return el ? el.value.trim().toLowerCase() : '';
}

function renderMovies() {
  const container = document.getElementById('movies-container');
  const selectedCinema = cinemaFilter.value;
  const search = getSearchTerm();

  let filtered = allShowtimes;
  if (selectedCinema) filtered = filtered.filter(s => s.cinema === selectedCinema);
  if (activeLanguageFilter) filtered = filtered.filter(s => s.language === activeLanguageFilter);
  if (search) {
    filtered = filtered.filter(s => {
      const mv = allMovies.find(m => m.title === s.movie) || {};
      return s.movie.toLowerCase().includes(search)
        || s.cinema.toLowerCase().includes(search)
        || (mv.director || '').toLowerCase().includes(search)
        || (mv.genre || '').toLowerCase().includes(search);
    });
  }

  const movieMap = new Map();
  filtered.forEach(s => {
    if (!movieMap.has(s.movie)) {
      const mv = allMovies.find(m => m.title === s.movie) || {};
      movieMap.set(s.movie, { ...mv, title: s.movie, showtimes: [] });
    }
    movieMap.get(s.movie).showtimes.push(s);
  });

  if (movieMap.size === 0) {
    container.className = 'empty';
    container.textContent = 'No hay sesiones para esta fecha / filtro.';
    return;
  }

  const movies = [...movieMap.values()].sort((a, b) => (b.rating || 0) - (a.rating || 0));

  // Populate cinema filter
  const cinemaNames = [...new Set(allShowtimes.map(s => s.cinema))].sort();
  if (cinemaFilter.options.length <= 1) {
    cinemaNames.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      cinemaFilter.appendChild(opt);
    });
  }

  container.className = 'movies-grid';
  container.innerHTML = movies.map(mv => {
    const byCinema = {};
    mv.showtimes.forEach(s => {
      if (!byCinema[s.cinema]) byCinema[s.cinema] = [];
      byCinema[s.cinema].push(s);
    });

    const ytId = YOUTUBE_TRAILERS[mv.title];
    const hasPoster = posterCache[mv.title] || mv.poster_url;
    let posterHtml;
    if (ytId) {
      // YouTube thumbnail with play button
      posterHtml = `<div class="yt-poster" onclick="event.stopPropagation();openTrailer('${ytId}')" title="Ver tráiler">
        <img src="https://img.youtube.com/vi/${ytId}/hqdefault.jpg" alt="${esc(mv.title)}" loading="lazy"
          onerror="this.parentElement.outerHTML='<div class=\\'poster-placeholder\\'>${esc(mv.title).replace(/'/g,"\\'")}</div>'">
        <div class="play-btn"></div>
      </div>`;
    } else if (hasPoster) {
      posterHtml = `<img class="poster" src="${hasPoster}" alt="${esc(mv.title)}" loading="lazy"
        onerror="this.outerHTML='<div class=\\'poster-placeholder\\'>${esc(mv.title).replace(/'/g,"\\'")}</div>'">`;
    } else {
      posterHtml = `<div class="poster-placeholder">${esc(mv.title)}</div>`;
    }

    const ratingHtml = mv.rating
      ? `<div class="rating">★ ${mv.rating.toFixed(1)}<span style="color:var(--muted);font-weight:400;font-size:0.75rem;margin-left:0.15rem">/5</span></div>` : '';

    const metaParts = [mv.director, mv.genre, mv.duration_min ? `${mv.duration_min} min` : null].filter(Boolean);

    const synopsisHtml = mv.synopsis
      ? `<div class="synopsis" onclick="event.stopPropagation();this.classList.toggle('expanded')">${esc(mv.synopsis)}</div>` : '';

    const cinemaGroups = Object.entries(byCinema).map(([cinema, sts]) => {
      const chips = sts
        .sort((a, b) => a.time.localeCompare(b.time))
        .map(s => {
          let cls = 'chip';
          if (s.language === 'VOSE') cls += ' vose';
          if (s.format === 'IMAX') cls += ' imax';
          else if (s.format === 'Atmos') cls += ' atmos';
          else if (s.format === '3D') cls += ' three-d';
          const label = s.time + (s.language === 'VOSE' ? ' VOSE' : '') + (s.format !== '2D' ? ' ' + s.format : '');
          return `<span class="${cls}">${label}</span>`;
        }).join('');
      return `<div class="cinema-group"><div class="cinema-name">${esc(cinema)}</div><div class="time-chips">${chips}</div></div>`;
    }).join('');

    const sessionCount = mv.showtimes.length;
    const cinemaCount = Object.keys(byCinema).length;
    return `
      <div class="movie-card" onclick="this.classList.toggle('expanded')">
        <div class="top">
          ${posterHtml}
          <div class="info">
            <div class="title">${esc(mv.title)}</div>
            <div class="meta">${esc(metaParts.join(' · '))}</div>
            ${ratingHtml}
            ${synopsisHtml}
          </div>
        </div>
        <div class="showtimes-toggle">
          <span>${sessionCount} sesiones en ${cinemaCount} cine${cinemaCount > 1 ? 's' : ''}</span>
          <span class="arrow">▼</span>
        </div>
        <div class="showtimes-section">${cinemaGroups}</div>
      </div>`;
  }).join('');
}

function loadCinemas() {
  const container = document.getElementById('cinemas-container');
  if (allCinemas.length === 0) {
    container.className = 'empty';
    container.textContent = 'No hay cines en la base de datos.';
    return;
  }
  // Count movies per cinema from showtimes
  const moviesByCinema = {};
  allShowtimes.forEach(s => {
    if (!moviesByCinema[s.cinema]) moviesByCinema[s.cinema] = new Set();
    moviesByCinema[s.cinema].add(s.movie);
  });

  // Filter by search term
  const search = getSearchTerm();
  let cinemalist = allCinemas;
  if (search) {
    cinemalist = cinemalist.filter(c =>
      c.name.toLowerCase().includes(search)
      || (c.address || '').toLowerCase().includes(search)
    );
  }

  // Sort: cinemas with sessions first, then alphabetically
  const sorted = [...cinemalist].sort((a, b) => {
    const aCount = moviesByCinema[a.name] ? moviesByCinema[a.name].size : 0;
    const bCount = moviesByCinema[b.name] ? moviesByCinema[b.name].size : 0;
    if (aCount && !bCount) return -1;
    if (!aCount && bCount) return 1;
    return a.name.localeCompare(b.name);
  });

  container.className = 'cinemas-list';
  container.innerHTML = sorted.map(c => {
    const movieCount = moviesByCinema[c.name] ? moviesByCinema[c.name].size : 0;
    const showtimeCount = allShowtimes.filter(s => s.cinema === c.name).length;
    const noSessions = movieCount === 0;
    const cls = noSessions ? 'cinema-card no-sessions' : 'cinema-card';
    const label = noSessions ? 'Sin sesiones disponibles' : `${movieCount} películas · ${showtimeCount} sesiones`;
    const onclick = noSessions ? '' : `onclick="selectCinema('${esc(c.name).replace(/'/g, "\\'")}')"`;
    return `
      <div class="${cls}" ${onclick}>
        <h3>${esc(c.name)}</h3>
        <div class="addr">${esc(c.address || '')}</div>
        <div class="movie-count">${label}</div>
      </div>`;
  }).join('');
}

function selectCinema(name) {
  // Switch to películas tab and filter by this cinema
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="peliculas"]').classList.add('active');
  document.getElementById('peliculas-tab').style.display = '';
  document.getElementById('cines-tab').style.display = 'none';
  cinemaFilter.value = name;
  renderMovies();
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Search input
document.getElementById('searchInput').addEventListener('input', () => {
  renderMovies();
  renderConcerts();
  loadCinemas();
  renderStats();
});

// Concert rendering — grouped by venue
// Filter out past dates and default to next 7 days
const today = new Date().toISOString().slice(0, 10);
const weekFromNow = new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10);
const futureConcerts = allConcerts.filter(c => c.date >= today);
let activeConcertDate = '7d';  // '7d' = next 7 days, '' = all future dates

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
}

function renderConcertStats() {
  const venueCount = new Set(futureConcerts.map(c => c.venue)).size;
  const dates = new Set(futureConcerts.map(c => c.date));
  document.getElementById('concert-stats').innerHTML = `
    <div class="stat-box"><div class="num">${futureConcerts.length}</div><div class="label">Conciertos</div></div>
    <div class="stat-box"><div class="num">${venueCount}</div><div class="label">Salas</div></div>
    <div class="stat-box"><div class="num">${dates.size}</div><div class="label">Fechas</div></div>
  `;
}

function renderConcertDateFilters() {
  const dates = [...new Set(futureConcerts.map(c => c.date))].sort();
  const bar = document.getElementById('concert-date-filters');
  let html = `<div class="date-pill ${activeConcertDate === '7d' ? 'active' : ''}" data-date="7d">7 días</div>`;
  html += `<div class="date-pill ${activeConcertDate === '' ? 'active' : ''}" data-date="">Todos</div>`;
  dates.forEach(d => {
    html += `<div class="date-pill ${activeConcertDate === d ? 'active' : ''}" data-date="${d}">${fmtDate(d)}</div>`;
  });
  bar.innerHTML = html;
  bar.querySelectorAll('.date-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeConcertDate = btn.dataset.date;
      renderConcertDateFilters();
      renderConcerts();
    });
  });
}

function renderConcerts() {
  const container = document.getElementById('concerts-container');
  const search = getSearchTerm();

  let filtered = futureConcerts;
  if (activeConcertDate === '7d') filtered = filtered.filter(c => c.date <= weekFromNow);
  else if (activeConcertDate) filtered = filtered.filter(c => c.date === activeConcertDate);
  if (search) {
    filtered = filtered.filter(c =>
      c.event_name.toLowerCase().includes(search)
      || c.artist.toLowerCase().includes(search)
      || c.venue.toLowerCase().includes(search)
      || (c.genre || '').toLowerCase().includes(search)
    );
  }

  if (filtered.length === 0) {
    container.className = 'empty';
    container.textContent = 'No hay conciertos disponibles.';
    return;
  }

  // Group by venue
  const byVenue = {};
  filtered.forEach(c => {
    const key = c.venue || 'Sala desconocida';
    if (!byVenue[key]) byVenue[key] = { address: c.venue_address || '', events: [] };
    byVenue[key].events.push(c);
  });

  // Sort venues by number of events (most first)
  const venueNames = Object.keys(byVenue).sort((a, b) => byVenue[b].events.length - byVenue[a].events.length);

  container.className = '';
  container.innerHTML = venueNames.map(venueName => {
    const group = byVenue[venueName];
    // Sort events within venue by date then time
    group.events.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

    const eventsHtml = group.events.map(c => {
      const imgHtml = c.image_url
        ? `<img class="event-img" src="${c.image_url}" alt="${esc(c.event_name)}" loading="lazy" onerror="this.outerHTML='<div class=event-placeholder>&#x1f3b5;</div>'">`
        : '<div class="event-placeholder">&#x1f3b5;</div>';

      const artistHtml = c.artist && c.artist !== c.event_name
        ? `<div class="event-artist">${esc(c.artist)}</div>` : '';

      const tags = [];
      if (c.date) {
        tags.push(`<span class="tag date-tag">${c.time ? c.time + ' · ' : ''}${fmtDate(c.date)}</span>`);
      }
      if (c.price_range) tags.push(`<span class="tag price-tag">${esc(c.price_range)}</span>`);
      if (c.genre) tags.push(`<span class="tag genre-tag">${esc(c.genre)}</span>`);

      const ticketHtml = c.ticket_url
        ? `<a class="ticket-btn" href="${c.ticket_url}" target="_blank" rel="noopener">Entradas</a>` : '';

      return `
        <div class="venue-event">
          ${imgHtml}
          <div class="event-info">
            <div class="event-title">${esc(c.event_name)}</div>
            ${artistHtml}
            <div class="event-meta">${tags.join('')}</div>
          </div>
          ${ticketHtml}
        </div>`;
    }).join('');

    return `
      <div class="venue-group">
        <div class="venue-header">
          <div class="venue-icon">&#x1f3b6;</div>
          <div class="venue-info">
            <div class="venue-title">${esc(venueName)}</div>
            ${group.address ? `<div class="venue-address">${esc(group.address)}</div>` : ''}
          </div>
          <div class="venue-count">${group.events.length}</div>
        </div>
        <div class="venue-events">${eventsHtml}</div>
      </div>`;
  }).join('');
}

// Initialize
renderStats();
renderLanguageFilters();
renderMovies();

// Build poster cache from baked-in poster_url
allMovies.forEach(m => { if (m.poster_url) posterCache[m.title] = m.poster_url; });

// Trailer modal
function openTrailer(ytId) {
  const modal = document.getElementById('trailerModal');
  const frame = document.getElementById('trailerFrame');
  frame.src = `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1`;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeTrailer(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('close-btn')) return;
  const modal = document.getElementById('trailerModal');
  const frame = document.getElementById('trailerFrame');
  frame.src = '';
  modal.classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrailer(); });
</script>
</body>
